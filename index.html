<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stock Valuation Dashboard</title>
<!-- iOS 홈화면 아이콘 (계산기 스타일) -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png" />
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="apple-touch-icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Stocks" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#000000" />
<style>
  :root {
    --bg: #f7f9fc;
    --panel: #ffffff;
    --panel-2: #f2f4f8;
    --border: #e3e7ee;
    --border-strong: #cfd5de;
    --text: #1f2933;
    --text-dim: #6b7480;
    --accent: #2563eb;
    --accent-soft: #eaf1fe;
    --blue: #2563eb;
    --red: #b91c1c;
    --header: #f0f3f8;
    --row-hover: #f6f8fc;
    --focus: #dbe8fe;
    --readonly: #fafbfd;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;  /* 스크롤은 .table-wrap 안에서만 발생 */
  }
  .topbar {
    flex: none;
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .topbar h1 {
    margin: 0; font-size: 18px; font-weight: 600;
    display: flex; align-items: center; gap: 9px;
    white-space: nowrap;
  }
  .topbar h1 .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); flex: none; }
  .topbar .spacer { flex: 1; min-width: 0; }
  .topbar .meta {
    color: var(--text-dim); font-size: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topbar .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent-soft); color: var(--accent);
    padding: 5px 11px; border-radius: 999px; font-size: 13px; font-weight: 500;
    white-space: nowrap;
  }
  .topbar .status-pill::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
  }
  .topbar .status-pill.warn { background: #fff3cd; color: #7a5d00; }
  .topbar .status-pill.warn::before { background: #d4a017; }
  .topbar .status-pill.err { background: #fde7e7; color: #9b1c1c; }
  .topbar .status-pill.err::before { background: #9b1c1c; }
  .topbar input.filter {
    background: var(--panel); border: 1px solid var(--border-strong); color: var(--text);
    padding: 9px 12px; border-radius: 6px; width: 240px; font-size: 15px;
    transition: border-color .15s, box-shadow .15s;
    min-width: 0;
  }
  .topbar input.filter:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus);
  }
  .btn {
    background: var(--panel); border: 1px solid var(--border-strong); color: var(--text);
    padding: 9px 14px; border-radius: 6px; cursor: pointer; font-size: 14px;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--panel-2); border-color: var(--accent); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast {
    position: fixed; right: 16px; bottom: 16px;
    background: var(--panel); border: 1px solid var(--border-strong);
    padding: 12px 16px; border-radius: 6px;
    color: var(--text); font-size: 14px; z-index: 100;
    max-width: 420px; box-shadow: 0 8px 24px rgba(15,23,42,0.12);
    opacity: 0; transform: translateY(10px); transition: all .2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.ok { border-color: #c4e5cf; background: #f1faf4; }
  .toast.err { border-color: #f3c4c4; background: #fdf1f1; }

  /* ── 여기가 핵심: 표 전체 영역이 스크롤 컨테이너, sticky는 여기 기준 ── */
  .table-wrap {
    flex: 1;
    min-height: 0;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px;
  }
  table {
    border-collapse: separate;
    border-spacing: 0;
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  th, td {
    padding: 11px 13px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    text-align: right;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    font-size: 15px;
  }
  th:last-child, td:last-child { border-right: none; }
  tbody tr:last-child td { border-bottom: none; }
  thead th {
    background: var(--header);
    position: sticky; top: 0; z-index: 3;
    font-weight: 600;
    color: #4a5568;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
    text-align: center;
  }
  thead th.sorted-asc::after { content: " ▲"; color: var(--accent); font-size: 12px; }
  thead th.sorted-desc::after { content: " ▼"; color: var(--accent); font-size: 12px; }
  th.text-left, td.text-left { text-align: left; }
  tbody tr { background: var(--panel); }
  tbody tr:hover { background: var(--row-hover); }
  tbody td { background: var(--panel); }
  tbody td.readonly-cell, tbody td.current-cap { background: var(--readonly); }

  input.cell-num {
    background: transparent; border: 1px solid transparent; color: var(--text);
    padding: 4px 6px; border-radius: 4px; width: 100%;
    font: inherit;
    font-size: 15px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  input.cell-num:focus {
    outline: none; border-color: var(--accent); background: white;
    box-shadow: 0 0 0 3px var(--focus);
  }
  input.cell-num::placeholder { color: #aab2bd; }

  /* ── 투자 아이디어 셀 ── */
  td.idea-cell { min-width: 480px; max-width: 600px; padding: 4px 6px; vertical-align: top; }
  .idea-wrap {
    display: flex; align-items: flex-start; gap: 4px; width: 100%;
  }
  textarea.cell-text {
    background: transparent; border: 1px solid transparent; color: var(--text);
    padding: 4px 6px; border-radius: 4px; width: 100%;
    font: inherit; font-size: 15px; text-align: left;
    resize: none; overflow: hidden;
    line-height: 1.4;
    transition: height 0.12s ease;
    white-space: pre-wrap; word-break: break-all;
    box-sizing: border-box;
  }
  textarea.cell-text:focus {
    outline: none; border-color: var(--accent); background: white;
    box-shadow: 0 0 0 3px var(--focus);
  }
  textarea.cell-text::placeholder { color: #aab2bd; }
  .idea-toggle {
    flex-shrink: 0; background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 13px; padding: 3px 2px; line-height: 1;
    opacity: 0.5; transition: opacity 0.15s, color 0.15s;
    margin-top: 2px;
  }
  .idea-toggle:hover { opacity: 1; color: var(--accent); }
  .idea-toggle.expanded { opacity: 0.8; }
  .idea-toggle.has-content { color: var(--accent); opacity: 1; }
  .line-badge {
    flex-shrink: 0;
    font-size: 11px; font-weight: 600;
    background: var(--accent-soft); color: var(--accent);
    border-radius: 999px; padding: 2px 7px;
    margin-top: 4px;
    white-space: nowrap;
    pointer-events: none;
  }
  .text-center { text-align: center; }
  td.chart-cell { width: 120px; min-width: 120px; padding: 6px 8px; text-align: center; }
  td.chart-cell svg { display: block; margin: 0 auto; }

  .readonly-cell { color: var(--text); font-weight: 500; }
  .readonly-cell.name { font-weight: 600; }
  .readonly-cell.name a {
    color: inherit; text-decoration: none;
  }
  .readonly-cell.name a:hover {
    color: var(--accent); text-decoration: underline;
  }
  .current-cap { color: var(--text); font-weight: 600; }

  .num { font-variant-numeric: tabular-nums; }
  .up { color: var(--blue); font-weight: 600; }
  .down { color: var(--red); font-weight: 600; }
  .dim { color: var(--text-dim); }

  .empty { padding: 40px; text-align: center; color: var(--text-dim); }

  /* 영업이익 합: 클릭으로 Q1~Q4 펼침/접힘 */
  thead th.toggle-op-sum {
    background: #e9efff;
    color: var(--accent);
  }
  thead th.toggle-op-sum::after {
    content: " ▸"; font-size: 13px; margin-left: 5px;
  }
  thead th.toggle-op-sum.expanded::after { content: " ▾"; }
  /* 접힘 상태에서 Q 컬럼 숨김 */
  table:not(.show-quarterly) [data-col^="q"] { display: none; }

  /* 섹터 칩 (읽기 전용 표시) — 색은 JS에서 인라인 스타일로 주입 */
  td.sector-cell { padding: 8px 10px; }
  span.sector-tag {
    display: inline-block;
    border-radius: 999px;
    padding: 3px 11px;
    font-size: 13px; font-weight: 500;
    color: var(--text); background-color: var(--panel-2);
    white-space: nowrap;
  }
  /* 색상은 인라인 스타일로 주입 (sectorColors() 참고) */

  /* 섹터 그룹 헤더 행 — 배경색/좌측 컬러바는 JS에서 인라인 주입 */
  tr.group-row td {
    border-top: 1px solid var(--border-strong);
    border-bottom: 1px solid var(--border-strong);
    padding: 11px 13px 11px 18px;
    font-weight: 700;
    color: var(--text);
    font-size: 14px;
    /* box-shadow는 JS에서 inset 5px 0 0 [strong-color] 으로 덮어씀 */
    box-shadow: inset 5px 0 0 var(--border-strong);
  }
  tr.group-row .group-name { display: inline-flex; align-items: center; gap: 8px; }
  tr.group-row .group-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: currentColor; opacity: 0.95;
  }
  tr.group-row .group-meta {
    color: var(--text-dim); font-weight: 500; margin-left: 10px; font-size: 13px;
  }
  /* 그룹 모드: 그룹 내 행 첫 셀에 좌측 색 띠 (인라인으로 색 주입) */
  tbody.grouped tr:not(.group-row) td:first-child {
    box-shadow: inset 3px 0 0 transparent;
    padding-left: 16px;
  }

  /* 토픽바 select / 토글 버튼 */
  .topbar select.sector-filter {
    background: var(--panel); border: 1px solid var(--border-strong); color: var(--text);
    padding: 9px 30px 9px 12px; border-radius: 6px; font-size: 14px;
    appearance: none; -webkit-appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%),
                      linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px, 5px 5px; background-repeat: no-repeat;
    cursor: pointer; min-width: 0;
  }
  .topbar select.sector-filter:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus);
  }
  .btn.toggle-on {
    background: var(--accent-soft); border-color: var(--accent); color: var(--accent);
  }

  /* ── 열 고정 (기업명 · 섹터) ── */
  th.col-sticky, td.col-sticky {
    position: sticky;
    z-index: 1;
  }
  thead th.col-sticky {
    z-index: 4; /* 일반 sticky 헤더(3) + body sticky(1) 위 */
    background: var(--header);
  }
  tbody td.col-sticky {
    background: var(--panel);
  }
  tbody td.col-sticky.readonly-cell {
    background: var(--readonly);
  }
  tbody tr:hover td.col-sticky,
  tbody tr:hover td.col-sticky.readonly-cell {
    background: var(--row-hover);
  }
  /* 고정 구역 끝 오른쪽 구분선 */
  th.col-sticky-end, td.col-sticky-end {
    border-right: 2px solid var(--border-strong) !important;
    box-shadow: 3px 0 8px -3px rgba(15,23,42,0.10);
  }

  /* ── 페이지 탭 ── */
  .page-tabs {
    flex: none; display: flex;
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 0 16px; gap: 0;
  }
  .page-tab-btn {
    padding: 11px 20px; background: none; border: none;
    border-bottom: 3px solid transparent; margin-bottom: -1px;
    cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text-dim); transition: color .15s, border-color .15s;
    white-space: nowrap;
  }
  .page-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .page-tab-btn:hover:not(.active) { color: var(--text); }
  .page { display: none; flex: 1; min-height: 0; flex-direction: column; }
  .page.active { display: flex; }

  /* ── Diary ── */
  .diary-topbar {
    flex: none; display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
  }
  .diary-topbar h2 { margin: 0; font-size: 16px; font-weight: 600; }
  .diary-container { flex: 1; min-height: 0; display: flex; overflow: hidden; }
  .diary-sidebar {
    width: 185px; flex: none; border-right: 1px solid var(--border);
    background: var(--panel); overflow-y: auto; -webkit-overflow-scrolling: touch;
    display: flex; flex-direction: column; padding: 10px 0;
  }
  .diary-shortcut-btn {
    margin: 0 10px 4px; padding: 9px 12px;
    background: var(--accent-soft); border: 1px solid var(--border);
    border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--accent); text-align: left; transition: background .15s;
  }
  .diary-shortcut-btn:hover { background: #dbe8fe; }
  .diary-month-group { margin-top: 8px; }
  .diary-month-label {
    padding: 6px 14px 3px; font-size: 11px; font-weight: 700;
    color: var(--text-dim); letter-spacing: 0.05em; text-transform: uppercase;
  }
  .diary-entry-item {
    padding: 7px 14px; cursor: pointer; font-size: 13px; color: var(--text);
    border-left: 3px solid transparent; transition: background .1s, border-color .1s;
  }
  .diary-entry-item:hover { background: var(--row-hover); }
  .diary-entry-item.active { background: var(--accent-soft); border-left-color: var(--accent); color: var(--accent); font-weight: 600; }
  .diary-entry-item .ei-date { font-size: 13px; }
  .diary-entry-item .ei-preview { color: var(--text-dim); font-size: 12px; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .diary-main { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--bg); }
  .diary-header {
    flex: none; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
  }
  #diary-date-label { font-size: 16px; font-weight: 700; color: var(--text); flex: 1; }
  .diary-mode-tabs { display: flex; gap: 3px; background: var(--panel-2); border-radius: 7px; padding: 3px; }
  .diary-mode-btn {
    padding: 5px 16px; border: none; border-radius: 5px;
    background: transparent; cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--text-dim); transition: background .15s, color .15s;
  }
  .diary-mode-btn.active { background: var(--panel); color: var(--accent); box-shadow: 0 1px 4px rgba(15,23,42,0.10); }
  .diary-editor-wrap { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 14px 16px 8px; }
  .diary-textarea {
    flex: 1; padding: 16px 18px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--panel); color: var(--text); font: inherit; font-size: 15px;
    line-height: 1.75; resize: none; overflow-y: auto; -webkit-overflow-scrolling: touch;
    transition: border-color .15s, box-shadow .15s;
  }
  .diary-textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus); }
  .diary-textarea::placeholder { color: #aab2bd; }
  .diary-footer {
    flex: none; display: flex; align-items: center; justify-content: space-between;
    padding: 6px 4px 2px; font-size: 13px;
  }
  .diary-save-status { color: var(--text-dim); }
  .diary-save-status.saved { color: #16a34a; font-weight: 500; }
  .diary-empty { padding: 16px 14px; color: var(--text-dim); font-size: 13px; text-align: center; }

  /* ── 매매 일지 ── */
  .diary-trade-view {
    flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 14px 16px;
  }
  .trade-add-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .trade-add-bar strong { font-size: 14px; color: var(--text-dim); }
  .trade-summary { font-size: 13px; color: var(--text-dim); margin-left: auto; }
  .trade-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 10px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .trade-row1 { display: flex; align-items: center; gap: 8px; }
  .trade-row2 { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .trade-row3 { display: flex; align-items: center; gap: 6px; }
  .trade-type-sel {
    flex-shrink: 0; padding: 5px 10px; border: none; border-radius: 6px;
    font-size: 13px; font-weight: 700; cursor: pointer; appearance: none; -webkit-appearance: none;
  }
  .trade-type-sel.buy { background: #eaf1fe; color: var(--blue); }
  .trade-type-sel.sell { background: #fde7e7; color: var(--red); }
  .trade-inp {
    background: var(--panel-2); border: 1px solid transparent; color: var(--text);
    padding: 5px 8px; border-radius: 6px; font: inherit; font-size: 14px;
    transition: border-color .12s, background .12s;
  }
  .trade-inp:focus { outline: none; border-color: var(--accent); background: white; box-shadow: 0 0 0 2px var(--focus); }
  .trade-inp.name { flex: 1; font-weight: 600; }
  .trade-inp.num { width: 90px; text-align: right; font-variant-numeric: tabular-nums; }
  .trade-total { font-size: 13px; font-weight: 600; color: var(--text-dim); margin-left: auto; white-space: nowrap; }
  .trade-del-btn {
    flex-shrink: 0; background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 16px; padding: 2px 4px; border-radius: 4px;
    opacity: 0.5; transition: opacity .15s, color .15s;
  }
  .trade-del-btn:hover { opacity: 1; color: var(--red); }
  .trade-inp.memo { flex: 1; font-size: 13px; color: var(--text-dim); }
  .trade-label { font-size: 13px; color: var(--text-dim); white-space: nowrap; }
  .trade-empty { padding: 40px 20px; text-align: center; color: var(--text-dim); font-size: 14px; }
  .ei-trade-badge {
    font-size: 11px; font-weight: 600; background: #fde7e7; color: var(--red);
    border-radius: 4px; padding: 1px 5px; margin-left: 4px; vertical-align: middle;
  }
  @media (max-width: 640px) {
    .diary-sidebar { width: 140px; }
    .diary-textarea { font-size: 15px; }
    #diary-date-label { font-size: 14px; }
  }

  /* 데스크톱 스크롤바 */
  .table-wrap::-webkit-scrollbar { width: 10px; height: 10px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .table-wrap::-webkit-scrollbar-thumb { background: #d0d6de; border-radius: 5px; }
  .table-wrap::-webkit-scrollbar-thumb:hover { background: #b5bcc6; }

  /* 터치 기기 스크롤바 숨김 */
  @media (hover: none) and (pointer: coarse) {
    .table-wrap::-webkit-scrollbar { display: none; width: 0; height: 0; }
    .table-wrap { scrollbar-width: none; -ms-overflow-style: none; }
  }

  /* 좁은 뷰포트에서 topbar 가독성 보존 (컬럼 숨김은 하지 않음) */
  @media (max-width: 640px) {
    .topbar { padding: 11px 13px; gap: 9px; }
    .topbar h1 { font-size: 16px; }
    .topbar input.filter { width: 150px; font-size: 15px; padding: 9px 11px; }
    .topbar select.sector-filter { font-size: 13px; padding: 9px 28px 9px 11px; }
    .topbar .meta { font-size: 13px; }
    .topbar .btn { font-size: 13px; padding: 8px 12px; }
    th, td { padding: 11px 10px; font-size: 15px; }
    thead th { font-size: 13.5px; }
    input.cell-num { font-size: 15px; padding: 6px 7px; }
    span.sector-tag { font-size: 12px; padding: 3px 9px; }
  }
</style>
</head>
<body>

<nav class="page-tabs">

<script>
/* ───────── 설정 ───────── */
const GH = {
  OWNER: 'whysosary-dot',
  REPO:  'stock-valuation',
  PATH:  'stocks.json',
  BRANCH:'main',
};
const LS_KEY = 'sv_user_inputs_v1';
const LS_UI_KEY = 'sv_ui_v1';

const USER_FIELDS = [
  'target_cap_oku','safety_cap_oku',
  'q1_op','q2_op','q3_op','q4_op',
  'idea'
];

/* 섹터 옵션 (드롭다운). 자유롭게 확장 가능 — 미분류는 빈값 */
const SECTORS = [
  '반도체','2차전지','조선','바이오','게임','에너지','산업재','자동차','전자부품','기타'
];
const SECTOR_UNCATEGORIZED = '未분류';

/* ───────── 컬럼 (티커 제거, 반응형 priority 제거) ───────── */
const COLS = [
  { key: 'name',            label: '기업명',        type: 'ro-text', sortable: true,  align: 'left' },
  { key: 'sector',          label: '섹터',          type: 'sector',  sortable: true,  align: 'center' },
  { key: '_upside',         label: '상방 %',        type: 'calc',    sortable: true },
  { key: '_downside',       label: '하방 %',        type: 'calc',    sortable: true },
  { key: '_chart3y',        label: '3년 차트',       type: 'chart3y', sortable: false, align: 'center' },
  { key: '_chart',          label: '1년 차트',       type: 'chart',   sortable: false, align: 'center' },
  { key: 'price_change_pct', label: '등락률',        type: 'change-pct',  sortable: true,  align: 'center' },
  { key: 'price_native',    label: '현재주가',      type: 'current-price', sortable: true },
  { key: 'market_cap_oku',  label: '현재시총 (억)',  type: 'current', sortable: true },
  { key: 'target_cap_oku',  label: '목표시총 (억)',  type: 'num',     sortable: true },
  { key: 'safety_cap_oku',  label: '안전시총 (억)',  type: 'num',     sortable: true },
  { key: '_op_sum',         label: '영업이익 합',    type: 'calc',    sortable: false, toggle: 'quarterly' },
  { key: 'q1_op',           label: '1Q 영업이익',    type: 'num',     sortable: true, group: 'q' },
  { key: 'q2_op',           label: '2Q 영업이익',    type: 'num',     sortable: true, group: 'q' },
  { key: 'q3_op',           label: '3Q 영업이익',    type: 'num',     sortable: true, group: 'q' },
  { key: 'q4_op',           label: '4Q 영업이익',    type: 'num',     sortable: true, group: 'q' },
  { key: '_por',            label: 'POR',           type: 'calc',    sortable: true },
  { key: '_target_por',    label: '목표 POR',       type: 'calc',    sortable: true },
  { key: 'idea',           label: '투자 아이디어',   type: 'text',    sortable: false, align: 'left' },
];

/* ───────── Sparkline ───────── */
function renderSparkline(prices, w=110, h=38) {
  if (!prices || prices.length < 2) return `<svg width="${w}" height="${h}"></svg>`;
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const pad = 2;
  const xs = prices.map((_, i) => pad + (i / (prices.length - 1)) * (w - pad * 2));
  const ys = prices.map(p => h - pad - ((p - min) / range) * (h - pad * 2));
  const path = xs.map((x, i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const color = prices[prices.length - 1] >= prices[0] ? '#b91c1c' : '#2563eb';
  // 영역 채우기용 path
  const areaPath = path + ` L${xs[xs.length-1].toFixed(1)},${h-pad} L${xs[0].toFixed(1)},${h-pad} Z`;
  const fillColor = prices[prices.length - 1] >= prices[0] ? 'rgba(185,28,28,0.08)' : 'rgba(37,99,235,0.08)';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <path d="${areaPath}" fill="${fillColor}" stroke="none"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

/* ───────── 상태 ───────── */
let state = {
  stocks: [],
  usdkrw: 0,
  updated_at: '',
  filter: '',
  sectorFilter: '',
  groupBySector: false,
  sortKey: '_upside',
  sortDir: 'desc',
  showQuarterly: false,  // "영업이익 합" 토글
};

function loadUi() {
  try { return JSON.parse(localStorage.getItem(LS_UI_KEY) || '{}') || {}; } catch { return {}; }
}
function saveUi() {
  localStorage.setItem(LS_UI_KEY, JSON.stringify({
    showQuarterly: state.showQuarterly,
    sectorFilter: state.sectorFilter,
    groupBySector: state.groupBySector,
  }));
}

/* 섹터 정규화 / 표시명 */
function normSector(v) {
  const s = (v == null ? '' : String(v)).trim();
  return s || SECTOR_UNCATEGORIZED;
}

/* 섹터 이름 → 색상.
   - 미분류는 채도 낮은 회색
   - 그 외는 현재 종목들에 등장하는 섹터 셋을 모아 황금각(137.508°)으로 균등 분배
     → 현재 보이는 섹터들 사이에서 항상 시각적으로 잘 구분됨
   - 섹터가 추가되면 buildSectorHueMap()이 다시 계산 (자동 색 부여) */
function _hashName(name) {
  // 31-base + finalizer (avalanche). 정렬 안정성을 위한 결정적 해시.
  let h = 0;
  for (let i = 0; i < name.length; i++) {
    h = (Math.imul(31, h) + name.charCodeAt(i)) | 0;
  }
  h ^= h >>> 16;
  h = Math.imul(h, 0x85ebca6b);
  h ^= h >>> 13;
  h = Math.imul(h, 0xc2b2ae35);
  h ^= h >>> 16;
  return h >>> 0;
}
const GOLDEN_ANGLE = 137.508;
function buildSectorHueMap() {
  const names = new Set();
  for (const s of state.stocks) {
    const n = normSector(s.sector);
    if (n !== SECTOR_UNCATEGORIZED) names.add(n);
  }
  // 해시 순으로 정렬해 결정적 + "랜덤한" 순서. 황금각 곱으로 균등 분배.
  const list = [...names].sort((a, b) => _hashName(a) - _hashName(b));
  const map = new Map();
  list.forEach((name, idx) => {
    map.set(name, (idx * GOLDEN_ANGLE) % 360);
  });
  state._sectorHueMap = map;
}
function sectorHue(name) {
  if (!name || name === SECTOR_UNCATEGORIZED) return null;
  const m = state._sectorHueMap;
  if (m && m.has(name)) return m.get(name);
  // 폴백: 해시 기반 (맵 빌드 전 호출되는 경우)
  return _hashName(name) % 360;
}
function sectorColors(name) {
  const hue = sectorHue(name);
  if (hue === null) {
    return { bg: '#f1f3f7', fg: '#94a3b8', bar: '#cfd5de', headerBg: '#f5f7fb' };
  }
  return {
    bg:       `hsl(${hue}, 72%, 92%)`,   // 칩 배경
    fg:       `hsl(${hue}, 50%, 27%)`,   // 칩 텍스트
    bar:      `hsl(${hue}, 65%, 50%)`,   // 좌측 컬러바 / 그룹 점 (진한 색)
    headerBg: `hsl(${hue}, 78%, 95%)`,   // 그룹 헤더 배경 (아주 옅게)
  };
}
function applyChipColor(el, name) {
  const c = sectorColors(name);
  el.style.backgroundColor = c.bg;
  el.style.color = c.fg;
}

/* ───────── localStorage 유저 입력 ───────── */
function loadUserInputs() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}') || {}; }
  catch { return {}; }
}
function saveUserInputs() {
  const obj = {};
  for (const s of state.stocks) {
    const t = s.ticker;
    if (!t) continue;
    const fields = {};
    for (const f of USER_FIELDS) {
      const v = s[f];
      if (v !== null && v !== undefined && v !== '') fields[f] = v;
    }
    if (Object.keys(fields).length) obj[t] = fields;
  }
  localStorage.setItem(LS_KEY, JSON.stringify(obj));
}

/* ───────── utils ───────── */
const fmt = (v, dec=0) => {
  if (v === null || v === undefined || v === '' || Number.isNaN(v)) return '';
  const n = Number(v);
  return Number.isFinite(n) ? n.toLocaleString('ko-KR', {minimumFractionDigits:dec, maximumFractionDigits:dec}) : '';
};
const parseNum = v => {
  if (v === null || v === undefined) return null;
  const s = String(v).replace(/,/g,'').trim();
  if (s === '') return null;
  const n = Number(s);
  return Number.isFinite(n) ? n : null;
};
const uid = () => Math.random().toString(36).slice(2,10);

/* 파생값 */
const opSum = s => [s.q1_op,s.q2_op,s.q3_op,s.q4_op].map(parseNum).filter(v=>v!==null).reduce((a,b)=>a+b,0);
const por = s => { const mc = parseNum(s.market_cap_oku), sum = opSum(s); return (!mc || !sum) ? null : mc/sum; };
const targetPor = s => { const t = parseNum(s.target_cap_oku), sum = opSum(s); return (!t || !sum) ? null : t/sum; };
const upside = s => { const mc = parseNum(s.market_cap_oku), t = parseNum(s.target_cap_oku); return (!mc || !t) ? null : (t/mc-1)*100; };
const downside = s => { const mc = parseNum(s.market_cap_oku), sf = parseNum(s.safety_cap_oku); return (!mc || !sf) ? null : (sf/mc-1)*100; };

/* 주가 표시 자릿수 (네이티브 통화 기준) */
function priceDecimals(s) {
  const p = parseNum(s && s.price_native);
  if (p === null) return 0;
  // 한국 주식(₩) / JPY 등 대면단위가 큰 경우 정수, 그 외(USD/HKD 등)는 소수 2자리
  const cur = (s.currency || '').toUpperCase();
  if (cur === 'KRW' || cur === 'JPY' || cur === '' && p >= 100) return 0;
  return 2;
}

function sortValue(s, k) {
  switch (k) {
    case 'price_change_pct': return parseNum(s.price_change_pct);
    case '_upside': return upside(s);
    case '_downside': return downside(s);
    case '_op_sum': return opSum(s);
    case '_por': return por(s);
    case '_target_por': return targetPor(s);
    case 'sector': return normSector(s.sector);
    default: return s[k];
  }
}

async function fetchFromGitHub() {
  const url = `https://raw.githubusercontent.com/${GH.OWNER}/${GH.REPO}/${GH.BRANCH}/${GH.PATH}?t=${Date.now()}`;
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

/* ───────── 렌더 ───────── */
function setSaveStatus(label, cls='') {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.textContent = label;
  el.classList.remove('warn','err');
  if (cls) el.classList.add(cls);
}

function applyQuarterlyClass() {
  const tbl = document.getElementById('tbl');
  if (!tbl) return;
  tbl.classList.toggle('show-quarterly', !!state.showQuarterly);
}

function renderHeader() {
  const tr = document.getElementById('header-row');
  tr.innerHTML = '';
  COLS.forEach((c, ci) => {
    const th = document.createElement('th');
    if (ci <= 3) { th.classList.add('col-sticky'); th.dataset.stickyIdx = String(ci); }
    if (ci === 3) th.classList.add('col-sticky-end');
    th.textContent = c.label;
    if (c.align === 'left') th.classList.add('text-left');
    if (c.group) th.setAttribute('data-col', c.group);
    if (c.toggle === 'quarterly') {
      th.classList.add('toggle-op-sum');
      if (state.showQuarterly) th.classList.add('expanded');
      th.title = '클릭하여 Q1~Q4 입력 보기/숨기기';
      th.addEventListener('click', () => {
        state.showQuarterly = !state.showQuarterly;
        saveUi();
        render();
      });
    } else if (c.sortable) {
      th.addEventListener('click', () => {
        if (state.sortKey === c.key) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        else { state.sortKey = c.key; state.sortDir = 'asc'; }
        render();
      });
      if (state.sortKey === c.key) th.classList.add(state.sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    } else {
      th.style.cursor = 'default';
    }
    tr.appendChild(th);
  });
}

function renderRow(s) {
  const tr = document.createElement('tr');
  tr.dataset.id = s._id;
  COLS.forEach((c, ci) => {
    const td = document.createElement('td');
    if (ci <= 3) { td.classList.add('col-sticky'); td.dataset.stickyIdx = String(ci); }
    if (ci === 3) td.classList.add('col-sticky-end');
    if (c.align === 'left') td.classList.add('text-left');
    if (c.align === 'center') td.classList.add('text-center');
    if (c.group) td.setAttribute('data-col', c.group);

    if (c.type === 'ro-text') {
      td.classList.add('readonly-cell', 'name');
      const ticker = s.ticker || '';
      const isKorean = ticker.endsWith('.KS') || ticker.endsWith('.KQ');
      const tickerCode = ticker.split('.')[0];
      const naverCode = s.naver_code || ticker;
      const naverUrl = isKorean
        ? `https://m.stock.naver.com/domestic/stock/${tickerCode}/total`
        : `https://m.stock.naver.com/worldstock/stock/${naverCode}/total`;
      if (tickerCode) {
        const a = document.createElement('a');
        a.href = naverUrl;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = s[c.key] || '';
        td.appendChild(a);
      } else {
        td.textContent = s[c.key] || '';
      }
    } else if (c.type === 'chart3y') {
      td.classList.add('chart-cell');
      td.innerHTML = renderSparkline(s.price_history_3y);
    } else if (c.type === 'chart') {
      td.classList.add('chart-cell');
      td.innerHTML = renderSparkline(s.price_history);
    } else if (c.type === 'sector') {
      td.classList.add('sector-cell');
      const cur = normSector(s.sector);
      const chip = document.createElement('span');
      chip.className = 'sector-tag';
      chip.textContent = (cur === SECTOR_UNCATEGORIZED) ? '미분류' : cur;
      applyChipColor(chip, cur);
      td.appendChild(chip);
    } else if (c.type === 'change-pct') {
      const v = parseNum(s[c.key]);
      if (v === null) {
        td.textContent = '—'; td.classList.add('dim');
      } else {
        td.textContent = (v >= 0 ? '+' : '') + fmt(v, 2) + '%';
        td.classList.add(v > 0 ? 'down' : v < 0 ? 'up' : 'dim');
        td.classList.add('text-center');
      }
    } else if (c.type === 'current') {
      td.classList.add('current-cap');
      const v = parseNum(s[c.key]);
      td.textContent = v === null ? '—' : fmt(v, 0);
      if (s.currency && s.currency !== 'KRW') td.title = `${s.currency} 기준 환산 (억원)`;
    } else if (c.type === 'current-price') {
      td.classList.add('current-cap');
      const v = parseNum(s[c.key]);
      const dec = priceDecimals(s);
      td.textContent = v === null ? '—' : fmt(v, dec);
      if (s.currency && s.currency !== 'KRW') td.title = `${s.currency} 기준`;
    } else if (c.type === 'num-price') {
      const dec = priceDecimals(s);
      const inp = document.createElement('input');
      inp.className = 'cell-num';
      inp.value = s[c.key] !== undefined && s[c.key] !== null && s[c.key] !== '' ? fmt(s[c.key], dec) : '';
      inp.inputMode = 'decimal';
      inp.addEventListener('focus', () => {
        const v = parseNum(s[c.key]);
        inp.value = v === null ? '' : String(v);
        inp.select();
      });
      inp.addEventListener('blur', () => {
        const v = parseNum(inp.value);
        s[c.key] = v;
        inp.value = v === null ? '' : fmt(v, dec);
        queueSave();
        render();
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') inp.blur();
        if (e.key === 'Escape') { inp.value = s[c.key] === null ? '' : String(s[c.key]); inp.blur(); }
      });
      td.appendChild(inp);
    } else if (c.type === 'num') {
      const inp = document.createElement('input');
      inp.className = 'cell-num';
      inp.value = s[c.key] !== undefined && s[c.key] !== null && s[c.key] !== '' ? fmt(s[c.key], 0) : '';
      inp.inputMode = 'decimal';
      inp.addEventListener('focus', () => {
        const v = parseNum(s[c.key]);
        inp.value = v === null ? '' : String(v);
        inp.select();
      });
      inp.addEventListener('blur', () => {
        const v = parseNum(inp.value);
        s[c.key] = v;
        inp.value = v === null ? '' : fmt(v, 0);
        queueSave();
        render();
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') inp.blur();
        if (e.key === 'Escape') { inp.value = s[c.key] === null ? '' : String(s[c.key]); inp.blur(); }
      });
      td.appendChild(inp);
    } else if (c.type === 'text') {
      td.classList.add('idea-cell', 'text-left');
      const wrap = document.createElement('div');
      wrap.className = 'idea-wrap';

      const ta = document.createElement('textarea');
      ta.className = 'cell-text';
      ta.placeholder = '메모...';
      ta.value = s[c.key] || '';
      ta.rows = 1;

      // 높이 자동계산: scrollHeight 기반
      const COLLAPSED_H = 30;
      const autoResize = () => {
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
      };
      const collapse = () => {
        ta.style.height = COLLAPSED_H + 'px';
        ta.style.overflow = 'hidden';
      };

      // 초기 상태: 접힘
      collapse();

      // 펼치기/접기 버튼
      const btn = document.createElement('button');
      btn.className = 'idea-toggle';
      btn.title = '펼치기 / 접기';
      btn.textContent = '▼';
      let expanded = false;
      const setExpanded = (val) => {
        expanded = val;
        if (expanded) {
          btn.textContent = '▲';
          btn.classList.add('expanded');
          autoResize();
          ta.style.overflow = 'hidden';
        } else {
          btn.textContent = '▼';
          btn.classList.remove('expanded');
          if (document.activeElement !== ta) collapse();
        }
      };
      btn.addEventListener('mousedown', (e) => {
        e.preventDefault(); // blur 방지
        setExpanded(!expanded);
      });

      // 줄수 뱃지 + 버튼 색 업데이트
      const updateBadge = (text) => {
        const lines = (text || '').split('\n').filter(l => l.trim() !== '').length;
        // 버튼 색
        btn.classList.toggle('has-content', lines > 0);
        // 기존 뱃지 제거
        const old = wrap.querySelector('.line-badge');
        if (old) old.remove();
        // 2줄 이상이면 뱃지 추가
        if (lines >= 2) {
          const badge = document.createElement('span');
          badge.className = 'line-badge';
          badge.textContent = lines + '줄';
          wrap.insertBefore(badge, btn);
        }
      };
      // 포커스 시 펼침 (입력 중 자동 확장)
      ta.addEventListener('focus', () => {
        ta.style.overflow = 'hidden';
        autoResize();
      });
      ta.addEventListener('input', autoResize);
      ta.addEventListener('blur', () => {
        s[c.key] = ta.value.trim();
        ta.value = s[c.key];
        updateBadge(s[c.key]);
        queueSave();
        if (!expanded) collapse();
      });
      ta.addEventListener('keydown', e => {
        if (e.key === 'Escape') { ta.value = s[c.key] || ''; ta.blur(); }
      });

      wrap.appendChild(ta);
      wrap.appendChild(btn);
      updateBadge(s[c.key]); // btn이 wrap에 추가된 후 호출
      td.appendChild(wrap);
    } else if (c.type === 'calc') {
      let text = '—', cls = 'dim';
      if (c.key === '_upside') {
        const v = upside(s);
        if (v !== null) { text = fmt(v,1) + '%'; cls = v >= 0 ? 'down' : 'up'; }  // +: red, −: blue
      } else if (c.key === '_downside') {
        const v = downside(s);
        if (v !== null) { text = fmt(v,1) + '%'; cls = v >= 0 ? 'down' : 'up'; }  // +: red, −: blue
      } else if (c.key === '_op_sum') {
        const v = opSum(s); text = v ? fmt(v,0) : '—'; cls = '';
        td.style.cursor = 'pointer';
        td.title = '클릭하여 Q1~Q4 보기/숨기기';
        td.addEventListener('click', () => {
          state.showQuarterly = !state.showQuarterly;
          saveUi();
          render();
        });
      } else if (c.key === '_por') {
        const v = por(s); text = v ? fmt(v,2) + '×' : '—'; cls = '';
      } else if (c.key === '_target_por') {
        const v = targetPor(s); text = v ? fmt(v,2) + '×' : '—'; cls = '';
      }
      td.textContent = text;
      if (cls) td.classList.add(cls);
    }
    tr.appendChild(td);
  });
  return tr;
}

function compareStocks(a, b, key, dirSign) {
  const av = sortValue(a, key), bv = sortValue(b, key);
  const aN = av === null || av === undefined || av === '' || Number.isNaN(av);
  const bN = bv === null || bv === undefined || bv === '' || Number.isNaN(bv);
  if (aN && bN) return 0;
  if (aN) return 1;
  if (bN) return -1;
  if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * dirSign;
  return String(av).localeCompare(String(bv), 'ko') * dirSign;
}

function buildGroupRow(sectorName, count, totalMcap) {
  const colors = sectorColors(sectorName);
  const tr = document.createElement('tr');
  tr.className = 'group-row';
  const td = document.createElement('td');
  td.colSpan = COLS.length;
  td.className = 'text-left';
  // 그룹 헤더: 옅은 섹터 배경 + 좌측 진한 색 바
  td.style.backgroundColor = colors.headerBg;
  td.style.boxShadow = `inset 5px 0 0 ${colors.bar}`;
  const span = document.createElement('span');
  span.className = 'group-name';
  span.style.color = colors.fg;
  span.innerHTML = `<span class="group-dot" style="background:${colors.bar};opacity:1"></span>${sectorName === SECTOR_UNCATEGORIZED ? '미분류' : sectorName}`;
  const meta = document.createElement('span');
  meta.className = 'group-meta';
  const partsM = [`${count}개 종목`];
  if (totalMcap) partsM.push(`합산 시총 ${fmt(totalMcap, 0)} 억`);
  meta.textContent = partsM.join(' · ');
  td.appendChild(span);
  td.appendChild(meta);
  tr.appendChild(td);
  return tr;
}

function render() {
  buildSectorHueMap();
  renderHeader();
  applyQuarterlyClass();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  tbody.classList.remove('grouped');

  let list = [...state.stocks];
  if (state.filter) {
    const q = state.filter.toLowerCase();
    list = list.filter(s =>
      (s.name || '').toLowerCase().includes(q) ||
      (s.ticker || '').toLowerCase().includes(q));
  }
  if (state.sectorFilter) {
    list = list.filter(s => normSector(s.sector) === state.sectorFilter);
  }

  const dirSign = state.sortDir === 'asc' ? 1 : -1;
  if (state.sortKey) {
    list.sort((a,b) => compareStocks(a, b, state.sortKey, dirSign));
  }

  if (!list.length) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = COLS.length;
    td.className = 'empty';
    td.textContent = (state.filter || state.sectorFilter) ? '검색 결과 없음' : '데이터 없음';
    tr.appendChild(td);
    tbody.appendChild(tr);
  } else if (state.groupBySector) {
    tbody.classList.add('grouped');
    // 그룹 모드: 섹터별로 묶어서, 각 그룹 헤더 + 그룹 내부는 현재 정렬키로 정렬
    const groups = new Map();
    list.forEach(s => {
      const sec = normSector(s.sector);
      if (!groups.has(sec)) groups.set(sec, []);
      groups.get(sec).push(s);
    });
    // 그룹 정렬: 시총 합 큰 순 (미분류는 항상 마지막)
    const entries = [...groups.entries()].map(([k, arr]) => {
      const total = arr.reduce((a, x) => a + (parseNum(x.market_cap_oku) || 0), 0);
      return { sector: k, items: arr, total };
    });
    entries.sort((a, b) => {
      if (a.sector === SECTOR_UNCATEGORIZED) return 1;
      if (b.sector === SECTOR_UNCATEGORIZED) return -1;
      return b.total - a.total;
    });
    entries.forEach(({ sector, items, total }) => {
      // 그룹 내부도 현재 sortKey가 있으면 정렬, 없으면 시총 큰 순
      const innerKey = state.sortKey || 'market_cap_oku';
      const innerDir = state.sortKey ? dirSign : -1;
      const sorted = [...items].sort((a, b) => compareStocks(a, b, innerKey, innerDir));
      tbody.appendChild(buildGroupRow(sector, items.length, total));
      const barColor = sectorColors(sector).bar;
      sorted.forEach(s => {
        const row = renderRow(s);
        // 그룹 모드에서 첫 셀에 색 띠
        if (row.firstChild) row.firstChild.style.boxShadow = `inset 3px 0 0 ${barColor}`;
        tbody.appendChild(row);
      });
    });
  } else {
    tbody.classList.remove('grouped');
    list.forEach(s => tbody.appendChild(renderRow(s)));
  }

  updateSectorFilterOptions();
  syncToggleButton();
  requestAnimationFrame(applyStickyOffsets);

  const m = document.getElementById('meta');
  const parts = [];
  if (state.updated_at) {
    const utc = new Date(state.updated_at + 'Z');
    const kst = new Date(utc.getTime() + 9 * 3600 * 1000);
    const kstStr = kst.toISOString().slice(0,16).replace('T',' ');
    parts.push(`시총 ${kstStr} KST`);
  }
  if (state.usdkrw) parts.push(`USDKRW ${Number(state.usdkrw).toFixed(1)}`);
  parts.push(`${state.stocks.length}개 종목`);
  if (state.sectorFilter) parts.push(`섹터: ${state.sectorFilter}`);
  m.textContent = parts.join(' · ');
}

function updateSectorFilterOptions() {
  const sel = document.getElementById('sector-filter');
  if (!sel) return;
  const counts = new Map();
  for (const s of state.stocks) {
    const k = normSector(s.sector);
    counts.set(k, (counts.get(k) || 0) + 1);
  }
  // 정렬: 사전 정의 SECTORS 순서 → 그 외 → 미분류 마지막
  const known = SECTORS.filter(name => counts.has(name));
  const extra = [...counts.keys()].filter(k => !SECTORS.includes(k) && k !== SECTOR_UNCATEGORIZED).sort((a,b)=>a.localeCompare(b,'ko'));
  const order = [...known, ...extra];
  if (counts.has(SECTOR_UNCATEGORIZED)) order.push(SECTOR_UNCATEGORIZED);

  const prev = state.sectorFilter;
  // 옵션이 동일하면 재구성 생략
  const sig = order.map(k => `${k}:${counts.get(k)}`).join('|');
  if (sel.dataset.sig === sig) { sel.value = prev; return; }
  sel.dataset.sig = sig;
  sel.innerHTML = '';
  const all = document.createElement('option');
  all.value = ''; all.textContent = `전체 섹터 (${state.stocks.length})`;
  sel.appendChild(all);
  order.forEach(name => {
    const o = document.createElement('option');
    o.value = name; o.textContent = `${name} (${counts.get(name)})`;
    sel.appendChild(o);
  });
  sel.value = prev;
}

function syncToggleButton() {
  const btn = document.getElementById('group-toggle');
  if (!btn) return;
  btn.classList.toggle('toggle-on', !!state.groupBySector);
}

function applyStickyOffsets() {
  const ths = [0,1,2,3].map(i => document.querySelector(`#header-row th[data-sticky-idx="${i}"]`));
  if (!ths[0]) return;
  let left = 0;
  ths.forEach((th, i) => {
    if (!th) return;
    document.querySelectorAll(`[data-sticky-idx="${i}"]`).forEach(el => { el.style.left = left + 'px'; });
    left += th.offsetWidth;
  });
}

let saveTimer = null;
function queueSave() {
  clearTimeout(saveTimer);
  setSaveStatus('저장 중...');
  saveTimer = setTimeout(() => {
    try {
      saveUserInputs();
      setSaveStatus('저장됨 ✓');
      setTimeout(() => setSaveStatus('로컬 저장'), 1200);
    } catch (e) {
      setSaveStatus('저장 실패', 'err');
      toast('저장 실패: ' + e.message, 'err');
    }
  }, 300);
}

function toast(msg, type='ok', ms=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms);
}

function mergeAndSetStocks(ghData) {
  const userInputs = loadUserInputs();
  let migrated = false;
  state.stocks = (ghData.stocks || []).map(s => {
    const ui = userInputs[s.ticker] || {};
    const merged = { _id: uid() };
    for (const [k, v] of Object.entries(s)) merged[k] = v;
    for (const f of USER_FIELDS) {
      merged[f] = (ui[f] !== undefined) ? ui[f] : (s[f] ?? null);
    }
    // ── v2(주가) → v3(시총) 역마이그레이션: 주가 입력값이 남아있으면 시총(억)으로 환산
    const mcNow = parseNum(s.market_cap_oku);
    const priceNow = parseNum(s.price_native);
    if (mcNow && priceNow) {
      if ((merged.target_cap_oku === null || merged.target_cap_oku === undefined) && ui.target_price) {
        const tp = parseNum(ui.target_price);
        if (tp !== null) { merged.target_cap_oku = (tp / priceNow) * mcNow; migrated = true; }
      }
      if ((merged.safety_cap_oku === null || merged.safety_cap_oku === undefined) && ui.safety_price) {
        const sp = parseNum(ui.safety_price);
        if (sp !== null) { merged.safety_cap_oku = (sp / priceNow) * mcNow; migrated = true; }
      }
    }
    return merged;
  });
  state.usdkrw = ghData.usdkrw || 0;
  state.updated_at = ghData.updated_at || '';
  if (migrated) {
    // 새로운 필드(target_price/safety_price) 기준으로 재저장
    saveUserInputs();
  }
}

async function silentRefresh() {
  try {
    const gh = await fetchFromGitHub();
    state.stocks.forEach(s => {
      const latest = (gh.stocks || []).find(x => x.ticker === s.ticker);
      if (latest) {
        s.market_cap_oku = latest.market_cap_oku;
        s.currency = latest.currency;
        s.price_native = latest.price_native;
      }
    });
    state.usdkrw = gh.usdkrw || state.usdkrw;
    state.updated_at = gh.updated_at || state.updated_at;
    render();
  } catch (_) {}
}

async function init() {
  const ui = loadUi();
  state.showQuarterly = !!ui.showQuarterly;
  state.sectorFilter = ui.sectorFilter || '';
  state.groupBySector = !!ui.groupBySector;

  try {
    const gh = await fetchFromGitHub();
    mergeAndSetStocks(gh);
  } catch (e) {
    toast('데이터 로드 실패: ' + e.message, 'err', 6000);
    state.stocks = [];
  }
  render();

  document.getElementById('filter').addEventListener('input', e => {
    state.filter = e.target.value.trim();
    render();
  });

  document.getElementById('sector-filter').addEventListener('change', e => {
    state.sectorFilter = e.target.value || '';
    saveUi();
    render();
  });

  document.getElementById('group-toggle').addEventListener('click', () => {
    state.groupBySector = !state.groupBySector;
    saveUi();
    render();
  });

  // 백업 버튼
  const backupModal = document.getElementById('backup-modal');
  const backupText  = document.getElementById('backup-text');
  const openBackup = () => {
    const inputs = loadUserInputs();
    const out = {
      _backup_date: new Date().toISOString().slice(0,19).replace('T',' '),
      _note: 'sv_user_inputs_v1',
      data: inputs,
    };
    backupText.value = JSON.stringify(out, null, 2);
    backupModal.style.display = 'flex';
    setTimeout(() => { backupText.select(); }, 80);
  };
  document.getElementById('backup-btn').addEventListener('click', openBackup);
  const closeBackup = () => { backupModal.style.display = 'none'; };
  document.getElementById('backup-close').addEventListener('click', closeBackup);
  document.getElementById('backup-close2').addEventListener('click', closeBackup);
  backupModal.addEventListener('click', e => { if (e.target === backupModal) closeBackup(); });
  document.getElementById('backup-copy').addEventListener('click', () => {
    backupText.select();
    const ok = document.execCommand('copy');
    if (ok) {
      document.getElementById('backup-copy').textContent = '복사됨 ✓';
      setTimeout(() => { document.getElementById('backup-copy').textContent = '전체 복사'; }, 1800);
    } else {
      // execCommand 안 될 때 Clipboard API 시도
      navigator.clipboard && navigator.clipboard.writeText(backupText.value).then(() => {
        document.getElementById('backup-copy').textContent = '복사됨 ✓';
        setTimeout(() => { document.getElementById('backup-copy').textContent = '전체 복사'; }, 1800);
      });
    }
  });

  // 불러오기 버튼
  const restoreModal = document.getElementById('restore-modal');
  const restoreMsg   = document.getElementById('restore-msg');
  document.getElementById('restore-btn').addEventListener('click', () => {
    document.getElementById('restore-text').value = '';
    restoreMsg.textContent = '';
    restoreModal.style.display = 'flex';
  });
  const closeRestore = () => { restoreModal.style.display = 'none'; };
  document.getElementById('restore-close').addEventListener('click', closeRestore);
  document.getElementById('restore-close2').addEventListener('click', closeRestore);
  restoreModal.addEventListener('click', e => { if (e.target === restoreModal) closeRestore(); });
  document.getElementById('restore-apply').addEventListener('click', () => {
    restoreMsg.textContent = '';
    try {
      const raw = document.getElementById('restore-text').value.trim();
      if (!raw) { restoreMsg.textContent = '내용을 입력해주세요.'; return; }
      const parsed = JSON.parse(raw);
      const data = parsed.data || parsed;
      if (typeof data !== 'object' || Array.isArray(data)) throw new Error('형식 오류');
      const target = document.getElementById('restore-modal').dataset.target;
      if (target === 'diary') {
        // diary 데이터: {daily:{}, weekly:{}} 구조
        const diaryData = (data.daily || data.weekly) ? data : { daily: data, weekly: {} };
        localStorage.setItem(DIARY_KEY, JSON.stringify(diaryData));
        diary.data = diaryData;
        closeRestore();
        toast('Diary 불러오기 완료!', 'ok', 2000);
        renderDiaryList();
      } else {
        localStorage.setItem(LS_KEY, JSON.stringify(data));
        closeRestore();
        toast('불러오기 완료! 새로고침합니다...', 'ok', 1500);
        setTimeout(() => location.reload(), 1600);
      }
    } catch(e) {
      restoreMsg.textContent = '❌ JSON 형식 오류: ' + e.message;
    }
  });

  // 포커스 복귀 시 자동 새로고침 (스케줄러 반영분 반영)
  let lastReload = Date.now();
  window.addEventListener('focus', () => {
    if (Date.now() - lastReload < 30_000) return;
    lastReload = Date.now();
    silentRefresh();
  });

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
      e.preventDefault();
      clearTimeout(saveTimer);
      saveUserInputs();
      setSaveStatus('저장됨 ✓');
      setTimeout(() => setSaveStatus('로컬 저장'), 1200);
    }
  });
}

  data: loadDiary(),
  selectedDate: null,   // "2026-05-07"
  selectedWeek: null,   // "2026-W19"
  mode: 'daily',
  saveTimer: null,
  searchQuery: '',
};

function todayDateStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getWeekKey(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - day);
  const year = d.getFullYear();
  const jan1 = new Date(year, 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + 1) / 7);
  return `${year}-W${String(week).padStart(2,'0')}`;
}

function formatDateFull(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const DAYS = ['일','월','화','수','목','금','토'];
  const today = todayDateStr();
  const prefix = dateStr === today ? '오늘 · ' : '';
  return `${prefix}${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;
}

function formatWeekFull(weekKey) {
  const [y, w] = weekKey.split('-W');
  return `${y}년 ${parseInt(w)}주차 전략`;
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const DAYS = ['일','월','화','수','목','금','토'];
  const today = todayDateStr();
  if (dateStr === today) return `오늘 (${DAYS[d.getDay()]})`;
  return `${d.getMonth()+1}/${d.getDate()} (${DAYS[d.getDay()]})`;
}

/* ── 매매 일지 렌더 ── */
function renderTradeView(dateStr) {
  const container = document.getElementById('diary-trade-view');
  container.innerHTML = '';
  if (!dateStr) { container.innerHTML = '<div class="trade-empty">날짜를 선택하세요</div>'; return; }
  if (!diary.data.trades) diary.data.trades = {};
  const trades = diary.data.trades[dateStr] || [];

  // 상단 바
  const bar = document.createElement('div');
  bar.className = 'trade-add-bar';
  const totalAmt = trades.reduce((s, t) => {
    const v = (parseFloat(String(t.qty||'').replace(/,/g,''))||0) * (parseFloat(String(t.price||'').replace(/,/g,''))||0);
    return s + (t.type === '매수' ? v : -v);
  }, 0);
  bar.innerHTML = `<strong>${trades.length}건</strong>${trades.length ? `<span class="trade-summary">순매수 ${totalAmt >= 0 ? '+' : ''}${Math.round(totalAmt).toLocaleString('ko-KR')}원</span>` : ''}`;
  const addBtn = document.createElement('button');
  addBtn.className = 'btn';
  addBtn.style.cssText = 'background:var(--accent);color:#fff;border-color:var(--accent);font-size:13px;padding:6px 14px;margin-left:auto;';
  addBtn.textContent = '+ 거래 추가';
  addBtn.addEventListener('click', () => {
    if (!diary.data.trades[dateStr]) diary.data.trades[dateStr] = [];
    diary.data.trades[dateStr].push({ id: uid(), type: '매수', name: '', qty: '', price: '', memo: '' });
    saveDiaryData(diary.data);
    renderTradeView(dateStr);
    renderDiaryList();
  });
  bar.appendChild(addBtn);
  container.appendChild(bar);

  if (!trades.length) {
    const empty = document.createElement('div');
    empty.className = 'trade-empty';
    empty.innerHTML = '거래 내역이 없습니다.<br>+ 거래 추가를 눌러 기록하세요.';
    container.appendChild(empty);
    return;
  }

  trades.forEach((trade) => {
    const card = document.createElement('div');
    card.className = 'trade-card';

    // Row 1: 매수/매도 | 종목명 | 삭제
    const row1 = document.createElement('div'); row1.className = 'trade-row1';
    const typeSel = document.createElement('select'); typeSel.className = `trade-type-sel ${trade.type === '매수' ? 'buy' : 'sell'}`;
    ['매수','매도'].forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; if (t === trade.type) o.selected = true; typeSel.appendChild(o); });
    typeSel.addEventListener('change', () => { trade.type = typeSel.value; typeSel.className = `trade-type-sel ${trade.type === '매수' ? 'buy' : 'sell'}`; saveDiaryData(diary.data); renderDiaryList(); });

    const nameInp = document.createElement('input'); nameInp.className = 'trade-inp name'; nameInp.placeholder = '종목명'; nameInp.value = trade.name || '';
    // 자동완성 후보 (stocks 목록)
    nameInp.setAttribute('list', 'stock-names-list');
    nameInp.addEventListener('input', () => { trade.name = nameInp.value; saveDiaryData(diary.data); renderDiaryList(); });

    const delBtn = document.createElement('button'); delBtn.className = 'trade-del-btn'; delBtn.textContent = '×'; delBtn.title = '삭제';
    delBtn.addEventListener('click', () => {
      diary.data.trades[dateStr] = diary.data.trades[dateStr].filter(t => t.id !== trade.id);
      if (!diary.data.trades[dateStr].length) delete diary.data.trades[dateStr];
      saveDiaryData(diary.data); renderTradeView(dateStr); renderDiaryList();
    });
    row1.append(typeSel, nameInp, delBtn);

    // Row 2: 수량 × 가격 = 합계
    const row2 = document.createElement('div'); row2.className = 'trade-row2';
    const qtyInp = document.createElement('input'); qtyInp.className = 'trade-inp num'; qtyInp.placeholder = '수량'; qtyInp.value = trade.qty || ''; qtyInp.inputMode = 'decimal';
    const priceInp = document.createElement('input'); priceInp.className = 'trade-inp num'; priceInp.placeholder = '가격'; priceInp.value = trade.price ? Number(trade.price).toLocaleString('ko-KR') : ''; priceInp.inputMode = 'decimal';
    const totalEl = document.createElement('span'); totalEl.className = 'trade-total';
    const calcTotal = () => {
      const q = parseFloat(String(qtyInp.value).replace(/,/g,'')) || 0;
      const p = parseFloat(String(priceInp.value).replace(/,/g,'')) || 0;
      totalEl.textContent = (q && p) ? `= ${Math.round(q*p).toLocaleString('ko-KR')}원` : '';
    };
    calcTotal();
    qtyInp.addEventListener('focus', () => { qtyInp.value = String(trade.qty || '').replace(/,/g,''); });
    qtyInp.addEventListener('blur', () => { trade.qty = qtyInp.value; qtyInp.value = trade.qty ? Number(trade.qty).toLocaleString('ko-KR') : ''; saveDiaryData(diary.data); calcTotal(); });
    qtyInp.addEventListener('input', calcTotal);
    priceInp.addEventListener('focus', () => { priceInp.value = String(trade.price || '').replace(/,/g,''); });
    priceInp.addEventListener('blur', () => { trade.price = priceInp.value; priceInp.value = trade.price ? Number(trade.price).toLocaleString('ko-KR') : ''; saveDiaryData(diary.data); calcTotal(); });
    priceInp.addEventListener('input', calcTotal);
    const mkLabel = t => { const s = document.createElement('span'); s.className = 'trade-label'; s.textContent = t; return s; };
    row2.append(mkLabel('수량'), qtyInp, mkLabel('주  ×  가격'), priceInp, mkLabel('원'), totalEl);

    // Row 3: 메모
    const row3 = document.createElement('div'); row3.className = 'trade-row3';
    const memoInp = document.createElement('input'); memoInp.className = 'trade-inp memo'; memoInp.placeholder = '매매 사유 / 메모'; memoInp.value = trade.memo || '';
    memoInp.addEventListener('input', () => { trade.memo = memoInp.value; saveDiaryData(diary.data); });
    row3.append(mkLabel('메모'), memoInp);

    card.append(row1, row2, row3);
    container.appendChild(card);
  });

  // 종목명 datalist
  let dl = document.getElementById('stock-names-list');
  if (!dl) { dl = document.createElement('datalist'); dl.id = 'stock-names-list'; document.body.appendChild(dl); }
  dl.innerHTML = '';
  (state.stocks || []).forEach(s => { const o = document.createElement('option'); o.value = s.name || ''; dl.appendChild(o); });
}

function diaryAutoSave() {
  const editor = document.getElementById('diary-editor');
  const status = document.getElementById('diary-save-status');
  const val = editor.value;

  if (diary.mode === 'daily' && diary.selectedDate) {
    if (val.trim()) diary.data.daily[diary.selectedDate] = val;
    else delete diary.data.daily[diary.selectedDate];
  } else if (diary.mode === 'weekly' && diary.selectedWeek) {
    if (val.trim()) diary.data.weekly[diary.selectedWeek] = val;
    else delete diary.data.weekly[diary.selectedWeek];
  }
  saveDiaryData(diary.data);
  document.getElementById('diary-char-count').textContent = val ? `${val.length}자` : '';
  status.textContent = '저장됨 ✓';
  status.className = 'diary-save-status saved';
  renderDiaryList();
}

function setDiaryEditor() {
  const editor = document.getElementById('diary-editor');
  const tradeView = document.getElementById('diary-trade-view');
  const dateLabel = document.getElementById('diary-date-label');
  const status = document.getElementById('diary-save-status');

  document.querySelectorAll('.diary-mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === diary.mode));

  const isTradeMode = diary.mode === 'trades';
  editor.style.display = isTradeMode ? 'none' : 'block';
  tradeView.style.display = isTradeMode ? 'block' : 'none';
  document.getElementById('diary-char-count').textContent = '';
  status.textContent = '';

  if (isTradeMode) {
    dateLabel.textContent = diary.selectedDate ? formatDateFull(diary.selectedDate) : '날짜를 선택하세요';
    renderTradeView(diary.selectedDate);
    return;
  }

  let content = '';
  if (diary.mode === 'daily' && diary.selectedDate) {
    dateLabel.textContent = formatDateFull(diary.selectedDate);
    content = diary.data.daily[diary.selectedDate] || '';
    editor.placeholder = '오늘의 투자 생각을 기록하세요...';
  } else if (diary.mode === 'weekly') {
    if (!diary.selectedWeek && diary.selectedDate)
      diary.selectedWeek = getWeekKey(diary.selectedDate);
    dateLabel.textContent = formatWeekFull(diary.selectedWeek);
    content = diary.data.weekly[diary.selectedWeek] || '';
    editor.placeholder = '이번 주 투자 전략을 정리하세요...';
  }

  editor.value = content;
  document.getElementById('diary-char-count').textContent = content ? `${content.length}자` : '';
  status.textContent = content ? '저장됨 ✓' : '';
  status.className = content ? 'diary-save-status saved' : 'diary-save-status';
  editor.focus();
}

function renderDiaryList() {
  const list = document.getElementById('diary-entry-list');
  list.innerHTML = '';

  // 일기 + 매매 일지 날짜 합집합
  const tradeKeys = Object.keys(diary.data.trades || {}).filter(k => (diary.data.trades[k]||[]).length > 0);
  const dailyKeys = [...new Set([
    ...Object.keys(diary.data.daily).filter(k => diary.data.daily[k]),
    ...tradeKeys
  ])].sort().reverse();
  const weeklyKeys = Object.keys(diary.data.weekly).filter(k => diary.data.weekly[k]).sort().reverse();

  const q = diary.searchQuery.toLowerCase().trim();

  // 검색 필터
  const filteredDaily = q
    ? dailyKeys.filter(k => (diary.data.daily[k]||'').toLowerCase().includes(q))
    : dailyKeys;
  const filteredWeekly = q
    ? weeklyKeys.filter(k => (diary.data.weekly[k]||'').toLowerCase().includes(q))
    : weeklyKeys;

  if (q) {
    const total = filteredDaily.length + filteredWeekly.length;
    const info = document.createElement('div');
    info.style.cssText = 'padding:8px 14px;font-size:12px;color:var(--accent);font-weight:600;';
    info.textContent = total ? `"${q}" ${total}건` : `"${q}" 결과 없음`;
    list.appendChild(info);
  }

  // 주간 전략 그룹
  if (filteredWeekly.length) {
    const grp = document.createElement('div');
    grp.className = 'diary-month-group';
    grp.innerHTML = `<div class="diary-month-label">주간 전략</div>`;
    filteredWeekly.forEach(wk => {
      const [y, w] = wk.split('-W');
      const isActive = diary.mode === 'weekly' && diary.selectedWeek === wk;
      const item = document.createElement('div');
      item.className = 'diary-entry-item' + (isActive ? ' active' : '');
      item.innerHTML = `<div class="ei-date">${y}년 ${parseInt(w)}주차</div>
        <div class="ei-preview">${(diary.data.weekly[wk]||'').split('\n')[0].slice(0,22)}</div>`;
      item.addEventListener('click', () => {
        diary.selectedWeek = wk; diary.selectedDate = null; diary.mode = 'weekly';
        setDiaryEditor(); renderDiaryList();
      });
      grp.appendChild(item);
    });
    list.appendChild(grp);
  }

  // 일간 일기 - 월별 그룹
  const byMonth = {};
  filteredDaily.forEach(k => { const m = k.slice(0,7); (byMonth[m] = byMonth[m]||[]).push(k); });
  Object.entries(byMonth).sort(([a],[b]) => b.localeCompare(a)).forEach(([month, keys]) => {
    const [y, m] = month.split('-');
    const grp = document.createElement('div');
    grp.className = 'diary-month-group';
    grp.innerHTML = `<div class="diary-month-label">${y}년 ${parseInt(m)}월</div>`;
    keys.forEach(k => {
      const isActive = diary.mode === 'daily' && diary.selectedDate === k;
      const item = document.createElement('div');
      item.className = 'diary-entry-item' + (isActive ? ' active' : '');
      const tradeCnt = ((diary.data.trades||{})[k]||[]).length;
      item.innerHTML = `<div class="ei-date">${formatDateShort(k)}${tradeCnt ? `<span class="ei-trade-badge">${tradeCnt}건</span>` : ''}</div>
        <div class="ei-preview">${(diary.data.daily[k]||'').split('\n')[0].slice(0,22)}</div>`;
      item.addEventListener('click', () => {
        diary.selectedDate = k; diary.mode = 'daily';
        diary.selectedWeek = getWeekKey(k);
        setDiaryEditor(); renderDiaryList();
      });
      grp.appendChild(item);
    });
    list.appendChild(grp);
  });

  if (!filteredDaily.length && !filteredWeekly.length && !q) {
    list.innerHTML += '<div class="diary-empty">아직 기록이 없어요</div>';
  }
}

function initDiary() {
  // 오늘 일기 버튼
  document.getElementById('diary-today-btn').addEventListener('click', () => {
    diary.selectedDate = todayDateStr();
    diary.selectedWeek = getWeekKey(diary.selectedDate);
    diary.mode = 'daily';
    setDiaryEditor(); renderDiaryList();
  });
  // 이번 주 전략 버튼
  document.getElementById('diary-weekly-btn').addEventListener('click', () => {
    diary.selectedWeek = getWeekKey(todayDateStr());
    diary.selectedDate = null;
    diary.mode = 'weekly';
    setDiaryEditor(); renderDiaryList();
  });
  // 모드 탭
  document.querySelectorAll('.diary-mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      diary.mode = btn.dataset.mode;
      if (diary.mode === 'weekly' && !diary.selectedWeek)
        diary.selectedWeek = getWeekKey(diary.selectedDate || todayDateStr());
      setDiaryEditor(); renderDiaryList();
    });
  });
  // 에디터 자동저장
  const editor = document.getElementById('diary-editor');
  editor.addEventListener('input', () => {
    const status = document.getElementById('diary-save-status');
    status.textContent = '저장 중...'; status.className = 'diary-save-status';
    clearTimeout(diary.saveTimer);
    diary.saveTimer = setTimeout(diaryAutoSave, 600);
  });
  editor.addEventListener('keydown', e => {
    if ((e.metaKey||e.ctrlKey) && e.key==='s') { e.preventDefault(); clearTimeout(diary.saveTimer); diaryAutoSave(); }
  });
  // 검색
  document.getElementById('diary-search').addEventListener('input', e => {
    diary.searchQuery = e.target.value;
    renderDiaryList();
  });

  // 백업 버튼
  document.getElementById('diary-backup-btn').addEventListener('click', () => {
    const out = JSON.stringify({
      _backup_date: new Date().toISOString().slice(0,19).replace('T',' '),
      _note: 'sv_diary_v1', data: diary.data
    }, null, 2);
    document.getElementById('backup-modal-title').textContent = '📔 Diary 백업';
    document.getElementById('backup-text').value = out;
    document.getElementById('backup-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('backup-text').select(), 80);
  });

  // 불러오기 버튼 (diary 전용)
  document.getElementById('diary-restore-btn').addEventListener('click', () => {
    document.getElementById('restore-text').value = '';
    document.getElementById('restore-msg').textContent = '';
    document.getElementById('restore-modal').dataset.target = 'diary';
    document.getElementById('restore-modal').style.display = 'flex';
  });
  // 초기: 오늘 날짜 선택
  diary.selectedDate = todayDateStr();
  diary.selectedWeek = getWeekKey(diary.selectedDate);
  setDiaryEditor();
  renderDiaryList();
}

initDiary();
</script>
