<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stock Valuation Dashboard</title>
<!-- iOS 홈화면 아이콘 (계산기 스타일) -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png" />
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="apple-touch-icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Stocks" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#000000" />
<style>
  :root {
    --bg: #f7f9fc;
    --panel: #ffffff;
    --panel-2: #f2f4f8;
    --border: #e3e7ee;
    --border-strong: #cfd5de;
    --text: #1f2933;
    --text-dim: #6b7480;
    --accent: #2563eb;
    --accent-soft: #eaf1fe;
    --blue: #2563eb;
    --red: #b91c1c;
    --header: #f0f3f8;
    --row-hover: #f6f8fc;
    --focus: #dbe8fe;
    --readonly: #fafbfd;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;  /* 스크롤은 .table-wrap 안에서만 발생 */
  }
  .topbar {
    flex: none;
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .topbar h1 {
    margin: 0; font-size: 18px; font-weight: 600;
    display: flex; align-items: center; gap: 9px;
    white-space: nowrap;
  }
  .topbar h1 .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); flex: none; }
  .topbar .spacer { flex: 1; min-width: 0; }
  .topbar .meta {
    color: var(--text-dim); font-size: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topbar .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent-soft); color: var(--accent);
    padding: 5px 11px; border-radius: 999px; font-size: 13px; font-weight: 500;
    white-space: nowrap;
  }
  .topbar .status-pill::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
  }
  .topbar .status-pill.warn { background: #fff3cd; color: #7a5d00; }
  .topbar .status-pill.warn::before { background: #d4a017; }
  .topbar .status-pill.err { background: #fde7e7; color: #9b1c1c; }
  .topbar .status-pill.err::before { background: #9b1c1c; }
  .topbar input.filter {
    background: var(--panel); border: 1px solid var(--border-strong); color: var(--text);
    padding: 9px 12px; border-radius: 6px; width: 240px; font-size: 15px;
    transition: border-color .15s, box-shadow .15s;
    min-width: 0;
  }
  .topbar input.filter:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus);
  }
  .btn {
    background: var(--panel); border: 1px solid var(--border-strong); color: var(--text);
    padding: 9px 14px; border-radius: 6px; cursor: pointer; font-size: 14px;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--panel-2); border-color: var(--accent); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast {
    position: fixed; right: 16px; bottom: 16px;
    background: var(--panel); border: 1px solid var(--border-strong);
    padding: 12px 16px; border-radius: 6px;
    color: var(--text); font-size: 14px; z-index: 100;
    max-width: 420px; box-shadow: 0 8px 24px rgba(15,23,42,0.12);
    opacity: 0; transform: translateY(10px); transition: all .2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.ok { border-color: #c4e5cf; background: #f1faf4; }
  .toast.err { border-color: #f3c4c4; background: #fdf1f1; }

  /* ── 여기가 핵심: 표 전체 영역이 스크롤 컨테이너, sticky는 여기 기준 ── */
  .table-wrap {
    flex: 1;
    min-height: 0;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px;
  }
  table {
    border-collapse: separate;
    border-spacing: 0;
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  th, td {
    padding: 11px 13px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    text-align: right;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    font-size: 15px;
  }
  th:last-child, td:last-child { border-right: none; }
  tbody tr:last-child td { border-bottom: none; }
  thead th {
    background: var(--header);
    position: sticky; top: 0; z-index: 3;
    font-weight: 600;
    color: #4a5568;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
    text-align: center;
  }
  thead th.sorted-asc::after { content: " ▲"; color: var(--accent); font-size: 12px; }
  thead th.sorted-desc::after { content: " ▼"; color: var(--accent); font-size: 12px; }
  th.text-left, td.text-left { text-align: left; }
  tbody tr { background: var(--panel); }
  tbody tr:hover { background: var(--row-hover); }
  tbody td { background: var(--panel); }
  tbody td.readonly-cell, tbody td.current-cap { background: var(--readonly); }

  input.cell-num {
    background: transparent; border: 1px solid transparent; color: var(--text);
    padding: 4px 6px; border-radius: 4px; width: 100%;
    font: inherit;
    font-size: 15px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  input.cell-num:focus {
    outline: none; border-color: var(--accent); background: white;
    box-shadow: 0 0 0 3px var(--focus);
  }
  input.cell-num::placeholder { color: #aab2bd; }

  /* ── 투자 아이디어 셀 ── */
  td.idea-cell { min-width: 480px; max-width: 600px; padding: 4px 6px; vertical-align: middle; }
  .idea-wrap {
    display: flex; align-items: center; gap: 4px; width: 100%;
  }
  textarea.cell-text {
    background: transparent; border: 1px solid transparent; color: var(--text);
    padding: 4px 6px; border-radius: 4px; width: 100%;
    font: inherit; font-size: 15px; text-align: left;
    resize: none; overflow: hidden;
    line-height: 1.4;
    transition: height 0.12s ease;
    white-space: pre-wrap; word-break: break-all;
    box-sizing: border-box;
  }
  textarea.cell-text:focus {
    outline: none; border-color: var(--accent); background: white;
    box-shadow: 0 0 0 3px var(--focus);
  }
  textarea.cell-text::placeholder { color: #aab2bd; }
  .idea-toggle {
    flex-shrink: 0; background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 13px; padding: 3px 2px; line-height: 1;
    opacity: 0.5; transition: opacity 0.15s, color 0.15s;
    margin-top: 2px;
  }
  .idea-toggle:hover { opacity: 1; color: var(--accent); }
  .idea-toggle.expanded { opacity: 0.8; }
  .idea-toggle.has-content { color: var(--accent); opacity: 1; }
  .line-badge {
    flex-shrink: 0;
    font-size: 11px; font-weight: 600;
    background: var(--accent-soft); color: var(--accent);
    border-radius: 999px; padding: 2px 7px;
    margin-top: 4px;
    white-space: nowrap;
    pointer-events: none;
  }
  .text-center { text-align: center; }
  td.chart-cell { width: 120px; min-width: 120px; padding: 6px 8px; text-align: center; }
  td.chart-cell svg { display: block; margin: 0 auto; }

  .readonly-cell { color: var(--text); font-weight: 500; }
  .readonly-cell.name { font-weight: 600; }
  .readonly-cell.name a {
    color: inherit; text-decoration: none;
  }
  .readonly-cell.name a:hover {
    color: var(--accent); text-decoration: underline;
  }
  .current-cap { color: var(--text); font-weight: 600; }
  /* 현재/목표/안전시총 컬럼 최소 너비 — 큰 값(1000조원급) 잘림 방지 */
  td.cap-col, th.cap-col { min-width: 140px; }

  .num { font-variant-numeric: tabular-nums; }
  .up { color: var(--blue); font-weight: 600; }
  .down { color: var(--red); font-weight: 600; }
  .dim { color: var(--text-dim); }

  .empty { padding: 40px; text-align: center; color: var(--text-dim); }

  /* 영업이익 합: 클릭으로 Q1~Q4 펼침/접힘 */
  thead th.toggle-op-sum {
    background: #e9efff;
    color: var(--accent);
  }
  thead th.toggle-op-sum::after {
    content: " ▸"; font-size: 13px; margin-left: 5px;
  }
  thead th.toggle-op-sum.expanded::after { content: " ▾"; }
  /* 접힘 상태에서 Q 컬럼 숨김 */
  table:not(.show-quarterly) [data-col^="q"] { display: none; }

  /* 섹터 칩 (읽기 전용 표시) — 색은 JS에서 인라인 스타일로 주입 */
  td.sector-cell { padding: 8px 10px; }
  span.sector-tag {
    display: inline-block;
    border-radius: 999px;
    padding: 3px 11px;
    font-size: 13px; font-weight: 500;
    color: var(--text); background-color: var(--panel-2);
    white-space: nowrap;
  }
  /* 색상은 인라인 스타일로 주입 (sectorColors() 참고) */

  /* 섹터 그룹 헤더 행 — 배경색/좌측 컬러바는 JS에서 인라인 주입 */
  tr.group-row td {
    border-top: 1px solid var(--border-strong);
    border-bottom: 1px solid var(--border-strong);
    padding: 11px 13px 11px 18px;
    font-weight: 700;
    color: var(--text);
    font-size: 14px;
    /* box-shadow는 JS에서 inset 5px 0 0 [strong-color] 으로 덮어씀 */
    box-shadow: inset 5px 0 0 var(--border-strong);
  }
  tr.group-row .group-name { display: inline-flex; align-items: center; gap: 8px; }
  tr.group-row .group-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: currentColor; opacity: 0.95;
  }
  tr.group-row .group-meta {
    color: var(--text-dim); font-weight: 500; margin-left: 10px; font-size: 13px;
  }
  /* 그룹 모드: 그룹 내 행 첫 셀에 좌측 색 띠 (인라인으로 색 주입) */
  tbody.grouped tr:not(.group-row) td:first-child {
    box-shadow: inset 3px 0 0 transparent;
    padding-left: 16px;
  }

  /* 토픽바 select / 토글 버튼 */
  .topbar select.sector-filter {
    background: var(--panel); border: 1px solid var(--border-strong); color: var(--text);
    padding: 9px 30px 9px 12px; border-radius: 6px; font-size: 14px;
    appearance: none; -webkit-appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%),
                      linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px, 5px 5px; background-repeat: no-repeat;
    cursor: pointer; min-width: 0;
  }
  .topbar select.sector-filter:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus);
  }
  .btn.toggle-on {
    background: var(--accent-soft); border-color: var(--accent); color: var(--accent);
  }

  /* ── 열 고정 (기업명 · 섹터) ── */
  th.col-sticky, td.col-sticky {
    position: sticky;
    z-index: 1;
  }
  thead th.col-sticky {
    z-index: 4; /* 일반 sticky 헤더(3) + body sticky(1) 위 */
    background: var(--header);
  }
  tbody td.col-sticky {
    background: var(--panel);
  }
  tbody td.col-sticky.readonly-cell {
    background: var(--readonly);
  }
  tbody tr:hover td.col-sticky,
  tbody tr:hover td.col-sticky.readonly-cell {
    background: var(--row-hover);
  }
  /* 고정 구역 끝 오른쪽 구분선 */
  th.col-sticky-end, td.col-sticky-end {
    border-right: 2px solid var(--border-strong) !important;
    box-shadow: 3px 0 8px -3px rgba(15,23,42,0.10);
  }

  /* ── 페이지 탭 ── */
  .page-tabs {
    flex: none; display: flex; align-items: center;
    flex-wrap: wrap;
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 0 8px; gap: 0;
  }
  .page-tabs .tabs-spacer { flex: 1; min-width: 8px; }
  .gh-commit-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent); color: #fff; border: none;
    padding: 7px 14px; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 600; white-space: nowrap;
    transition: opacity .15s, background .15s;
    margin-left: 8px;
  }
  .gh-commit-btn:hover { opacity: .88; }
  .gh-commit-btn:disabled { opacity: .5; cursor: not-allowed; }
  .gh-settings-btn {
    background: none; border: none; cursor: pointer; font-size: 16px;
    color: var(--text-dim); padding: 4px 6px; border-radius: 5px;
    transition: color .15s, background .15s;
    line-height: 1;
  }
  .gh-settings-btn:hover { color: var(--accent); background: var(--accent-soft); }
  /* PAT 모달 */
  .pat-modal-body { display: flex; flex-direction: column; gap: 12px; }
  .pat-modal-desc { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
  .pat-modal-desc a { color: var(--accent); }
  .pat-inp {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border-strong);
    border-radius: 7px; font-size: 14px; font-family: monospace;
    background: var(--panel); color: var(--text);
  }
  .pat-inp:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus); }
  .page-tab-btn {
    padding: 11px 20px; background: none; border: none;
    border-bottom: 3px solid transparent; margin-bottom: -1px;
    cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text-dim); transition: color .15s, border-color .15s;
    white-space: nowrap; flex-shrink: 0;
  }
  .page-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .page-tab-btn:hover:not(.active) { color: var(--text); }
  .page-tab-btn .update-dot {
    display: none; width: 4px; height: 4px; background: #10b981;
    border-radius: 50%; margin-right: 4px; vertical-align: 2px;
    box-shadow: 0 0 0 1px rgba(16,185,129,0.18);
    animation: updateDotPulse 2.4s ease-in-out infinite;
  }
  .page-tab-btn.has-update .update-dot { display: inline-block; }
  @keyframes updateDotPulse {
    0%,100% { box-shadow: 0 0 0 1px rgba(16,185,129,0.18); }
    50%     { box-shadow: 0 0 0 2px rgba(16,185,129,0.32); }
  }
  .page { display: none; flex: 1; min-height: 0; flex-direction: column; }
  .page.active { display: flex; }

  /* ── Diary ── */
  .diary-topbar {
    flex: none; display: flex; align-items: center; gap: 10px; flex-wrap: nowrap;
    padding: 12px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
    overflow: visible;
  }
  .diary-topbar .diary-tabs { flex: none; }
  .diary-topbar .spacer { flex: 1; min-width: 8px; }
  /* ── 탭 색상 변수 ── */
  .diary-tabs {
    --tab-daily-color:   #2563eb; --tab-daily-bg:   #eff4ff; --tab-daily-border:   #bfcffe;
    --tab-weekly-color:  #059669; --tab-weekly-bg:  #ecfdf5; --tab-weekly-border:  #a7f3d0;
    --tab-trades-color:  #d97706; --tab-trades-bg:  #fffbeb; --tab-trades-border:  #fcd34d;
  }
  /* 탭 버튼 */
  .diary-tabs { display: flex; gap: 4px; background: var(--panel-2); border-radius: 10px; padding: 4px; }
  .dtab {
    padding: 7px 14px; border: 1.5px solid transparent; border-radius: 7px;
    background: transparent; cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text-dim); transition: background .15s, color .15s, border-color .15s;
  }
  .dtab:hover { background: var(--panel); color: var(--text); }
  /* 일기 탭 활성 */
  .dtab[data-tab="daily"].active  { background: var(--tab-daily-bg);  color: var(--tab-daily-color);  border-color: var(--tab-daily-border);  box-shadow: 0 1px 4px rgba(37,99,235,.12); }
  /* 주간 전략 탭 활성 */
  .dtab[data-tab="weekly"].active { background: var(--tab-weekly-bg); color: var(--tab-weekly-color); border-color: var(--tab-weekly-border); box-shadow: 0 1px 4px rgba(5,150,105,.12); }
  /* 매매일지 탭 활성 */
  .dtab[data-tab="trades"].active { background: var(--tab-trades-bg); color: var(--tab-trades-color); border-color: var(--tab-trades-border); box-shadow: 0 1px 4px rgba(217,119,6,.12); }
  /* 강조 탭 활성 */
  .dtab[data-tab="highlights"].active { background: #fde7e7; color: #e23a3a; border-color: #f5b5b5; box-shadow: 0 1px 4px rgba(226,58,58,.12); }

  /* ── 모바일 반응형 (max-width: 700px) ──
     iOS Safari 에서 flex + overflow-x:auto 가 가끔 작동하지 않는다.
     display:block + white-space:nowrap + inline-block 자식 패턴이 가장 신뢰성 있다.
     specificity / source-order 이슈를 확실히 피하기 위해 !important 사용. */
  @media (max-width: 700px) {
    .diary-topbar { flex-wrap: wrap !important; gap: 8px; padding: 10px 12px; }
    .diary-topbar .diary-tabs {
      display: block !important;
      flex: 1 1 100% !important;
      width: 100% !important;
      max-width: 100% !important;
      overflow-x: auto !important;
      -webkit-overflow-scrolling: touch !important;
      white-space: nowrap !important;
      scrollbar-width: none;
    }
    .diary-topbar .diary-tabs::-webkit-scrollbar { display: none !important; }
    .diary-topbar .dtab {
      display: inline-block !important;
      flex: 0 0 auto !important;
      font-size: 13px;
      padding: 6px 11px;
      white-space: nowrap !important;
      vertical-align: middle;
    }
    .diary-topbar .spacer { display: none !important; }
    .diary-topbar .diary-search-inp { flex: 1 1 100% !important; min-width: 0; }
    .diary-topbar .diary-fmt-btn,
    .diary-topbar #diary-backup-btn,
    .diary-topbar #diary-pull-btn { flex: 0 0 auto; font-size: 13px; padding: 6px 10px; }
  }
  /* 카운트 뱃지 */
  .dtab .dtab-cnt {
    display: inline-block; margin-left: 5px; font-size: 12px; font-weight: 700;
    background: rgba(0,0,0,.07); color: inherit;
    border-radius: 999px; padding: 1px 6px; transition: background .15s;
  }
  .dtab[data-tab="daily"].active  .dtab-cnt { background: #dbeafe; }
  .dtab[data-tab="weekly"].active .dtab-cnt { background: #d1fae5; }
  .dtab[data-tab="trades"].active .dtab-cnt { background: #fde68a; }
  /* 피드 영역 */
  .diary-feed-wrap { flex: 1; min-height: 0; position: relative; overflow: hidden; }
  .diary-feed {
    display: none; position: absolute; inset: 0;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 18px 20px 40px;
  }
  .diary-feed.active { display: block; }
  /* 카드 */
  .dcard {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 16px;
    overflow: hidden; transition: box-shadow .15s;
  }
  .dcard:hover { box-shadow: 0 2px 10px rgba(15,23,42,0.08); }
  .dcard-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--panel-2);
  }
  .dcard-date { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
  /* 피드별 날짜 색상 */
  #feed-daily  .dcard-date { color: #1d4ed8; }
  #feed-weekly .dcard-date { color: #047857; }
  #feed-trades .dcard-date { color: #b45309; }
  /* 피드별 카드 헤더 배경 */
  #feed-daily  .dcard-header { background: #f0f5ff; border-bottom-color: #dbeafe; }
  #feed-weekly .dcard-header { background: #f0fdf8; border-bottom-color: #d1fae5; }
  #feed-trades .dcard-header { background: #fffdf0; border-bottom-color: #fde68a; }
  /* 피드별 카드 테두리 */
  #feed-daily  .dcard { border-color: #dbeafe; }
  #feed-weekly .dcard { border-color: #d1fae5; }
  #feed-trades .dcard { border-color: #fde68a; }
  /* 오늘/이번주 뱃지 */
  #feed-daily  .dcard-today { color: #1d4ed8; background: #dbeafe; }
  #feed-weekly .dcard-today { color: #047857; background: #d1fae5; }
  #feed-trades .dcard-today { color: #92400e; background: #fde68a; }
  .dcard-chars { font-size: 13px; color: var(--text-dim); }
  .dcard-del {
    background: none; border: none; cursor: pointer; color: var(--text-dim);
    font-size: 15px; padding: 2px 5px; border-radius: 4px; opacity: 0.45;
    transition: opacity .15s, color .15s;
  }
  .dcard-del:hover { opacity: 1; color: var(--red); }
  /* 일기·주간 textarea + contenteditable div 공용 */
  textarea.dcard-ta,
  .dcard-edit {
    display: block; width: 100%; box-sizing: border-box;
    padding: 16px 18px; background: transparent; border: none;
    color: var(--text); font: inherit; font-size: 15px; line-height: 1.6;
    resize: none; overflow: hidden; min-height: 60px;
    white-space: pre-wrap; word-break: break-word;
  }
  textarea.dcard-ta:focus,
  .dcard-edit:focus { outline: none; background: #fafbff; }
  textarea.dcard-ta::placeholder { color: #aab2bd; }
  .dcard-edit:empty::before {
    content: attr(data-placeholder);
    color: #aab2bd; pointer-events: none;
  }
  /* 새 항목 버튼 */
  .diary-new-card-btn {
    width: 100%; padding: 15px; border: 2px dashed var(--border);
    border-radius: 12px; background: transparent; cursor: pointer;
    font-size: 15px; color: var(--text-dim); margin-bottom: 16px;
    transition: border-color .15s, color .15s, background .15s;
  }
  .diary-new-card-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  /* 빈 상태 */
  .diary-empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 15px; }
  .diary-save-badge {
    display: inline-block; font-size: 12px; color: #16a34a; font-weight: 500;
    opacity: 0; transition: opacity .3s;
  }
  .diary-save-badge.show { opacity: 1; }
  /* ── 다이어리 검색창 ── */
  .diary-search-inp {
    flex: 0 0 180px;
    padding: 7px 12px; border: 1.5px solid var(--border);
    border-radius: 8px; background: var(--panel-2);
    color: var(--text); font: inherit; font-size: 14px;
    transition: border-color .15s, box-shadow .15s;
    display: block;
  }
  .diary-search-inp:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .diary-search-inp::placeholder { color: var(--text-dim); }
  .dcard.search-hidden { display: none; }
  /* ── 검색 하이라이트 ── */
  .search-mark {
    background: #fef08a;
    color: #1a1a1a;
    border-radius: 2px;
    padding: 0 2px;
    font-weight: 600;
  }
  .search-snippet-bar {
    padding: 8px 18px 10px;
    border-top: 1px dashed var(--border);
    background: #fffdf0;
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .search-snippet-bar .snippet-item {
    display: block;
    margin-bottom: 4px;
  }
  .search-snippet-bar .snippet-item:last-child { margin-bottom: 0; }
  /* ── 매매일지 카드 내부 ── */
  .dcard--trades .trade-section { padding: 14px 16px 6px; }
  .trade-add-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .trade-add-bar strong { font-size: 14px; color: var(--text-dim); }
  .trade-summary { font-size: 14px; color: var(--text-dim); margin-left: auto; }
  .trade-profit { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .trade-profit.gain { color: #16a34a; }
  .trade-profit.loss { color: var(--red); }
  .trade-unclosed { font-size: 13px; font-weight: 500; white-space: nowrap; color: #7c3aed; cursor: default; }
  .trade-stats { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .trade-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .trade-row1 { display: flex; align-items: center; gap: 8px; }
  .trade-row2 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .trade-row3 { display: flex; align-items: flex-start; gap: 8px; padding-top: 2px; }
  .trade-type-sel {
    flex-shrink: 0; padding: 6px 10px; border: none; border-radius: 6px;
    font-size: 14px; font-weight: 700; cursor: pointer; appearance: none; -webkit-appearance: none;
  }
  .trade-type-sel.buy { background: #eaf1fe; color: var(--blue); }
  .trade-type-sel.sell { background: #fde7e7; color: var(--red); }
  .trade-inp {
    background: var(--panel-2); border: 1px solid transparent; color: var(--text);
    padding: 6px 9px; border-radius: 6px; font: inherit; font-size: 15px;
    transition: border-color .12s, background .12s;
  }
  .trade-inp:focus { outline: none; border-color: var(--accent); background: white; box-shadow: 0 0 0 2px var(--focus); }
  .trade-inp.name { flex: 1; font-weight: 600; }
  .trade-inp.num { width: 100px; text-align: right; font-variant-numeric: tabular-nums; }
  .trade-total { font-size: 14px; font-weight: 600; color: var(--text-dim); margin-left: auto; white-space: nowrap; }
  .trade-del-btn {
    flex-shrink: 0; background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 16px; padding: 3px 5px; border-radius: 4px;
    opacity: 0.5; transition: opacity .15s, color .15s;
  }
  .trade-del-btn:hover { opacity: 1; color: var(--red); }
  /* ── 매매일지 메모 (textarea + contenteditable 공용) ── */
  textarea.memo-text,
  .memo-edit {
    flex: 1; color: var(--text);
    background: transparent; border: 1px solid transparent;
    padding: 6px 10px; border-radius: 6px;
    font: inherit; font-size: 15px; resize: none; overflow: hidden;
    line-height: 1.5; min-height: 30px;
    transition: height 0.12s ease, border-color .12s;
    white-space: pre-wrap; word-break: break-all;
    box-sizing: border-box;
  }
  textarea.memo-text:focus,
  .memo-edit:focus {
    outline: none; border-color: var(--accent); background: white;
    box-shadow: 0 0 0 2px var(--focus); color: var(--text);
  }
  textarea.memo-text::placeholder { color: #aab2bd; }
  .memo-edit:empty::before {
    content: attr(data-placeholder);
    color: #aab2bd; pointer-events: none;
  }

  /* ── 다이어리 서식 버튼 ── */
  .diary-fmt-btn {
    flex: none; display:inline-flex; align-items:center; justify-content:center;
    gap:4px; padding: 6px 12px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--panel); cursor: pointer;
    font-size: 13.5px; font-weight: 700; color: var(--red);
    transition: background .12s, border-color .12s;
  }
  .diary-fmt-btn:hover { background: #fde7e7; border-color: var(--red); }
  .diary-fmt-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  /* 강조 해제 버튼 — 회색 톤 */
  .diary-fmt-btn.clear { color: var(--text-dim); font-weight: 600; }
  .diary-fmt-btn.clear:hover { background: var(--panel-2); border-color: var(--text-dim); }

  /* ── 강조 탭 카드 ── */
  .highlight-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px; margin-bottom: 10px;
  }
  .highlight-meta {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    font-size: 12.5px; color: var(--text-dim); margin-bottom: 8px;
  }
  .highlight-date { font-weight: 600; color: var(--text-2); }
  .highlight-tag {
    padding: 2px 8px; background: var(--panel-2);
    border-radius: 4px; font-size: 11.5px; color: var(--text-dim);
  }
  .highlight-tag.daily   { background: #e0f0ff; color: #1e6fb8; }
  .highlight-tag.weekly  { background: #e8f4e0; color: #4d8c2c; }
  .highlight-tag.trades  { background: #fff0e0; color: #b86b1e; }
  .highlight-body {
    font-size: 15px; line-height: 1.7; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
  }
  .highlight-card:hover { border-color: var(--accent); cursor: pointer; }
  .trade-label { font-size: 14px; color: var(--text-dim); white-space: nowrap; }
  .trade-empty { padding: 40px 20px; text-align: center; color: var(--text-dim); font-size: 15px; }
  .ei-trade-badge {
    font-size: 12px; font-weight: 600; background: #fde7e7; color: var(--red);
    border-radius: 4px; padding: 1px 5px; margin-left: 4px; vertical-align: middle;
  }

  /* 데스크톱 스크롤바 */
  .table-wrap::-webkit-scrollbar { width: 10px; height: 10px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .table-wrap::-webkit-scrollbar-thumb { background: #d0d6de; border-radius: 5px; }
  .table-wrap::-webkit-scrollbar-thumb:hover { background: #b5bcc6; }

  /* 터치 기기 스크롤바 숨김 */
  @media (hover: none) and (pointer: coarse) {
    .table-wrap::-webkit-scrollbar { display: none; width: 0; height: 0; }
    .table-wrap { scrollbar-width: none; -ms-overflow-style: none; }
  }

  /* ── 즐겨찾기 별 버튼 ── */
  .star-btn {
    background: none; border: none; cursor: pointer;
    font-size: 15px; padding: 0 3px 0 0; line-height: 1;
    color: #d4a017; opacity: 0.2;
    transition: opacity .15s, color .15s;
    flex-shrink: 0; vertical-align: middle;
  }
  .star-btn.active { opacity: 1; color: #d4a017; }
  .star-btn:hover { opacity: 0.7; }
  .name-wrap { display: flex; align-items: center; gap: 1px; }
  /* 즐겨찾기 필터 버튼 활성 색 */
  .btn.fav-on { background: #fff8e1; border-color: #d4a017; color: #7a5400; }

  /* 좁은 뷰포트에서 topbar 가독성 보존 (컬럼 숨김은 하지 않음) */
  @media (max-width: 640px) {
    .topbar { padding: 11px 13px; gap: 9px; }
    .topbar h1 { font-size: 16px; }
    .topbar input.filter { width: 150px; font-size: 15px; padding: 9px 11px; }
    .topbar select.sector-filter { font-size: 13px; padding: 9px 28px 9px 11px; }
    .topbar .meta { font-size: 13px; }
    .topbar .btn { font-size: 13px; padding: 8px 12px; }
    th, td { padding: 11px 10px; font-size: 15px; }
    thead th { font-size: 13.5px; }
    input.cell-num { font-size: 15px; padding: 6px 7px; }
    span.sector-tag { font-size: 12px; padding: 3px 9px; }
  }

</style>
</head>

<div id="pat-modal" style="display:none; position:fixed; inset:0; z-index:300; background:rgba(15,23,42,0.45); align-items:center; justify-content:center; padding:16px;">
  <div style="background:#fff; border-radius:12px; padding:24px; max-width:480px; width:100%; display:flex; flex-direction:column; gap:16px; box-shadow:0 20px 60px rgba(15,23,42,0.25);">

      <strong style="font-size:16px;">🔑 GitHub 토큰 설정</strong>
      <button id="pat-close" style="background:none; border:none; font-size:20px; cursor:pointer; color:#6b7480; padding:0 4px;">✕</button>
    </div>
    <div class="pat-modal-body">
      <p class="pat-modal-desc">

        토큰은 <strong>이 기기의 브라우저(localStorage)에만</strong> 저장되며 외부로 전송되지 않습니다.<br><br>
        <a href="https://github.com/settings/tokens/new" target="_blank">→ GitHub에서 PAT 발급</a>
        (권한: <code>repo</code> 체크)
      </p>
      <input id="pat-inp" class="pat-inp" type="password" placeholder="ghp_xxxxxxxxxxxxxxxx" autocomplete="off" />
      <div style="display:flex; gap:8px;">
        <button id="pat-save" class="btn" style="flex:1; background:#2563eb; color:#fff; border-color:#2563eb; font-weight:600;">저장</button>
        <button id="pat-clear" class="btn" style="flex:none; color:#b91c1c; border-color:#b91c1c;">삭제</button>
      </div>
      <div id="pat-status" style="font-size:13px; color:#16a34a; display:none;">✓ 저장됨</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ───────── 설정 ───────── */
const GH = {
  OWNER: 'whysosary-dot',
  REPO:  'stock-valuation',
  PATH:  'stocks.json',
  BRANCH:'main',
};
const LS_KEY = 'sv_user_inputs_v1';
const LS_UI_KEY = 'sv_ui_v1';
const LS_PAT_KEY = 'sv_github_pat';

const USER_FIELDS = [
  'target_cap_oku','safety_cap_oku',
  'q1_op','q2_op','q3_op','q4_op',
  'idea','favorite'
];

/* 섹터 옵션 (드롭다운). 자유롭게 확장 가능 — 미분류는 빈값 */
const SECTORS = [
  '반도체','2차전지','조선','바이오','게임','에너지','산업재','자동차','전자부품','기타'
];
const SECTOR_UNCATEGORIZED = '未분류';

/* ───────── 컬럼 (티커 제거, 반응형 priority 제거) ───────── */
const COLS = [
  { key: 'name',            label: '기업명',        type: 'ro-text', sortable: true,  align: 'left' },
  { key: 'sector',          label: '섹터',          type: 'sector',  sortable: true,  align: 'center' },
  { key: '_upside',         label: '상방 %',        type: 'calc',    sortable: true },
  { key: '_downside',       label: '하방 %',        type: 'calc',    sortable: true },
  { key: '_chart3y',        label: '3년 차트',       type: 'chart3y', sortable: false, align: 'center' },
  { key: '_chart',          label: '1년 차트',       type: 'chart',   sortable: false, align: 'center' },
  { key: 'price_change_pct', label: '등락률',        type: 'change-pct',  sortable: true,  align: 'center' },
  { key: 'price_native',    label: '현재주가',      type: 'current-price', sortable: true },
  { key: 'market_cap_oku',  label: '현재시총 (억)',  type: 'current', sortable: true, capCol: true },
  { key: 'target_cap_oku',  label: '목표시총 (억)',  type: 'num',     sortable: true, capCol: true },
  { key: 'safety_cap_oku',  label: '안전시총 (억)',  type: 'num',     sortable: true, capCol: true },
  { key: '_op_sum',         label: '영업이익 합',    type: 'calc',    sortable: false, toggle: 'quarterly' },
  { key: 'q1_op',           label: '1Q 영업이익',    type: 'num',     sortable: true, group: 'q' },
  { key: 'q2_op',           label: '2Q 영업이익',    type: 'num',     sortable: true, group: 'q' },
  { key: 'q3_op',           label: '3Q 영업이익',    type: 'num',     sortable: true, group: 'q' },
  { key: 'q4_op',           label: '4Q 영업이익',    type: 'num',     sortable: true, group: 'q' },
  { key: '_por',            label: 'POR',           type: 'calc',    sortable: true },
  { key: '_target_por',    label: '목표 POR',       type: 'calc',    sortable: true },
  { key: 'idea',           label: '투자 아이디어',   type: 'text',    sortable: false, align: 'left' },
];

/* ───────── Sparkline ───────── */
function renderSparkline(prices, w=110, h=38) {
  if (!prices || prices.length < 2) return `<svg width="${w}" height="${h}"></svg>`;
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const pad = 2;
  const xs = prices.map((_, i) => pad + (i / (prices.length - 1)) * (w - pad * 2));
  const ys = prices.map(p => h - pad - ((p - min) / range) * (h - pad * 2));
  const path = xs.map((x, i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const color = prices[prices.length - 1] >= prices[0] ? '#b91c1c' : '#2563eb';
  // 영역 채우기용 path
  const areaPath = path + ` L${xs[xs.length-1].toFixed(1)},${h-pad} L${xs[0].toFixed(1)},${h-pad} Z`;
  const fillColor = prices[prices.length - 1] >= prices[0] ? 'rgba(185,28,28,0.08)' : 'rgba(37,99,235,0.08)';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <path d="${areaPath}" fill="${fillColor}" stroke="none"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

/* ───────── 상태 ───────── */
let state = {
  stocks: [],
  usdkrw: 0,
  updated_at: '',
  filter: '',
  sectorFilter: '',
  groupBySector: false,
  favoriteOnly: false,
  sortKey: '_upside',
  sortDir: 'desc',
  showQuarterly: false,  // "영업이익 합" 토글
};

function loadUi() {
  try { return JSON.parse(localStorage.getItem(LS_UI_KEY) || '{}') || {}; } catch { return {}; }
}
function saveUi() {
  localStorage.setItem(LS_UI_KEY, JSON.stringify({
    showQuarterly: state.showQuarterly,
    sectorFilter: state.sectorFilter,
    groupBySector: state.groupBySector,
    favoriteOnly: state.favoriteOnly,
  }));
}

/* 섹터 정규화 / 표시명 */
function normSector(v) {
  const s = (v == null ? '' : String(v)).trim();
  return s || SECTOR_UNCATEGORIZED;
}

/* 섹터 이름 → 색상.
   - 미분류는 채도 낮은 회색
   - 그 외는 현재 종목들에 등장하는 섹터 셋을 모아 황금각(137.508°)으로 균등 분배
     → 현재 보이는 섹터들 사이에서 항상 시각적으로 잘 구분됨
   - 섹터가 추가되면 buildSectorHueMap()이 다시 계산 (자동 색 부여) */
function _hashName(name) {
  // 31-base + finalizer (avalanche). 정렬 안정성을 위한 결정적 해시.
  let h = 0;
  for (let i = 0; i < name.length; i++) {
    h = (Math.imul(31, h) + name.charCodeAt(i)) | 0;
  }
  h ^= h >>> 16;
  h = Math.imul(h, 0x85ebca6b);
  h ^= h >>> 13;
  h = Math.imul(h, 0xc2b2ae35);
  h ^= h >>> 16;
  return h >>> 0;
}
const GOLDEN_ANGLE = 137.508;
function buildSectorHueMap() {
  const names = new Set();
  for (const s of state.stocks) {
    const n = normSector(s.sector);
    if (n !== SECTOR_UNCATEGORIZED) names.add(n);
  }
  // 해시 순으로 정렬해 결정적 + "랜덤한" 순서. 황금각 곱으로 균등 분배.
  const list = [...names].sort((a, b) => _hashName(a) - _hashName(b));
  const map = new Map();
  list.forEach((name, idx) => {
    map.set(name, (idx * GOLDEN_ANGLE) % 360);
  });
  state._sectorHueMap = map;
}
function sectorHue(name) {
  if (!name || name === SECTOR_UNCATEGORIZED) return null;
  const m = state._sectorHueMap;
  if (m && m.has(name)) return m.get(name);
  // 폴백: 해시 기반 (맵 빌드 전 호출되는 경우)
  return _hashName(name) % 360;
}
function sectorColors(name) {
  const hue = sectorHue(name);
  if (hue === null) {
    return { bg: '#f1f3f7', fg: '#94a3b8', bar: '#cfd5de', headerBg: '#f5f7fb' };
  }
  return {
    bg:       `hsl(${hue}, 72%, 92%)`,   // 칩 배경
    fg:       `hsl(${hue}, 50%, 27%)`,   // 칩 텍스트
    bar:      `hsl(${hue}, 65%, 50%)`,   // 좌측 컬러바 / 그룹 점 (진한 색)
    headerBg: `hsl(${hue}, 78%, 95%)`,   // 그룹 헤더 배경 (아주 옅게)
  };
}
function applyChipColor(el, name) {
  const c = sectorColors(name);
  el.style.backgroundColor = c.bg;
  el.style.color = c.fg;
}

/* ───────── localStorage 유저 입력 ───────── */
function loadUserInputs() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}') || {}; }
  catch { return {}; }
}
function saveUserInputs() {
  const obj = {};
  for (const s of state.stocks) {
    const t = s.ticker;
    if (!t) continue;
    const fields = {};
    for (const f of USER_FIELDS) {
      const v = s[f];
      if (v !== null && v !== undefined && v !== '') fields[f] = v;
    }
    if (Object.keys(fields).length) obj[t] = fields;
  }
  localStorage.setItem(LS_KEY, JSON.stringify(obj));
}

/* ───────── utils ───────── */
const fmt = (v, dec=0) => {
  if (v === null || v === undefined || v === '' || Number.isNaN(v)) return '';
  const n = Number(v);
  return Number.isFinite(n) ? n.toLocaleString('ko-KR', {minimumFractionDigits:dec, maximumFractionDigits:dec}) : '';
};
const parseNum = v => {
  if (v === null || v === undefined) return null;
  const s = String(v).replace(/,/g,'').trim();
  if (s === '') return null;
  const n = Number(s);
  return Number.isFinite(n) ? n : null;
};
const uid = () => Math.random().toString(36).slice(2,10);

/* 파생값 */
const opSum = s => [s.q1_op,s.q2_op,s.q3_op,s.q4_op].map(parseNum).filter(v=>v!==null).reduce((a,b)=>a+b,0);
const por = s => { const mc = parseNum(s.market_cap_oku), sum = opSum(s); return (!mc || !sum) ? null : mc/sum; };
const targetPor = s => { const t = parseNum(s.target_cap_oku), sum = opSum(s); return (!t || !sum) ? null : t/sum; };
const upside = s => { const mc = parseNum(s.market_cap_oku), t = parseNum(s.target_cap_oku); return (!mc || !t) ? null : (t/mc-1)*100; };
const downside = s => { const mc = parseNum(s.market_cap_oku), sf = parseNum(s.safety_cap_oku); return (!mc || !sf) ? null : (sf/mc-1)*100; };

/* 주가 표시 자릿수 (네이티브 통화 기준) */
function priceDecimals(s) {
  const p = parseNum(s && s.price_native);
  if (p === null) return 0;
  // 한국 주식(₩) / JPY 등 대면단위가 큰 경우 정수, 그 외(USD/HKD 등)는 소수 2자리
  const cur = (s.currency || '').toUpperCase();
  if (cur === 'KRW' || cur === 'JPY' || cur === '' && p >= 100) return 0;
  return 2;
}

function sortValue(s, k) {
  switch (k) {
    case 'price_change_pct': return parseNum(s.price_change_pct);
    case '_upside': return upside(s);
    case '_downside': return downside(s);
    case '_op_sum': return opSum(s);
    case '_por': return por(s);
    case '_target_por': return targetPor(s);
    case 'sector': return normSector(s.sector);
    default: return s[k];
  }
}

async function fetchFromGitHub() {
  const url = `https://raw.githubusercontent.com/${GH.OWNER}/${GH.REPO}/${GH.BRANCH}/${GH.PATH}?t=${Date.now()}`;
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

/* ───────── 렌더 ───────── */
function setSaveStatus(label, cls='') {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.textContent = label;
  el.classList.remove('warn','err');
  if (cls) el.classList.add(cls);
}

function applyQuarterlyClass() {
  const tbl = document.getElementById('tbl');
  if (!tbl) return;
  tbl.classList.toggle('show-quarterly', !!state.showQuarterly);
}

function renderHeader() {
  const tr = document.getElementById('header-row');
  tr.innerHTML = '';
  COLS.forEach((c, ci) => {
    const th = document.createElement('th');
    if (ci <= 1) { th.classList.add('col-sticky'); th.dataset.stickyIdx = String(ci); }
    if (ci === 1) th.classList.add('col-sticky-end');
    th.textContent = c.label;
    if (c.capCol) th.classList.add('cap-col');
    if (c.align === 'left') th.classList.add('text-left');
    if (c.group) th.setAttribute('data-col', c.group);
    if (c.toggle === 'quarterly') {
      th.classList.add('toggle-op-sum');
      if (state.showQuarterly) th.classList.add('expanded');
      th.title = '클릭하여 Q1~Q4 입력 보기/숨기기';
      th.addEventListener('click', () => {
        state.showQuarterly = !state.showQuarterly;
        saveUi();
        render();
      });
    } else if (c.sortable) {
      th.addEventListener('click', () => {
        if (state.sortKey === c.key) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        else { state.sortKey = c.key; state.sortDir = 'asc'; }
        render();
      });
      if (state.sortKey === c.key) th.classList.add(state.sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    } else {
      th.style.cursor = 'default';
    }
    tr.appendChild(th);
  });
}

function renderRow(s) {
  const tr = document.createElement('tr');
  tr.dataset.id = s._id;
  COLS.forEach((c, ci) => {
    const td = document.createElement('td');
    if (ci <= 1) { td.classList.add('col-sticky'); td.dataset.stickyIdx = String(ci); }
    if (ci === 1) td.classList.add('col-sticky-end');
    if (c.capCol) td.classList.add('cap-col');
    if (c.align === 'left') td.classList.add('text-left');
    if (c.align === 'center') td.classList.add('text-center');
    if (c.group) td.setAttribute('data-col', c.group);

    if (c.type === 'ro-text') {
      td.classList.add('readonly-cell', 'name');
      const ticker = s.ticker || '';
      const isKorean = ticker.endsWith('.KS') || ticker.endsWith('.KQ');
      const tickerCode = ticker.split('.')[0];
      // naver_code 없으면 tickerCode(suffix 제거) 사용 — 285A.T → 285A, NVDA → NVDA
      const naverCode = s.naver_code || tickerCode;
      const naverUrl = isKorean
        ? `https://m.stock.naver.com/domestic/stock/${tickerCode}/total`
        : `https://m.stock.naver.com/worldstock/stock/${naverCode}/total`;

      // ── 즐겨찾기 별 버튼 ──
      const wrap = document.createElement('div');
      wrap.className = 'name-wrap';
      const star = document.createElement('button');
      star.className = 'star-btn' + (s.favorite ? ' active' : '');
      star.textContent = '★';
      star.title = s.favorite ? '즐겨찾기 해제' : '즐겨찾기 추가';
      star.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        s.favorite = s.favorite ? false : true;
        star.className = 'star-btn' + (s.favorite ? ' active' : '');
        star.title = s.favorite ? '즐겨찾기 해제' : '즐겨찾기 추가';
        queueSave();
        // 즐겨찾기 필터가 켜진 상태에서 별 해제 시 목록 재렌더
        if (state.favoriteOnly) render();
      });
      wrap.appendChild(star);

      if (tickerCode) {
        const a = document.createElement('a');
        a.href = naverUrl;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = s[c.key] || '';
        wrap.appendChild(a);
      } else {
        wrap.appendChild(document.createTextNode(s[c.key] || ''));
      }
      td.appendChild(wrap);
    } else if (c.type === 'chart3y') {
      td.classList.add('chart-cell');
      td.innerHTML = renderSparkline(s.price_history_3y);
    } else if (c.type === 'chart') {
      td.classList.add('chart-cell');
      td.innerHTML = renderSparkline(s.price_history);
    } else if (c.type === 'sector') {
      td.classList.add('sector-cell');
      const cur = normSector(s.sector);
      const chip = document.createElement('span');
      chip.className = 'sector-tag';
      chip.textContent = (cur === SECTOR_UNCATEGORIZED) ? '미분류' : cur;
      applyChipColor(chip, cur);
      td.appendChild(chip);
    } else if (c.type === 'change-pct') {
      const v = parseNum(s[c.key]);
      if (v === null) {
        td.textContent = '—'; td.classList.add('dim');
      } else {
        td.textContent = (v >= 0 ? '+' : '') + fmt(v, 2) + '%';
        td.classList.add(v > 0 ? 'down' : v < 0 ? 'up' : 'dim');
        td.classList.add('text-center');
      }
    } else if (c.type === 'current') {
      td.classList.add('current-cap');
      const v = parseNum(s[c.key]);
      td.textContent = v === null ? '—' : fmt(v, 0);
      if (s.currency && s.currency !== 'KRW') td.title = `${s.currency} 기준 환산 (억원)`;
    } else if (c.type === 'current-price') {
      td.classList.add('current-cap');
      const v = parseNum(s[c.key]);
      const dec = priceDecimals(s);
      td.textContent = v === null ? '—' : fmt(v, dec);
      if (s.currency && s.currency !== 'KRW') td.title = `${s.currency} 기준`;
    } else if (c.type === 'num-price') {
      const dec = priceDecimals(s);
      const inp = document.createElement('input');
      inp.className = 'cell-num';
      inp.value = s[c.key] !== undefined && s[c.key] !== null && s[c.key] !== '' ? fmt(s[c.key], dec) : '';
      inp.inputMode = 'decimal';
      inp.addEventListener('focus', () => {
        const v = parseNum(s[c.key]);
        inp.value = v === null ? '' : String(v);
        inp.select();
      });
      inp.addEventListener('blur', () => {
        const v = parseNum(inp.value);
        s[c.key] = v;
        inp.value = v === null ? '' : fmt(v, dec);
        queueSave();
        render();
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') inp.blur();
        if (e.key === 'Escape') { inp.value = s[c.key] === null ? '' : String(s[c.key]); inp.blur(); }
      });
      td.appendChild(inp);
    } else if (c.type === 'num') {
      const inp = document.createElement('input');
      inp.className = 'cell-num';
      inp.value = s[c.key] !== undefined && s[c.key] !== null && s[c.key] !== '' ? fmt(s[c.key], 0) : '';
      inp.inputMode = 'decimal';
      inp.addEventListener('focus', () => {
        const v = parseNum(s[c.key]);
        inp.value = v === null ? '' : String(v);
        inp.select();
      });
      inp.addEventListener('blur', () => {
        const v = parseNum(inp.value);
        s[c.key] = v;
        inp.value = v === null ? '' : fmt(v, 0);
        queueSave();
        render();
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') inp.blur();
        if (e.key === 'Escape') { inp.value = s[c.key] === null ? '' : String(s[c.key]); inp.blur(); }
      });
      td.appendChild(inp);
    } else if (c.type === 'text') {
      td.classList.add('idea-cell', 'text-left');
      const wrap = document.createElement('div');
      wrap.className = 'idea-wrap';

      const ta = document.createElement('textarea');
      ta.className = 'cell-text';
      ta.placeholder = '메모...';
      ta.value = s[c.key] || '';
      ta.rows = 1;

      // 높이 자동계산: scrollHeight 기반
      const COLLAPSED_H = 30;
      const autoResize = () => {
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
      };
      const collapse = () => {
        ta.style.height = COLLAPSED_H + 'px';
        ta.style.overflow = 'hidden';
      };

      // 초기 상태: 접힘
      collapse();

      // 펼치기/접기 버튼
      const btn = document.createElement('button');
      btn.className = 'idea-toggle';
      btn.title = '펼치기 / 접기';
      btn.textContent = '▼';
      let expanded = false;
      const setExpanded = (val) => {
        expanded = val;
        if (expanded) {
          btn.textContent = '▲';
          btn.classList.add('expanded');
          autoResize();
          ta.style.overflow = 'hidden';
        } else {
          btn.textContent = '▼';
          btn.classList.remove('expanded');
          if (document.activeElement !== ta) collapse();
        }
      };
      btn.addEventListener('mousedown', (e) => {
        e.preventDefault(); // blur 방지
        setExpanded(!expanded);
      });

      // 줄수 뱃지 + 버튼 색 업데이트
      const updateBadge = (text) => {
        const lines = (text || '').split('\n').filter(l => l.trim() !== '').length;
        // 버튼 색
        btn.classList.toggle('has-content', lines > 0);
        // 기존 뱃지 제거
        const old = wrap.querySelector('.line-badge');
        if (old) old.remove();
        // 2줄 이상이면 뱃지 추가
        if (lines >= 2) {
          const badge = document.createElement('span');
          badge.className = 'line-badge';
          badge.textContent = lines + '줄';
          wrap.insertBefore(badge, btn);
        }
      };
      // 포커스 시 펼침 (입력 중 자동 확장)
      ta.addEventListener('focus', () => {
        ta.style.overflow = 'hidden';
        autoResize();
      });
      ta.addEventListener('input', autoResize);
      ta.addEventListener('blur', () => {
        s[c.key] = ta.value.trim();
        ta.value = s[c.key];
        updateBadge(s[c.key]);
        queueSave();
        if (!expanded) collapse();
      });
      ta.addEventListener('keydown', e => {
        if (e.key === 'Escape') { ta.value = s[c.key] || ''; ta.blur(); }
      });

      wrap.appendChild(ta);
      wrap.appendChild(btn);
      updateBadge(s[c.key]); // btn이 wrap에 추가된 후 호출
      td.appendChild(wrap);
    } else if (c.type === 'calc') {
      let text = '—', cls = 'dim';
      if (c.key === '_upside') {
        const v = upside(s);
        if (v !== null) { text = fmt(v,1) + '%'; cls = v >= 0 ? 'down' : 'up'; }  // +: red, −: blue
      } else if (c.key === '_downside') {
        const v = downside(s);
        if (v !== null) { text = fmt(v,1) + '%'; cls = v >= 0 ? 'down' : 'up'; }  // +: red, −: blue
      } else if (c.key === '_op_sum') {
        const v = opSum(s); text = v ? fmt(v,0) : '—'; cls = '';
        td.style.cursor = 'pointer';
        td.title = '클릭하여 Q1~Q4 보기/숨기기';
        td.addEventListener('click', () => {
          state.showQuarterly = !state.showQuarterly;
          saveUi();
          render();
        });
      } else if (c.key === '_por') {
        const v = por(s); text = v ? fmt(v,2) + '×' : '—'; cls = '';
      } else if (c.key === '_target_por') {
        const v = targetPor(s); text = v ? fmt(v,2) + '×' : '—'; cls = '';
      }
      td.textContent = text;
      if (cls) td.classList.add(cls);
    }
    tr.appendChild(td);
  });
  return tr;
}

function compareStocks(a, b, key, dirSign) {
  const av = sortValue(a, key), bv = sortValue(b, key);
  const aN = av === null || av === undefined || av === '' || Number.isNaN(av);
  const bN = bv === null || bv === undefined || bv === '' || Number.isNaN(bv);
  if (aN && bN) return 0;
  if (aN) return 1;
  if (bN) return -1;
  if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * dirSign;
  return String(av).localeCompare(String(bv), 'ko') * dirSign;
}

function buildGroupRow(sectorName, count, totalMcap) {
  const colors = sectorColors(sectorName);
  const tr = document.createElement('tr');
  tr.className = 'group-row';
  const td = document.createElement('td');
  td.colSpan = COLS.length;
  td.className = 'text-left';
  // 그룹 헤더: 옅은 섹터 배경 + 좌측 진한 색 바
  td.style.backgroundColor = colors.headerBg;
  td.style.boxShadow = `inset 5px 0 0 ${colors.bar}`;
  const span = document.createElement('span');
  span.className = 'group-name';
  span.style.color = colors.fg;
  span.innerHTML = `<span class="group-dot" style="background:${colors.bar};opacity:1"></span>${sectorName === SECTOR_UNCATEGORIZED ? '미분류' : sectorName}`;
  const meta = document.createElement('span');
  meta.className = 'group-meta';
  const partsM = [`${count}개 종목`];
  if (totalMcap) partsM.push(`합산 시총 ${fmt(totalMcap, 0)} 억`);
  meta.textContent = partsM.join(' · ');
  td.appendChild(span);
  td.appendChild(meta);
  tr.appendChild(td);
  return tr;
}

function render() {
  buildSectorHueMap();
  renderHeader();
  applyQuarterlyClass();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  tbody.classList.remove('grouped');

  let list = [...state.stocks];
  if (state.favoriteOnly) {
    list = list.filter(s => s.favorite);
  }
  if (state.filter) {
    const q = state.filter.toLowerCase();
    list = list.filter(s =>
      (s.name || '').toLowerCase().includes(q) ||
      (s.ticker || '').toLowerCase().includes(q));
  }
  if (state.sectorFilter) {
    list = list.filter(s => normSector(s.sector) === state.sectorFilter);
  }

  const dirSign = state.sortDir === 'asc' ? 1 : -1;
  if (state.sortKey) {
    list.sort((a,b) => compareStocks(a, b, state.sortKey, dirSign));
  }

  if (!list.length) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = COLS.length;
    td.className = 'empty';
    td.textContent = (state.filter || state.sectorFilter) ? '검색 결과 없음' : '데이터 없음';
    tr.appendChild(td);
    tbody.appendChild(tr);
  } else if (state.groupBySector) {
    tbody.classList.add('grouped');
    // 그룹 모드: 섹터별로 묶어서, 각 그룹 헤더 + 그룹 내부는 현재 정렬키로 정렬
    const groups = new Map();
    list.forEach(s => {
      const sec = normSector(s.sector);
      if (!groups.has(sec)) groups.set(sec, []);
      groups.get(sec).push(s);
    });
    // 그룹 정렬: 시총 합 큰 순 (미분류는 항상 마지막)
    const entries = [...groups.entries()].map(([k, arr]) => {
      const total = arr.reduce((a, x) => a + (parseNum(x.market_cap_oku) || 0), 0);
      return { sector: k, items: arr, total };
    });
    entries.sort((a, b) => {
      if (a.sector === SECTOR_UNCATEGORIZED) return 1;
      if (b.sector === SECTOR_UNCATEGORIZED) return -1;
      return b.total - a.total;
    });
    entries.forEach(({ sector, items, total }) => {
      // 그룹 내부도 현재 sortKey가 있으면 정렬, 없으면 시총 큰 순
      const innerKey = state.sortKey || 'market_cap_oku';
      const innerDir = state.sortKey ? dirSign : -1;
      const sorted = [...items].sort((a, b) => compareStocks(a, b, innerKey, innerDir));
      tbody.appendChild(buildGroupRow(sector, items.length, total));
      const barColor = sectorColors(sector).bar;
      sorted.forEach(s => {
        const row = renderRow(s);
        // 그룹 모드에서 첫 셀에 색 띠
        if (row.firstChild) row.firstChild.style.boxShadow = `inset 3px 0 0 ${barColor}`;
        tbody.appendChild(row);
      });
    });
  } else {
    tbody.classList.remove('grouped');
    list.forEach(s => tbody.appendChild(renderRow(s)));
  }

  updateSectorFilterOptions();
  syncToggleButton();
  syncFavButton();
  requestAnimationFrame(applyStickyOffsets);

  const m = document.getElementById('meta');
  const parts = [];
  if (state.updated_at) {
    const utc = new Date(state.updated_at + 'Z');
    const kst = new Date(utc.getTime() + 9 * 3600 * 1000);
    const kstStr = kst.toISOString().slice(0,16).replace('T',' ');
    parts.push(`시총 ${kstStr} KST`);
  }
  if (state.usdkrw) parts.push(`USDKRW ${Number(state.usdkrw).toFixed(1)}`);
  parts.push(`${state.stocks.length}개 종목`);
  if (state.favoriteOnly) parts.push(`⭐ 즐겨찾기 ${state.stocks.filter(s=>s.favorite).length}개`);
  if (state.sectorFilter) parts.push(`섹터: ${state.sectorFilter}`);
  m.textContent = parts.join(' · ');
}

function updateSectorFilterOptions() {
  const sel = document.getElementById('sector-filter');
  if (!sel) return;
  const counts = new Map();
  for (const s of state.stocks) {
    const k = normSector(s.sector);
    counts.set(k, (counts.get(k) || 0) + 1);
  }
  // 정렬: 사전 정의 SECTORS 순서 → 그 외 → 미분류 마지막
  const known = SECTORS.filter(name => counts.has(name));
  const extra = [...counts.keys()].filter(k => !SECTORS.includes(k) && k !== SECTOR_UNCATEGORIZED).sort((a,b)=>a.localeCompare(b,'ko'));
  const order = [...known, ...extra];
  if (counts.has(SECTOR_UNCATEGORIZED)) order.push(SECTOR_UNCATEGORIZED);

  const prev = state.sectorFilter;
  // 옵션이 동일하면 재구성 생략
  const sig = order.map(k => `${k}:${counts.get(k)}`).join('|');
  if (sel.dataset.sig === sig) { sel.value = prev; return; }
  sel.dataset.sig = sig;
  sel.innerHTML = '';
  const all = document.createElement('option');
  all.value = ''; all.textContent = `전체 섹터 (${state.stocks.length})`;
  sel.appendChild(all);
  order.forEach(name => {
    const o = document.createElement('option');
    o.value = name; o.textContent = `${name} (${counts.get(name)})`;
    sel.appendChild(o);
  });
  sel.value = prev;
}

function syncToggleButton() {
  const btn = document.getElementById('group-toggle');
  if (!btn) return;
  btn.classList.toggle('toggle-on', !!state.groupBySector);
}

function syncFavButton() {
  const btn = document.getElementById('fav-filter-btn');
  if (!btn) return;

}

function applyStickyOffsets() {
  const ths = [0,1,2,3].map(i => document.querySelector(`#header-row th[data-sticky-idx="${i}"]`));
  if (!ths[0]) return;
  let left = 0;
  ths.forEach((th, i) => {
    if (!th) return;
    document.querySelectorAll(`[data-sticky-idx="${i}"]`).forEach(el => { el.style.left = left + 'px'; });
    left += th.offsetWidth;
  });
}

let saveTimer = null;
function queueSave() {
  clearTimeout(saveTimer);
  setSaveStatus('저장 중...');
  saveTimer = setTimeout(() => {
    try {
      saveUserInputs();
      setSaveStatus('저장됨 ✓');
      setTimeout(() => setSaveStatus('로컬 저장'), 1200);
    } catch (e) {
      setSaveStatus('저장 실패', 'err');

function toast(msg, type='ok', ms=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms);

function mergeAndSetStocks(ghData) {
  const userInputs = loadUserInputs();
  let migrated = false;
  state.stocks = (ghData.stocks || []).map(s => {
    const ui = userInputs[s.ticker] || {};
    const merged = { _id: uid() };
    for (const [k, v] of Object.entries(s)) merged[k] = v;
    for (const f of USER_FIELDS) {
      // GitHub(커밋된 값)을 우선 사용 → 다른 기기에서 커밋한 데이터 반영
      // s[f]가 undefined(필드 자체 없음)일 때만 localStorage 폴백
      merged[f] = (s[f] !== undefined) ? s[f] : (ui[f] ?? null);
    }
    // ── v2(주가) → v3(시총) 역마이그레이션: 주가 입력값이 남아있으면 시총(억)으로 환산
    const mcNow = parseNum(s.market_cap_oku);
    const priceNow = parseNum(s.price_native);
    if (mcNow && priceNow) {
      if ((merged.target_cap_oku === null || merged.target_cap_oku === undefined) && ui.target_price) {
        const tp = parseNum(ui.target_price);
        if (tp !== null) { merged.target_cap_oku = (tp / priceNow) * mcNow; migrated = true; }
      }
      if ((merged.safety_cap_oku === null || merged.safety_cap_oku === undefined) && ui.safety_price) {
        const sp = parseNum(ui.safety_price);
        if (sp !== null) { merged.safety_cap_oku = (sp / priceNow) * mcNow; migrated = true; }
      }
    }
    return merged;
  });
  state.usdkrw = ghData.usdkrw || 0;
  state.updated_at = ghData.updated_at || '';
  // GitHub 데이터를 localStorage에도 반영 → 기기 간 베이스 동기화
  saveUserInputs();
  if (migrated) {
    saveUserInputs();
  }
}

async function silentRefresh() {
  try {
    const gh = await fetchFromGitHub();
    state.stocks.forEach(s => {
      const latest = (gh.stocks || []).find(x => x.ticker === s.ticker);
      if (latest) {
        s.market_cap_oku = latest.market_cap_oku;
        s.currency = latest.currency;
        s.price_native = latest.price_native;
      }
    });
    state.usdkrw = gh.usdkrw || state.usdkrw;
    state.updated_at = gh.updated_at || state.updated_at;
    render();
  } catch (_) {}
}

async function init() {
  const ui = loadUi();
  state.showQuarterly = !!ui.showQuarterly;
  state.sectorFilter = ui.sectorFilter || '';
  state.groupBySector = !!ui.groupBySector;
  state.favoriteOnly = !!ui.favoriteOnly;

  try {
    const gh = await fetchFromGitHub();
    mergeAndSetStocks(gh);
  } catch (e) {
    toast('데이터 로드 실패: ' + e.message, 'err', 6000);
    state.stocks = [];
  }
  render();

  document.getElementById('filter').addEventListener('input', e => {
    state.filter = e.target.value.trim();
    render();
  });

  document.getElementById('sector-filter').addEventListener('change', e => {
    state.sectorFilter = e.target.value || '';
    saveUi();
    render();
  });

  document.getElementById('group-toggle').addEventListener('click', () => {
    state.groupBySector = !state.groupBySector;
    saveUi();
    render();
  });

  document.getElementById('fav-filter-btn').addEventListener('click', () => {
    state.favoriteOnly = !state.favoriteOnly;
    saveUi();
    render();
  });

  // 백업 버튼
  const backupModal = document.getElementById('backup-modal');
  const backupText  = document.getElementById('backup-text');
  const openBackup = () => {
    const inputs = loadUserInputs();
    const out = {
      _backup_date: new Date().toISOString().slice(0,19).replace('T',' '),
      _note: 'sv_user_inputs_v1',
      data: inputs,
    };
    backupText.value = JSON.stringify(out, null, 2);
    backupModal.style.display = 'flex';
    setTimeout(() => { backupText.select(); }, 80);
  };
  document.getElementById('backup-btn').addEventListener('click', openBackup);
  const closeBackup = () => { backupModal.style.display = 'none'; };
  document.getElementById('backup-close').addEventListener('click', closeBackup);
  document.getElementById('backup-close2').addEventListener('click', closeBackup);
  backupModal.addEventListener('click', e => { if (e.target === backupModal) closeBackup(); });
  document.getElementById('backup-copy').addEventListener('click', () => {
    backupText.select();
    const ok = document.execCommand('copy');
    if (ok) {
      document.getElementById('backup-copy').textContent = '복사됨 ✓';
      setTimeout(() => { document.getElementById('backup-copy').textContent = '전체 복사'; }, 1800);
    } else {
      // execCommand 안 될 때 Clipboard API 시도
      navigator.clipboard && navigator.clipboard.writeText(backupText.value).then(() => {
        document.getElementById('backup-copy').textContent = '복사됨 ✓';
        setTimeout(() => { document.getElementById('backup-copy').textContent = '전체 복사'; }, 1800);
      });
    }
  });


  // 포커스 복귀 시 자동 새로고침 (스케줄러 반영분 반영)
  let lastReload = Date.now();
  window.addEventListener('focus', () => {
    if (Date.now() - lastReload < 30_000) return;
    lastReload = Date.now();
    silentRefresh();
  });

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
      e.preventDefault();
      clearTimeout(saveTimer);
      saveUserInputs();
      setSaveStatus('저장됨 ✓');
      setTimeout(() => setSaveStatus('로컬 저장'), 1200);
    }
  });
}

function activatePage(page, opts = {}) {
  const btn = document.querySelector(`.page-tab-btn[data-page="${page}"]`);
  if (!btn) return;
  document.querySelectorAll('.page-tab-btn').forEach(b => b.classList.toggle('active', b === btn));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + page));
  markTabVisited(page);
  if (page === 'diary' && typeof renderAllDiaryFeeds === 'function') renderAllDiaryFeeds();
  const src = IFRAME_TAB_SRC[page];
  if (src) {
    const fr = document.getElementById(`${page}-frame`);
    if (fr && !fr.src) fr.src = src;
  }
  if (!opts.skipHistory) {
    const desired = page === 'valuation' ? '' : '#' + page;
    const current = location.hash;
    if (current !== desired) {
      // 첫 번째 탭 전환은 push (뒤로가기로 돌아올 수 있게), 같은 탭 재클릭은 replace
      history.pushState({ page }, '', desired || (location.pathname + location.search));
    }
  }
}

// 탭 클릭
document.querySelectorAll('.page-tab-btn').forEach(btn => {
  btn.addEventListener('click', () => activatePage(btn.dataset.page));
});

// 브라우저 뒤로/앞으로
window.addEventListener('popstate', (e) => {
  const fromState = e.state && e.state.page;
  const fromHash  = (location.hash || '').replace(/^#/, '');
  const page = fromState || fromHash || 'valuation';
  if (document.querySelector(`.page-tab-btn[data-page="${page}"]`)) {
    activatePage(page, { skipHistory: true });
  }
});

// 초기 로드: URL에 해시가 있으면 그 탭 활성화 + 초기 상태에 valuation을 기록
//
// ⚠️ activatePage()는 이 스크립트 아래쪽에서 const(diary) 로 정의되는 식별자를
//    내부에서 참조한다. 같은 <script> 태그 안에서 위쪽 IIFE가 그것을 호출하면
//    TDZ/ReferenceError로 스크립트 전체가 중단되어 initDiary 같은 후속 초기화가
//    통째로 사라진다. 그래서 history.replaceState 만 동기로 처리하고,
//    activatePage 호출은 queueMicrotask 로 현재 스크립트 본문 실행 이후로 미룬다.
(function initFromHash() {
  history.replaceState({ page: 'valuation' }, '', location.pathname + location.search + location.hash);
  const initial = (location.hash || '').replace(/^#/, '');
  if (!initial) return;
  if (!document.querySelector(`.page-tab-btn[data-page="${initial}"]`)) return;
  queueMicrotask(() => {
    try {
      activatePage(initial, { skipHistory: true });
      history.replaceState({ page: initial }, '', '#' + initial);
    } catch (e) {
      console.error('[initFromHash] activatePage failed:', e);
    }
  });
})();

}
function saveCommitCache(c) { localStorage.setItem(TAB_COMMIT_KEY, JSON.stringify(c)); }

// 방문 기록이 없는 탭은 epoch(0)로 시작 → 미방문 탭에 있는 모든 GitHub 업데이트가 dot으로 표시됨
// v1 → v2 마이그레이션: v1에서 'now'로 잘못 초기화된 기록을 epoch으로 리셋
(function initVisitMap() {
  let m = loadVisitMap();
  if ((m._v || 1) < TAB_VISIT_VER) {
    m = { _v: TAB_VISIT_VER };
    localStorage.removeItem(TAB_COMMIT_KEY); // commit 캐시도 함께 비워 최신 커밋 재조회
  }
  let changed = (m._v !== TAB_VISIT_VER);
  m._v = TAB_VISIT_VER;
  for (const k of Object.keys(TAB_REPOS)) {
    if (!m[k]) { m[k] = EPOCH_ISO; changed = true; }
  }
  if (changed) saveVisitMap(m);
})();

// 각 page-tab-btn에 dot span 주입
(function injectDots() {
  document.querySelectorAll('.page-tab-btn').forEach(btn => {
    const page = btn.dataset.page;
    if (!TAB_REPOS[page]) return;
    if (btn.querySelector('.update-dot')) return;
    const dot = document.createElement('span');
    dot.className = 'update-dot';
    btn.insertBefore(dot, btn.firstChild);
  });
})();

function markTabVisited(page) {
  if (!TAB_REPOS[page]) return;
  const m = loadVisitMap();
  m[page] = new Date().toISOString();
  saveVisitMap(m);
  const btn = document.querySelector(`.page-tab-btn[data-page="${page}"]`);
  if (btn) btn.classList.remove('has-update');
}

async function fetchLatestCommitISO(repo, path, forceFresh = false) {
  const cacheKey = path ? `${repo}|${path}` : repo;
  const cache = loadCommitCache();
  const cached = cache[cacheKey];
  if (!forceFresh && cached && (Date.now() - cached.fetchedAt) < COMMIT_TTL_MS) {
    return cached.iso;
  }
  try {
    const qs = new URLSearchParams({ per_page: '1' });
    if (path) qs.set('path', path);
    const headers = { 'Accept': 'application/vnd.github+json' };
    // 다이어리용 PAT가 있으면 인증해서 rate limit을 5000/hr로 확장
    const pat = (localStorage.getItem('sv_github_pat') || '').trim();
    if (pat) headers['Authorization'] = `Bearer ${pat}`;
    const r = await fetch(`https://api.github.com/repos/${repo}/commits?${qs}`, { headers });
    if (!r.ok) {
      // 403/429 = rate limit. 짧게 negative-cache(2분)해서 폭주 방지
      if (r.status === 403 || r.status === 429) {
        cache[cacheKey] = { iso: null, fetchedAt: Date.now() - COMMIT_TTL_MS + 2*60*1000 };
        saveCommitCache(cache);
      }
      return null;
    }
    const arr = await r.json();
    if (!Array.isArray(arr) || !arr[0]) return null;
    const iso = arr[0].commit?.committer?.date || arr[0].commit?.author?.date || null;
    if (iso) {
      cache[cacheKey] = { iso, fetchedAt: Date.now() };
      saveCommitCache(cache);
    }
    return iso;
  } catch { return null; }
}

async function refreshTabUpdateDots(opts = {}) {
  const forceFresh = !!opts.forceFresh;
  const visitMap = loadVisitMap();
  const activePage = document.querySelector('.page-tab-btn.active')?.dataset.page;
  const entries = Object.entries(TAB_REPOS);
  await Promise.all(entries.map(async ([page, conf]) => {
    const iso = await fetchLatestCommitISO(conf.repo, conf.path, forceFresh);
    if (!iso) return;
    const btn = document.querySelector(`.page-tab-btn[data-page="${page}"]`);
    if (!btn) return;
    const visitedAt = visitMap[page];
    const isUpdated = visitedAt ? (new Date(iso) > new Date(visitedAt)) : true;
    // 현재 활성 탭은 보고 있는 것이므로 즉시 방문 처리
    if (isUpdated && page === activePage) {
      markTabVisited(page);
    } else {
      btn.classList.toggle('has-update', isUpdated);
    }
  }));
}

// 페이지 로드 시: 캐시 무시하고 fresh fetch (방금 푸시한 커밋도 즉시 반영)
// 이후 10분마다 백그라운드 갱신 (5분 캐시 TTL과 결합해 신선도 유지)
refreshTabUpdateDots({ forceFresh: true });
setInterval(() => refreshTabUpdateDots(), 10 * 60 * 1000);

// 허용 태그/속성만 남김. 외부 HTML 페이스트/저장 데이터의 XSS 방지.
function sanitizeDiaryHTML(html) {
  if (!html) return '';
  const tmpl = document.createElement('template');
  tmpl.innerHTML = String(html);
  const ALLOW = new Set(['B','STRONG','I','EM','U','SPAN','BR','DIV','P','A']);
  function walk(parent) {
    [...parent.children].forEach(child => {
      if (!ALLOW.has(child.tagName)) {
        // 자식 먼저 정리 후 unwrap
        walk(child);
        while (child.firstChild) child.parentNode.insertBefore(child.firstChild, child);
        child.remove();
      } else {
        [...child.attributes].forEach(attr => {
          if (attr.name === 'style') {
            const safe = [];
            attr.value.split(';').forEach(rule => {
              const idx = rule.indexOf(':');
              if (idx < 0) return;
              const k = rule.slice(0, idx).trim().toLowerCase();
              const v = rule.slice(idx + 1).trim();
              if (!k || !v) return;
              if (k === 'color' && /^(#[0-9a-fA-F]{3,8}|[a-zA-Z]+|rgba?\([^)]+\))$/.test(v)) safe.push(`${k}:${v}`);
              else if (k === 'font-weight' && /^(bold|normal|[1-9]00)$/i.test(v)) safe.push(`${k}:${v}`);
              else if (k === 'text-decoration' && /^(underline|line-through|none)$/i.test(v)) safe.push(`${k}:${v}`);
              else if (k === 'font-style' && /^(italic|normal)$/i.test(v)) safe.push(`${k}:${v}`);
            });
            if (safe.length) child.setAttribute('style', safe.join(';'));
            else child.removeAttribute('style');
          } else if (attr.name === 'href' && child.tagName === 'A') {
            const v = attr.value.trim();
            if (!/^(https?:|mailto:)/i.test(v)) child.removeAttribute('href');
            else { child.setAttribute('target','_blank'); child.setAttribute('rel','noopener'); }
          } else if (attr.name === 'data-diary-br' && child.tagName === 'SPAN') {
            // 강조 탭이 식별하는 마커 — 보존
            if (attr.value !== '1') child.removeAttribute(attr.name);
          } else {
            child.removeAttribute(attr.name);
          }
        });
        walk(child);
      }
    });
  }
  walk(tmpl.content);
  return tmpl.innerHTML;
}

// 빨강+볼드 스타일 식별 (마커가 없는 legacy 데이터도 인식)
function _looksLikeBoldRed(styleStr) {
  if (!styleStr) return false;
  return /font-weight\s*:\s*(?:bold|700|800|900)/i.test(styleStr)
      && /color\s*:\s*(?:#e23a3a|#E23A3A|rgb\(\s*226\s*,\s*58\s*,\s*58\s*\)|red)/i.test(styleStr);
}

// 기존 plain text 데이터(태그 없는) → 안전한 HTML로 정규화. HTML이면 sanitize만.
// 추가: 빨강+볼드 style 가진 span 에 data-diary-br='1' 마커 자동 부여 (legacy 마이그레이션).
function normalizeDiaryValue(stored) {
  if (!stored) return '';
  const s = String(stored);
  if (!/<[a-zA-Z][^>]*>/.test(s)) {
    // plain text — escape + 줄바꿈 변환
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\r?\n/g, '<br>');
  }
  // legacy 마이그레이션: 마커 없는 빨강+볼드 span 에 마커 부여
  const tmpl = document.createElement('template');
  tmpl.innerHTML = s;
  tmpl.content.querySelectorAll('span').forEach(sp => {
    const style = sp.getAttribute('style') || '';
    if (_looksLikeBoldRed(style) && sp.getAttribute('data-diary-br') !== '1') {
      sp.setAttribute('data-diary-br', '1');
    }
  });
  return sanitizeDiaryHTML(tmpl.innerHTML);
}

// contenteditable element 공통 설정 — paste 시 외부 HTML 차단, plain text로 변환
function attachEditable(el) {
  el.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
    // 기본 execCommand insertText — 현재 selection 위치에 삽입
    if (document.queryCommandSupported && document.queryCommandSupported('insertText')) {
      document.execCommand('insertText', false, text);
    } else {
      // fallback
      const sel = window.getSelection();
      if (sel.rangeCount) {
        sel.getRangeAt(0).deleteContents();
        sel.getRangeAt(0).insertNode(document.createTextNode(text));
        sel.collapseToEnd();
      }
    }
  });
}

// 선택 영역 볼드+빨강 토글
function applyBoldRedToggle() {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  // contenteditable 안에 있어야 함
  const anc = range.commonAncestorContainer;
  const startEl = anc.nodeType === 1 ? anc : anc.parentElement;
  const editable = startEl && startEl.closest('[contenteditable="true"]');
  if (!editable) return;

  // 선택 영역이 단일 br-span 안에 완전히 들어있으면 해제, 아니면 적용
  function findEnclosingBR(n) {
    while (n && n !== editable) {
      if (n.nodeType === 1 && n.dataset && n.dataset.diaryBr === '1') return n;
      n = n.parentNode;
    }
    return null;
  }
  const enclosingStart = findEnclosingBR(range.startContainer);
  const enclosingEnd   = findEnclosingBR(range.endContainer);
  if (enclosingStart && enclosingStart === enclosingEnd) {
    // 해제 (unwrap)
    const sp = enclosingStart;
    const parent = sp.parentNode;
    while (sp.firstChild) parent.insertBefore(sp.firstChild, sp);
    parent.removeChild(sp);
  } else {
    // 적용 (extract → wrap)
    const span = document.createElement('span');
    span.dataset.diaryBr = '1';
    span.style.cssText = 'font-weight:700;color:#e23a3a;';
    try {
      span.appendChild(range.extractContents());
      range.insertNode(span);
      sel.removeAllRanges();
      const r2 = document.createRange();
      r2.selectNodeContents(span);
      sel.addRange(r2);
    } catch (e) {
      console.warn('[diary] bold/red apply failed', e);
      return;
    }
  }
  // 자동 저장 트리거
  editable.dispatchEvent(new Event('input', { bubbles: true }));
  // 카운트만 즉시 갱신 (강조 탭 본문은 그 탭으로 이동할 때 새로 그림)
  try { updateTabCounts(); } catch(_) {}
}

// 드래그한 정확한 영역만 강조 해제. 강조 span 의 일부에 걸친 경우엔
// extractContents 가 wrapper 를 자동 split 하므로, 추출된 fragment 의 강조 span 만
// unwrap 한 뒤 다시 삽입한다 → 드래그 바깥은 강조 그대로 유지.
function clearBoldRedInRange() {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const anc = range.commonAncestorContainer;
  const startEl = anc.nodeType === 1 ? anc : anc.parentElement;
  const editable = startEl && startEl.closest('[contenteditable="true"]');
  if (!editable) return;

  // 1) 선택 영역을 fragment 로 추출 (boundary wrapper 자동 split)
  let frag;
  try { frag = range.extractContents(); }
  catch (e) { console.warn('[diary] extract failed', e); return; }

  // 2) fragment 내부의 강조 span 만 unwrap (텍스트는 그대로)
  const targets = [...frag.querySelectorAll('span')].filter(sp => {
    return sp.getAttribute('data-diary-br') === '1'
        || _looksLikeBoldRed(sp.getAttribute('style') || '');
  });
  targets.forEach(sp => {
    const parent = sp.parentNode;
    while (sp.firstChild) parent.insertBefore(sp.firstChild, sp);
    parent.removeChild(sp);
  });

  // 3) 원래 위치에 fragment 재삽입
  range.insertNode(frag);

  // 4) split 후 비게 된 wrapper span 정리 (양쪽 끝이 비어있을 수 있음)
  editable.querySelectorAll('span').forEach(sp => {
    const isBR = sp.getAttribute('data-diary-br') === '1'
              || _looksLikeBoldRed(sp.getAttribute('style') || '');
    if (isBR && !sp.textContent) sp.remove();
  });

  // 5) 선택 영역 초기화
  try { sel.removeAllRanges(); } catch(_) {}

  editable.dispatchEvent(new Event('input', { bubbles: true }));
  try { updateTabCounts(); } catch(_) {}
}
