<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stock Valuation Dashboard</title>
<style>
  :root {
    --bg: #f7f9fc;
    --panel: #ffffff;
    --panel-2: #f2f4f8;
    --border: #e3e7ee;
    --border-strong: #cfd5de;
    --text: #1f2933;
    --text-dim: #6b7480;
    --accent: #2563eb;
    --accent-soft: #eaf1fe;
    --green: #15803d;
    --red: #b91c1c;
    --yellow: #a16207;
    --header: #f0f3f8;
    --row-hover: #f6f8fc;
    --focus: #dbe8fe;
    --readonly: #fafbfd;
    --topbar-h: 56px;
  }
  * { box-sizing: border-box; }
  html, body { overflow-x: hidden; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
  }
  .topbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    min-height: var(--topbar-h);
    flex-wrap: wrap;
  }
  .topbar h1 {
    margin: 0; font-size: 15px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .topbar h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex: none; }
  .topbar .spacer { flex: 1; min-width: 0; }
  .topbar .meta {
    color: var(--text-dim); font-size: 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topbar .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent-soft); color: var(--accent);
    padding: 4px 9px; border-radius: 999px; font-size: 11px; font-weight: 500;
    white-space: nowrap;
  }
  .topbar .status-pill::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  }
  .topbar .status-pill.warn { background: #fff3cd; color: #7a5d00; }
  .topbar .status-pill.warn::before { background: #d4a017; }
  .topbar .status-pill.err { background: #fde7e7; color: #9b1c1c; }
  .topbar .status-pill.err::before { background: #9b1c1c; }
  .topbar input.filter {
    background: var(--panel); border: 1px solid var(--border-strong); color: var(--text);
    padding: 7px 10px; border-radius: 6px; width: 220px;
    transition: border-color .15s, box-shadow .15s;
    min-width: 0;
  }
  .topbar input.filter:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus);
  }
  .btn {
    background: var(--panel); border: 1px solid var(--border-strong); color: var(--text);
    padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--panel-2); border-color: var(--accent); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast {
    position: fixed; right: 16px; bottom: 16px;
    background: var(--panel); border: 1px solid var(--border-strong);
    padding: 10px 14px; border-radius: 6px;
    color: var(--text); font-size: 13px; z-index: 100;
    max-width: 420px; box-shadow: 0 8px 24px rgba(15,23,42,0.12);
    opacity: 0; transform: translateY(10px); transition: all .2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.ok { border-color: #c4e5cf; background: #f1faf4; }
  .toast.err { border-color: #f3c4c4; background: #fdf1f1; }

  /* 테이블은 overflow-x로 가로 스크롤만, sticky는 페이지 기준 유지 */
  .table-wrap {
    padding: 12px;
    overflow-x: auto;
    overflow-y: visible;
    -webkit-overflow-scrolling: touch;
  }
  table {
    border-collapse: separate;
    border-spacing: 0;
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  th, td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    text-align: right;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  th:last-child, td:last-child { border-right: none; }
  tbody tr:last-child td { border-bottom: none; }
  th {
    background: var(--header);
    position: sticky; top: var(--topbar-h); z-index: 3;
    font-weight: 600;
    color: #4a5568;
    cursor: pointer;
    user-select: none;
    font-size: 12px;
  }
  th.sorted-asc::after { content: " ▲"; color: var(--accent); font-size: 10px; }
  th.sorted-desc::after { content: " ▼"; color: var(--accent); font-size: 10px; }
  th.text-left, td.text-left { text-align: left; }
  tbody tr { background: var(--panel); }
  tbody tr:hover { background: var(--row-hover); }
  /* 데이터 셀은 자기 배경을 항상 가지도록 (sticky thead 뒤로 보이지 않게) */
  tbody td { background: var(--panel); position: relative; }
  tbody td.readonly-cell, tbody td.current-cap { background: var(--readonly); }

  input.cell-num {
    background: transparent; border: 1px solid transparent; color: var(--text);
    padding: 3px 5px; border-radius: 4px; width: 100%;
    font: inherit;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  input.cell-num:focus {
    outline: none; border-color: var(--accent); background: white;
    box-shadow: 0 0 0 3px var(--focus);
  }
  input.cell-num::placeholder { color: #aab2bd; }

  .readonly-cell {
    color: var(--text);
    font-weight: 500;
  }
  .readonly-cell.name { font-weight: 600; }
  .readonly-cell.ticker { color: var(--text-dim); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  .current-cap { color: var(--text); font-weight: 600; }

  .num { font-variant-numeric: tabular-nums; }
  .pos { color: var(--green); font-weight: 600; }
  .neg { color: var(--red); font-weight: 600; }
  .dim { color: var(--text-dim); }

  .empty { padding: 40px; text-align: center; color: var(--text-dim); }

  /* 스크롤바 (데스크톱만) */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #d0d6de; border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #b5bcc6; }

  /* 터치 기기에선 스크롤바 숨김 (iPhone/iPad/Android) */
  @media (hover: none) and (pointer: coarse) {
    ::-webkit-scrollbar { display: none; width: 0; height: 0; }
    * { scrollbar-width: none; -ms-overflow-style: none; }
  }

  /* ───── 반응형: 컬럼 우선순위별 숨김 ─────
     priority 1 = 항상 표시 (핵심)
     priority 2 = 900px 이하에서 숨김
     priority 3 = 680px 이하에서 숨김
     priority 4 = 480px 이하에서 숨김
  */
  @media (max-width: 900px) {
    [data-p="4"] { display: none; }
    th, td { padding: 8px 8px; font-size: 12.5px; }
  }
  @media (max-width: 680px) {
    [data-p="3"] { display: none; }
    .topbar { padding: 10px 12px; gap: 8px; }
    .topbar h1 { font-size: 14px; }
    .topbar .meta { font-size: 11px; }
    .topbar input.filter { width: 140px; padding: 7px 9px; }
    th, td { padding: 9px 8px; font-size: 13px; }
    th { font-size: 11.5px; }
  }
  @media (max-width: 480px) {
    [data-p="2"] { display: none; }
    :root { --topbar-h: 52px; }
    .topbar { padding: 9px 10px; gap: 6px; min-height: 52px; }
    .topbar h1 { font-size: 13.5px; }
    .topbar h1 .dot { width: 7px; height: 7px; }
    .topbar .meta { display: none; }
    .topbar .status-pill { font-size: 10.5px; padding: 3px 8px; }
    .topbar input.filter { width: 100%; flex: 1; font-size: 14px; }
    .topbar .btn { font-size: 12px; padding: 6px 9px; }
    .table-wrap { padding: 8px; }
    table { border-radius: 6px; }
    th, td { padding: 10px 8px; font-size: 13.5px; }
    th { font-size: 11px; }
    input.cell-num { font-size: 14px; padding: 6px 6px; }
    .readonly-cell.ticker { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1><span class="dot"></span> Stock Valuation</h1>
  <input id="filter" class="filter" type="search" placeholder="기업명 검색..." />
  <span class="spacer"></span>
  <span class="status-pill" id="save-status" title="입력 값은 이 브라우저에만 저장됩니다">로컬 저장</span>
  <span class="meta" id="meta"></span>
  <button class="btn" id="btn-reload" title="GitHub에서 최신 시총 다시 가져오기">↻ 새로고침</button>
</div>

<div class="table-wrap">
  <table id="tbl">
    <thead><tr id="header-row"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script>
/* ───────── 설정 ───────── */
const GH = {
  OWNER: 'whysosary-dot',
  REPO:  'stock-valuation',
  PATH:  'stocks.json',
  BRANCH:'main',
};
const LS_KEY = 'sv_user_inputs_v1';

// 유저가 브라우저에서 편집 가능한 필드
const USER_FIELDS = [
  'target_cap_oku','safety_cap_oku',
  'q1_rev','q1_op','q2_rev','q2_op','q3_rev','q3_op','q4_rev','q4_op'
];

/* ───────── 컬럼 ─────────
   priority: 1=항상, 2=≤480px숨김, 3=≤680px숨김, 4=≤900px숨김
*/
const COLS = [
  { key: 'name',            label: '기업명',        type: 'ro-text',   sortable: true, align: 'left', p: 1 },
  { key: 'ticker',          label: '티커',          type: 'ro-ticker', sortable: true, align: 'left', p: 3 },
  { key: 'market_cap_oku',  label: '현재시총 (억)',  type: 'current',   sortable: true, p: 1 },
  { key: 'target_cap_oku',  label: '목표시총 (억)',  type: 'num',       sortable: true, p: 1 },
  { key: 'safety_cap_oku',  label: '안전마진 (억)',  type: 'num',       sortable: true, p: 3 },
  { key: '_upside',         label: '상방 %',        type: 'calc',      sortable: true, p: 1 },
  { key: '_downside',       label: '하방 %',        type: 'calc',      sortable: true, p: 2 },
  { key: 'q1_rev',          label: '1Q 매출',       type: 'num',       sortable: true, p: 4 },
  { key: 'q1_op',           label: '1Q 영업이익',    type: 'num',       sortable: true, p: 4 },
  { key: 'q2_rev',          label: '2Q 매출',       type: 'num',       sortable: true, p: 4 },
  { key: 'q2_op',           label: '2Q 영업이익',    type: 'num',       sortable: true, p: 4 },
  { key: 'q3_rev',          label: '3Q 매출',       type: 'num',       sortable: true, p: 4 },
  { key: 'q3_op',           label: '3Q 영업이익',    type: 'num',       sortable: true, p: 4 },
  { key: 'q4_rev',          label: '4Q 매출',       type: 'num',       sortable: true, p: 4 },
  { key: 'q4_op',           label: '4Q 영업이익',    type: 'num',       sortable: true, p: 4 },
  { key: '_op_sum',         label: '영업이익 합',    type: 'calc',      sortable: true, p: 3 },
  { key: '_por',            label: 'POR',           type: 'calc',      sortable: true, p: 1 },
];

/* ───────── 상태 ───────── */
let state = {
  stocks: [],
  usdkrw: 0,
  updated_at: '',
  filter: '',
  sortKey: null,
  sortDir: 'asc',
};

/* ───────── localStorage 유저 입력 ───────── */
function loadUserInputs() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}') || {}; }
  catch { return {}; }
}
function saveUserInputs() {
  const obj = {};
  for (const s of state.stocks) {
    const t = s.ticker;
    if (!t) continue;
    const fields = {};
    for (const f of USER_FIELDS) {
      const v = s[f];
      if (v !== null && v !== undefined && v !== '') fields[f] = v;
    }
    if (Object.keys(fields).length) obj[t] = fields;
  }
  localStorage.setItem(LS_KEY, JSON.stringify(obj));
}

/* ───────── utils ───────── */
const fmt = (v, dec=0) => {
  if (v === null || v === undefined || v === '' || Number.isNaN(v)) return '';
  const n = Number(v);
  return Number.isFinite(n) ? n.toLocaleString('ko-KR', {minimumFractionDigits:dec, maximumFractionDigits:dec}) : '';
};
const parseNum = v => {
  if (v === null || v === undefined) return null;
  const s = String(v).replace(/,/g,'').trim();
  if (s === '') return null;
  const n = Number(s);
  return Number.isFinite(n) ? n : null;
};
const uid = () => Math.random().toString(36).slice(2,10);

function b64ToUtf8(b64) {
  const bin = atob(b64.replace(/\s/g,''));
  const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}

/* 파생값 */
const opSum = s => [s.q1_op,s.q2_op,s.q3_op,s.q4_op].map(parseNum).filter(v=>v!==null).reduce((a,b)=>a+b,0);
const por = s => { const mc = parseNum(s.market_cap_oku), sum = opSum(s); return (!mc || !sum) ? null : mc/sum; };
const upside = s => { const mc = parseNum(s.market_cap_oku), t = parseNum(s.target_cap_oku); return (!mc || !t) ? null : (t/mc-1)*100; };
const downside = s => { const mc = parseNum(s.market_cap_oku), sf = parseNum(s.safety_cap_oku); return (!mc || !sf) ? null : (sf/mc-1)*100; };

function sortValue(s, k) {
  switch (k) {
    case '_upside': return upside(s);
    case '_downside': return downside(s);
    case '_op_sum': return opSum(s);
    case '_por': return por(s);
    default: return s[k];
  }
}

/* ───────── GitHub 읽기 (공개 repo, 인증 불필요) ───────── */
async function fetchFromGitHub() {
  // raw.githubusercontent.com 을 쓰면 rate-limit이 매우 느슨하고 CORS도 열려있음
  const url = `https://raw.githubusercontent.com/${GH.OWNER}/${GH.REPO}/${GH.BRANCH}/${GH.PATH}?t=${Date.now()}`;
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

/* ───────── 렌더 ───────── */
function setSaveStatus(label, cls='') {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.textContent = label;
  el.classList.remove('warn','err');
  if (cls) el.classList.add(cls);
}

function renderHeader() {
  const tr = document.getElementById('header-row');
  tr.innerHTML = '';
  COLS.forEach(c => {
    const th = document.createElement('th');
    th.textContent = c.label;
    if (c.align === 'left') th.classList.add('text-left');
    if (c.p) th.setAttribute('data-p', String(c.p));
    if (c.sortable) {
      th.addEventListener('click', () => {
        if (state.sortKey === c.key) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        else { state.sortKey = c.key; state.sortDir = 'asc'; }
        render();
      });
      if (state.sortKey === c.key) th.classList.add(state.sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    } else { th.style.cursor = 'default'; }
    if (c.width) th.style.width = c.width + 'px';
    tr.appendChild(th);
  });
}

function renderRow(s) {
  const tr = document.createElement('tr');
  tr.dataset.id = s._id;
  COLS.forEach(c => {
    const td = document.createElement('td');
    if (c.align === 'left') td.classList.add('text-left');
    if (c.p) td.setAttribute('data-p', String(c.p));

    if (c.type === 'ro-text') {
      td.textContent = s[c.key] || '';
      td.classList.add('readonly-cell', 'name');
    } else if (c.type === 'ro-ticker') {
      td.textContent = s[c.key] || '';
      td.classList.add('readonly-cell', 'ticker');
    } else if (c.type === 'current') {
      td.classList.add('current-cap');
      const v = parseNum(s[c.key]);
      td.textContent = v === null ? '—' : fmt(v, 0);
      if (s.currency && s.currency !== 'KRW') td.title = `${s.currency} 기준 환산`;
    } else if (c.type === 'num') {
      const inp = document.createElement('input');
      inp.className = 'cell-num';
      inp.value = s[c.key] !== undefined && s[c.key] !== null && s[c.key] !== '' ? fmt(s[c.key], 0) : '';
      inp.inputMode = 'decimal';
      inp.addEventListener('focus', () => {
        const v = parseNum(s[c.key]);
        inp.value = v === null ? '' : String(v);
        inp.select();
      });
      inp.addEventListener('blur', () => {
        const v = parseNum(inp.value);
        s[c.key] = v;
        inp.value = v === null ? '' : fmt(v, 0);
        queueSave();
        render();
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') inp.blur();
        if (e.key === 'Escape') { inp.value = s[c.key] === null ? '' : String(s[c.key]); inp.blur(); }
      });
      td.appendChild(inp);
    } else if (c.type === 'calc') {
      let v = null, text = '—', cls = 'dim';
      if (c.key === '_upside') { v = upside(s); if (v !== null) { text = fmt(v,1) + '%'; cls = v >= 0 ? 'pos' : 'neg'; } }
      else if (c.key === '_downside') { v = downside(s); if (v !== null) { text = fmt(v,1) + '%'; cls = v >= 0 ? 'pos' : 'neg'; } }
      else if (c.key === '_op_sum') { v = opSum(s); text = v ? fmt(v,0) : '—'; cls = ''; }
      else if (c.key === '_por') { v = por(s); text = v ? fmt(v,2) + '×' : '—'; cls = ''; }
      td.textContent = text;
      if (cls) td.classList.add(cls);
    }
    tr.appendChild(td);
  });
  return tr;
}

function render() {
  renderHeader();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  let list = [...state.stocks];
  if (state.filter) {
    const q = state.filter.toLowerCase();
    list = list.filter(s =>
      (s.name || '').toLowerCase().includes(q) ||
      (s.ticker || '').toLowerCase().includes(q));
  }
  if (state.sortKey) {
    const dir = state.sortDir === 'asc' ? 1 : -1;
    list.sort((a,b) => {
      const av = sortValue(a, state.sortKey), bv = sortValue(b, state.sortKey);
      const aN = av === null || av === undefined || av === '' || Number.isNaN(av);
      const bN = bv === null || bv === undefined || bv === '' || Number.isNaN(bv);
      if (aN && bN) return 0;
      if (aN) return 1;
      if (bN) return -1;
      if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * dir;
      return String(av).localeCompare(String(bv), 'ko') * dir;
    });
  }

  if (!list.length) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = COLS.length;
    td.className = 'empty';
    td.textContent = state.filter ? '검색 결과 없음' : '데이터 없음';
    tr.appendChild(td);
    tbody.appendChild(tr);
  } else {
    list.forEach(s => tbody.appendChild(renderRow(s)));
  }

  const m = document.getElementById('meta');
  const parts = [];
  if (state.updated_at) parts.push(`시총 ${state.updated_at.replace('T',' ').slice(0,16)}`);
  if (state.usdkrw) parts.push(`USDKRW ${Number(state.usdkrw).toFixed(1)}`);
  parts.push(`${state.stocks.length}개 종목`);
  m.textContent = parts.join(' · ');
}

/* ───────── 저장 (localStorage) ───────── */
let saveTimer = null;
function queueSave() {
  clearTimeout(saveTimer);
  setSaveStatus('저장 중...');
  saveTimer = setTimeout(() => {
    try {
      saveUserInputs();
      setSaveStatus('저장됨 ✓');
      setTimeout(() => setSaveStatus('로컬 저장'), 1200);
    } catch (e) {
      setSaveStatus('저장 실패', 'err');
      toast('저장 실패: ' + e.message, 'err');
    }
  }, 300);
}

function toast(msg, type='ok', ms=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms);
}

/* ───────── 병합: GitHub 데이터 + localStorage 오버레이 ───────── */
function mergeAndSetStocks(ghData) {
  const userInputs = loadUserInputs();
  state.stocks = (ghData.stocks || []).map(s => {
    const ui = userInputs[s.ticker] || {};
    const merged = { _id: uid() };
    for (const [k, v] of Object.entries(s)) merged[k] = v;
    for (const f of USER_FIELDS) {
      merged[f] = (ui[f] !== undefined) ? ui[f] : (s[f] ?? null);
    }
    return merged;
  });
  state.usdkrw = ghData.usdkrw || 0;
  state.updated_at = ghData.updated_at || '';
}

async function reload() {
  const btn = document.getElementById('btn-reload');
  if (btn) btn.disabled = true;
  setSaveStatus('로드 중...');
  try {
    const gh = await fetchFromGitHub();
    mergeAndSetStocks(gh);
    render();
    setSaveStatus('로컬 저장');
    toast('최신 시총 반영됨 ✓');
  } catch (e) {
    setSaveStatus('로드 실패', 'err');
    toast('GitHub 로드 실패: ' + e.message, 'err', 4500);
  } finally {
    if (btn) btn.disabled = false;
  }
}

/* ───────── 초기화 ───────── */
async function init() {
  try {
    const gh = await fetchFromGitHub();
    mergeAndSetStocks(gh);
  } catch (e) {
    toast('데이터 로드 실패: ' + e.message, 'err', 6000);
    state.stocks = [];
  }
  render();

  document.getElementById('filter').addEventListener('input', e => {
    state.filter = e.target.value.trim();
    render();
  });
  document.getElementById('btn-reload').addEventListener('click', reload);

  // 포커스 복귀 시 자동 새로고침 (스케줄러가 바꿨을 수 있음)
  let lastReload = Date.now();
  window.addEventListener('focus', async () => {
    if (Date.now() - lastReload < 30_000) return;
    lastReload = Date.now();
    try {
      const gh = await fetchFromGitHub();
      // 기존 유저 입력 유지하면서 market_cap 등 서버 값만 갱신
      const userInputs = loadUserInputs();
      state.stocks.forEach(s => {
        const latest = (gh.stocks || []).find(x => x.ticker === s.ticker);
        if (latest) {
          s.market_cap_oku = latest.market_cap_oku;
          s.currency = latest.currency;
          s.price_native = latest.price_native;
        }
      });
      state.usdkrw = gh.usdkrw || state.usdkrw;
      state.updated_at = gh.updated_at || state.updated_at;
      render();
    } catch (_) {}
  });

  // Cmd/Ctrl+S → 즉시 저장
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
      e.preventDefault();
      clearTimeout(saveTimer);
      saveUserInputs();
      setSaveStatus('저장됨 ✓');
      setTimeout(() => setSaveStatus('로컬 저장'), 1200);
    }
  });
}

init();
</script>
