const DIARY_KEY = 'sv_diary_v1';
const DIARY_GH_SHA_KEY = 'sv_diary_gh_sha_v1'; // GitHub 마지막 동기화 시점의 blob SHA

function loadDiary() {
  try { return JSON.parse(localStorage.getItem(DIARY_KEY) || '{"daily":{},"weekly":{}}'); }
  catch { return { daily: {}, weekly: {} }; }
}
function saveDiaryData(data) { localStorage.setItem(DIARY_KEY, JSON.stringify(data)); }

const diary = {
  data: loadDiary(),
  activeTab: 'daily',
  saveTimers: {},
};

function todayDateStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getWeekKey(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - day);
  const year = d.getFullYear();
  const jan1 = new Date(year, 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + 1) / 7);
  return `${year}-W${String(week).padStart(2,'0')}`;
}

function formatDateHeader(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const DAYS = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;
}

function formatWeekHeader(weekKey) {
  const [y, w] = weekKey.split('-W');
  const wNum = parseInt(w);
  const jan4 = new Date(parseInt(y), 0, 4);
  const monday = new Date(jan4.getTime() - ((jan4.getDay()||7) - 1) * 86400000 + (wNum - 1) * 7 * 86400000);
  const sunday = new Date(monday.getTime() + 6 * 86400000);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  return `${y}년 ${wNum}주차 (${fmt(monday)} ~ ${fmt(sunday)})`;
}

/* ── textarea 자동 높이 ── */
function taAutoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

/* ── 탭 카운트 업데이트 ── */
function updateTabCounts() {
  const d = diary.data;
  document.getElementById('cnt-daily').textContent =
    Object.keys(d.daily || {}).filter(k => d.daily[k]).length;
  document.getElementById('cnt-weekly').textContent =
    Object.keys(d.weekly || {}).filter(k => d.weekly[k]).length;
  document.getElementById('cnt-trades').textContent =
    Object.keys(d.trades || {}).filter(k => (d.trades[k]||[]).length > 0).length;
  // 강조 — _extractHighlights 사용 (마커 + 스타일 fallback 모두 인식)
  let hi = 0;
  const countIn = (html) => { hi += _extractHighlights(html).length; };
  Object.values(d.daily  || {}).forEach(countIn);
  Object.values(d.weekly || {}).forEach(countIn);
  Object.values(d.trades || {}).forEach(arr => (arr || []).forEach(t => countIn(t.memo)));
  const elHi = document.getElementById('cnt-highlights');
  if (elHi) elHi.textContent = hi;
}

/* ── 저장 (디바운스) — value 는 HTML 일 수도 plain text 일 수도 있음 ── */
function diarySave(key, section, value, badgeEl) {
  clearTimeout(diary.saveTimers[key]);
  diary.saveTimers[key] = setTimeout(() => {
    // 시각적 빈 콘텐츠( <br>·&nbsp;·공백만 )도 빈 것으로 간주
    const probe = document.createElement('div');
    probe.innerHTML = String(value || '');
    const hasContent = (probe.innerText || '').replace(/ /g, ' ').trim().length > 0;
    if (hasContent) diary.data[section][key] = value;
    else delete diary.data[section][key];
    saveDiaryData(diary.data);
    updateTabCounts();
    if (badgeEl) {
      badgeEl.classList.add('show');
      setTimeout(() => badgeEl.classList.remove('show'), 1500);
    }
  }, 500);
}

/* ── 일기 카드 생성 ── */
function makeDailyCard(dateStr, today) {
  const card = document.createElement('div');
  card.className = 'dcard'; card.dataset.key = dateStr;

  const header = document.createElement('div'); header.className = 'dcard-header';
  const dateLabel = document.createElement('span'); dateLabel.className = 'dcard-date';
  dateLabel.textContent = formatDateHeader(dateStr);
  header.appendChild(dateLabel);

  if (dateStr === today) {
    const b = document.createElement('span'); b.className = 'dcard-today'; b.textContent = '오늘';
    header.appendChild(b);
  }
  const saveBadge = document.createElement('span'); saveBadge.className = 'diary-save-badge';
  saveBadge.textContent = '저장됨 ✓'; header.appendChild(saveBadge);

  const delBtn = document.createElement('button'); delBtn.className = 'dcard-del'; delBtn.title = '삭제'; delBtn.textContent = '×';
  delBtn.addEventListener('click', () => {
    if (!confirm('이 일기를 삭제할까요?')) return;
    delete diary.data.daily[dateStr]; saveDiaryData(diary.data); updateTabCounts(); renderFeedDaily();
  });
  header.appendChild(delBtn);
  card.appendChild(header);

  const ta = document.createElement('div');
  ta.className = 'dcard-edit';
  ta.contentEditable = 'true';
  ta.setAttribute('data-placeholder', '오늘의 투자 생각을 기록하세요...');
  ta.innerHTML = normalizeDiaryValue(diary.data.daily[dateStr] || '');
  attachEditable(ta);
  ta.addEventListener('input', () => {
    diarySave(dateStr, 'daily', sanitizeDiaryHTML(ta.innerHTML), saveBadge);
  });
  card.appendChild(ta);
  return card;
}

/* ── 일기 피드 렌더 ── */
function renderFeedDaily() {
  const feed = document.getElementById('feed-daily'); feed.innerHTML = '';
  const today = todayDateStr();

  const newBtn = document.createElement('button'); newBtn.className = 'diary-new-card-btn'; newBtn.textContent = '+ 오늘 일기 작성';
  newBtn.addEventListener('click', () => {
    const ex = feed.querySelector(`[data-key="${today}"] .dcard-edit`);
    if (ex) { ex.focus(); return; }
    if (!diary.data.daily) diary.data.daily = {};
    if (diary.data.daily[today] === undefined) diary.data.daily[today] = '';
    renderFeedDaily();
    setTimeout(() => { const ta = feed.querySelector(`[data-key="${today}"] .dcard-edit`); if (ta) ta.focus(); }, 50);
  });
  feed.appendChild(newBtn);

  const keys = Object.keys(diary.data.daily || {}).sort().reverse();

  if (!keys.length) {
    const e = document.createElement('div'); e.className = 'diary-empty-state';
    e.textContent = '아직 기록이 없어요. 위 버튼으로 오늘 일기를 써보세요!';
    feed.appendChild(e); return;
  }
  keys.forEach(k => feed.appendChild(makeDailyCard(k, today)));
}

/* ── 주간 전략 피드 렌더 ── */
function renderFeedWeekly() {
  const feed = document.getElementById('feed-weekly'); feed.innerHTML = '';
  const thisWeek = getWeekKey(todayDateStr());
  const nextWeekDate = new Date(); nextWeekDate.setDate(nextWeekDate.getDate() + 7);
  const nextWeek = getWeekKey(`${nextWeekDate.getFullYear()}-${String(nextWeekDate.getMonth()+1).padStart(2,'0')}-${String(nextWeekDate.getDate()).padStart(2,'0')}`);

  const btnWrap = document.createElement('div');
  btnWrap.style.cssText = 'display:flex; gap:8px; margin-bottom:0;';

  const makeWeekBtn = (label, weekKey) => {
    const btn = document.createElement('button'); btn.className = 'diary-new-card-btn';
    btn.style.flex = '1'; btn.style.marginBottom = '16px'; btn.textContent = label;
    btn.addEventListener('click', () => {
      const ex = feed.querySelector(`[data-key="${weekKey}"] .dcard-edit`);
      if (ex) { ex.focus(); return; }
      if (!diary.data.weekly) diary.data.weekly = {};
      if (diary.data.weekly[weekKey] === undefined) diary.data.weekly[weekKey] = '';
      renderFeedWeekly();
      setTimeout(() => { const ta = feed.querySelector(`[data-key="${weekKey}"] .dcard-edit`); if (ta) ta.focus(); }, 50);
    });
    return btn;
  };
  btnWrap.appendChild(makeWeekBtn('+ 이번 주 전략 작성', thisWeek));
  btnWrap.appendChild(makeWeekBtn('+ 다음 주 전략 작성', nextWeek));
  feed.appendChild(btnWrap);

  const keys = Object.keys(diary.data.weekly || {}).sort().reverse();

  if (!keys.length) {
    const e = document.createElement('div'); e.className = 'diary-empty-state';
    e.textContent = '아직 주간 전략이 없어요. 위 버튼으로 이번 주 전략을 정리해보세요!';
    feed.appendChild(e); return;
  }

  keys.forEach(k => {
    const card = document.createElement('div'); card.className = 'dcard'; card.dataset.key = k;
    const header = document.createElement('div'); header.className = 'dcard-header';
    const dateLabel = document.createElement('span'); dateLabel.className = 'dcard-date';
    dateLabel.textContent = formatWeekHeader(k); header.appendChild(dateLabel);
    if (k === thisWeek) {
      const b = document.createElement('span'); b.className = 'dcard-today'; b.textContent = '이번 주'; header.appendChild(b);
    } else if (k === nextWeek) {
      const b = document.createElement('span'); b.className = 'dcard-today'; b.textContent = '다음 주'; header.appendChild(b);
    }
    const saveBadge = document.createElement('span'); saveBadge.className = 'diary-save-badge';
    saveBadge.textContent = '저장됨 ✓'; header.appendChild(saveBadge);
    const delBtn = document.createElement('button'); delBtn.className = 'dcard-del'; delBtn.title = '삭제'; delBtn.textContent = '×';
    delBtn.addEventListener('click', () => {
      if (!confirm('이 주간 전략을 삭제할까요?')) return;
      delete diary.data.weekly[k]; saveDiaryData(diary.data); updateTabCounts(); renderFeedWeekly();
    });
    header.appendChild(delBtn); card.appendChild(header);

    const ta = document.createElement('div');
    ta.className = 'dcard-edit';
    ta.contentEditable = 'true';
    ta.setAttribute('data-placeholder', '이번 주 투자 전략을 정리하세요...');
    ta.innerHTML = normalizeDiaryValue(diary.data.weekly[k] || '');
    attachEditable(ta);
    ta.addEventListener('input', () => {
      diarySave(k, 'weekly', sanitizeDiaryHTML(ta.innerHTML), saveBadge);
    });
    card.appendChild(ta); feed.appendChild(card);
  });
}

/* ── 매매 섹션 내부 렌더 ── */
function renderTradeSection(dateStr, container) {
  container.innerHTML = '';
  if (!diary.data.trades) diary.data.trades = {};
  const trades = diary.data.trades[dateStr] || [];

  const addBar = document.createElement('div'); addBar.className = 'trade-add-bar';
  const summary = document.createElement('span'); summary.className = 'trade-summary';
  const profitEl = document.createElement('span'); profitEl.className = 'trade-profit';
  const unclosedEl = document.createElement('span'); unclosedEl.className = 'trade-unclosed';

  const calcSummary = () => {
    let totalBuy = 0, totalSell = 0;
    const byName = {};

    trades.forEach(t => {
      const qty   = Number(String(t.qty  ||'').replace(/,/g,'')) || 0;
      const price = Number(String(t.price||'').replace(/,/g,'')) || 0;
      const val   = qty * price;
      if (t.type === '매수') totalBuy += val; else totalSell += val;

      const name = (t.name || '?').trim();
      if (!byName[name]) byName[name] = { buyQty:0, buyAmt:0, sellQty:0 };
      if (t.type === '매수') { byName[name].buyQty += qty; byName[name].buyAmt += val; }
      else                    { byName[name].sellQty += qty; }
    });

    // 요약
    const parts = [];
    if (totalBuy)  parts.push(`매수 ${totalBuy.toLocaleString('ko-KR')}원`);
    if (totalSell) parts.push(`매도 ${totalSell.toLocaleString('ko-KR')}원`);
    summary.textContent = parts.join(' · ');

    // 순현금흐름
    if (totalBuy > 0 || totalSell > 0) {
      const net = totalSell - totalBuy;
      const sign = net >= 0 ? '+' : '';
      profitEl.textContent = `순현금흐름 ${sign}${net.toLocaleString('ko-KR')}원`;
      profitEl.className = 'trade-profit ' + (net >= 0 ? 'gain' : 'loss');
      profitEl.style.display = '';
    } else {
      profitEl.style.display = 'none';
    }

    // 미청산 포지션 (당일 매수 수량 > 매도 수량인 종목 — 원가 기준)
    let unclosedTotal = 0;
    const unclosedLabels = [];
    Object.entries(byName).forEach(([name, s]) => {
      if (!s.buyQty) return;
      const netQty = s.buyQty - s.sellQty;
      if (netQty > 0) {
        const avgBuy = s.buyAmt / s.buyQty;
        unclosedTotal += netQty * avgBuy;
        unclosedLabels.push(`${name} ${netQty}주`);
      }
    });
    if (unclosedTotal > 0) {
      unclosedEl.textContent = `미청산 포지션 ${unclosedTotal.toLocaleString('ko-KR')}원`;
      unclosedEl.title = unclosedLabels.join(', ');
      unclosedEl.style.display = '';
    } else {
      unclosedEl.style.display = 'none';
    }
  };

  profitEl.style.display = 'none';
  unclosedEl.style.display = 'none';
  calcSummary();

  const statsWrap = document.createElement('div'); statsWrap.className = 'trade-stats';
  statsWrap.appendChild(profitEl); statsWrap.appendChild(unclosedEl);
  addBar.appendChild(summary); addBar.appendChild(statsWrap); container.appendChild(addBar);

  let dl = document.getElementById('stock-names-list');
  if (!dl) { dl = document.createElement('datalist'); dl.id = 'stock-names-list'; document.body.appendChild(dl); }
  dl.innerHTML = '';
  (state.stocks || []).forEach(s => { const o = document.createElement('option'); o.value = s.name || ''; dl.appendChild(o); });

  if (!trades.length) {
    const empty = document.createElement('div'); empty.className = 'trade-empty'; empty.textContent = '거래 내역이 없어요';
    container.appendChild(empty); return;
  }

  const mkLabel = t => { const s = document.createElement('span'); s.className = 'trade-label'; s.textContent = t; return s; };

  trades.forEach(trade => {
    const card = document.createElement('div'); card.className = 'trade-card';
    const row1 = document.createElement('div'); row1.className = 'trade-row1';
    const row2 = document.createElement('div'); row2.className = 'trade-row2';
    const row3 = document.createElement('div'); row3.className = 'trade-row3';

    const typeSel = document.createElement('select'); typeSel.className = `trade-type-sel ${trade.type==='매수'?'buy':'sell'}`;
    ['매수','매도'].forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; if (v===trade.type) o.selected=true; typeSel.appendChild(o); });
    typeSel.addEventListener('change', () => { trade.type=typeSel.value; typeSel.className=`trade-type-sel ${trade.type==='매수'?'buy':'sell'}`; saveDiaryData(diary.data); });

    const nameInp = document.createElement('input'); nameInp.className = 'trade-inp name'; nameInp.placeholder = '종목명'; nameInp.value = trade.name||''; nameInp.setAttribute('list','stock-names-list');
    nameInp.addEventListener('input', () => { trade.name=nameInp.value; saveDiaryData(diary.data); });

    const delBtn = document.createElement('button'); delBtn.className = 'trade-del-btn'; delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => {
      diary.data.trades[dateStr] = diary.data.trades[dateStr].filter(t => t.id !== trade.id);
      if (!diary.data.trades[dateStr].length) delete diary.data.trades[dateStr];
      saveDiaryData(diary.data); updateTabCounts(); renderFeedTrades();
    });
    row1.append(typeSel, nameInp, delBtn);

    const qtyInp = document.createElement('input'); qtyInp.className = 'trade-inp num'; qtyInp.placeholder = '수량'; qtyInp.value = trade.qty ? Number(trade.qty).toLocaleString('ko-KR') : '';
    const priceInp = document.createElement('input'); priceInp.className = 'trade-inp num'; priceInp.placeholder = '단가'; priceInp.value = trade.price ? Number(trade.price).toLocaleString('ko-KR') : '';
    const totalEl = document.createElement('span'); totalEl.className = 'trade-total';
    const calcTotal = () => {
      const q = Number(String(qtyInp.value).replace(/,/g,''))||0;
      const p = Number(String(priceInp.value).replace(/,/g,''))||0;
      totalEl.textContent = (q&&p) ? `= ${(q*p).toLocaleString('ko-KR')}원` : '';
      calcSummary();
    };
    qtyInp.addEventListener('focus', () => { qtyInp.value = String(trade.qty||'').replace(/,/g,''); });
    qtyInp.addEventListener('blur', () => { trade.qty=qtyInp.value; qtyInp.value=trade.qty?Number(trade.qty).toLocaleString('ko-KR'):''; saveDiaryData(diary.data); calcTotal(); });
    qtyInp.addEventListener('input', calcTotal);
    priceInp.addEventListener('focus', () => { priceInp.value = String(trade.price||'').replace(/,/g,''); });
    priceInp.addEventListener('blur', () => { trade.price=priceInp.value; priceInp.value=trade.price?Number(trade.price).toLocaleString('ko-KR'):''; saveDiaryData(diary.data); calcTotal(); });
    priceInp.addEventListener('input', calcTotal);
    calcTotal();
    row2.append(mkLabel('수량'), qtyInp, mkLabel('주  ×  가격'), priceInp, mkLabel('원'), totalEl);

    const memoTA = document.createElement('div');
    memoTA.className = 'memo-edit';
    memoTA.contentEditable = 'true';
    memoTA.setAttribute('data-placeholder', '매매 사유 / 메모');
    memoTA.innerHTML = normalizeDiaryValue(trade.memo || '');
    attachEditable(memoTA);
    memoTA.addEventListener('input', () => {
      trade.memo = sanitizeDiaryHTML(memoTA.innerHTML);
      saveDiaryData(diary.data);
    });
    memoTA.addEventListener('blur', () => {
      trade.memo = sanitizeDiaryHTML(memoTA.innerHTML);
      saveDiaryData(diary.data);
    });
    row3.append(mkLabel('메모'), memoTA);

    card.append(row1, row2, row3); container.appendChild(card);
  });
}

/* ── 강조 탭: 빨강+볼드 처리된 문장만 모아 보기 ── */
function _diaryDateSortKey(date) {
  // weekly 키(YYYY-WNN) 는 그 주 월요일 날짜로 환산해 daily 키와 비교 가능하게
  const m = String(date).match(/^(\d{4})-W(\d{2})$/);
  if (m) {
    const y = +m[1], w = +m[2];
    const jan4 = new Date(y, 0, 4);
    const monday = new Date(jan4.getTime() - ((jan4.getDay() || 7) - 1) * 86400000 + (w - 1) * 7 * 86400000);
    return `${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,'0')}-${String(monday.getDate()).padStart(2,'0')}`;
  }
  return String(date);
}

function _extractHighlights(html) {
  // 마커(data-diary-br='1') 또는 동등한 스타일(빨강+볼드) 가진 span 모두 인식.
  // legacy 데이터(마커 없는 것)와도 호환.
  if (!html) return [];
  const div = document.createElement('div');
  div.innerHTML = String(html);
  return [...div.querySelectorAll('span')].filter(sp => {
    if (sp.getAttribute('data-diary-br') === '1') return true;
    return _looksLikeBoldRed(sp.getAttribute('style') || '');
  }).map(sp => sp.outerHTML);
}

function renderFeedHighlights() {
  const feed = document.getElementById('feed-highlights');
  if (!feed) return;
  feed.innerHTML = '';

  const items = []; // {date, sortKey, sectionKey, sectionLabel, extraTag, htmlSnippet}

  Object.entries(diary.data.daily || {}).forEach(([k, v]) => {
    _extractHighlights(v).forEach(snippet => {
      items.push({ date: k, sortKey: _diaryDateSortKey(k), sectionKey: 'daily', sectionLabel: '일기', extraTag: '', htmlSnippet: snippet });
    });
  });
  Object.entries(diary.data.weekly || {}).forEach(([k, v]) => {
    _extractHighlights(v).forEach(snippet => {
      items.push({ date: k, sortKey: _diaryDateSortKey(k), sectionKey: 'weekly', sectionLabel: '주간', extraTag: '', htmlSnippet: snippet });
    });
  });
  Object.entries(diary.data.trades || {}).forEach(([dateStr, trades]) => {
    (trades || []).forEach(t => {
      _extractHighlights(t.memo).forEach(snippet => {
        items.push({ date: dateStr, sortKey: _diaryDateSortKey(dateStr), sectionKey: 'trades', sectionLabel: '매매', extraTag: t.name || '', htmlSnippet: snippet });
      });
    });
  });

  // 최신순
  items.sort((a, b) => (b.sortKey || '').localeCompare(a.sortKey || ''));

  if (!items.length) {
    const e = document.createElement('div'); e.className = 'diary-empty-state';
    e.innerHTML = '강조 표시한 문장이 아직 없어요.<br>일기 · 주간전략 · 매매메모에서 글자를 드래그한 뒤 상단의 <strong style="color:var(--red)">B</strong> 버튼을 눌러 강조해보세요.';
    feed.appendChild(e); return;
  }

  items.forEach(it => {
    const card = document.createElement('div');
    card.className = 'highlight-card';
    card.dataset.section = it.sectionKey;
    card.dataset.date = it.date;

    const meta = document.createElement('div'); meta.className = 'highlight-meta';
    const dateSpan = document.createElement('span'); dateSpan.className = 'highlight-date';
    if (/^\d{4}-W\d{2}$/.test(it.date))           dateSpan.textContent = formatWeekHeader(it.date);
    else if (/^\d{4}-\d{2}-\d{2}$/.test(it.date)) dateSpan.textContent = formatDateHeader(it.date);
    else                                          dateSpan.textContent = it.date;
    meta.appendChild(dateSpan);

    const tagSpan = document.createElement('span'); tagSpan.className = `highlight-tag ${it.sectionKey}`;
    tagSpan.textContent = it.sectionLabel + (it.extraTag ? ` · ${it.extraTag}` : '');
    meta.appendChild(tagSpan);

    const body = document.createElement('div'); body.className = 'highlight-body';
    // _extractHighlights 가 반환하는 outerHTML 은 이미 sanitize 된 데이터에서 추출.
    body.innerHTML = it.htmlSnippet;

    card.appendChild(meta);
    card.appendChild(body);

    // 카드 클릭 → 해당 원본 탭으로 이동 (단순 안내)
    card.addEventListener('click', () => {
      const target = it.sectionKey;
      const btn = document.querySelector(`.dtab[data-tab="${target}"]`);
      if (btn) btn.click();
    });

    feed.appendChild(card);
  });
}

/* ── 초기화 ── */
function initDiary() {
  document.querySelectorAll('.dtab').forEach(btn => {
    btn.addEventListener('click', () => {
      diary.activeTab = btn.dataset.tab;
      document.querySelectorAll('.dtab').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.diary-feed').forEach(f => f.classList.toggle('active', f.id === `feed-${diary.activeTab}`));
      // 강조 탭은 들어올 때마다 최신 상태로 새로 그림
      if (diary.activeTab === 'highlights') renderFeedHighlights();
      // 탭이 보여진 후 모든 textarea 높이 재계산 (display:none 상태에서 scrollHeight=0 문제 해결)
      requestAnimationFrame(() => {
        document.querySelectorAll(`#feed-${diary.activeTab} textarea`).forEach(ta => {
          ta.style.height = 'auto';
          ta.style.height = ta.scrollHeight + 'px';
        });
      });
    });
  });

  /* ── 검색 기능 ── */

  /* q 주변 스니펫 DOM 노드 배열 반환 (하이라이트 포함) */
  function makeSnippets(text, q) {
    const lower = text.toLowerCase();
    const result = [];
    let searchFrom = 0;
    while (result.length < 3) {
      const idx = lower.indexOf(q, searchFrom);
      if (idx === -1) break;
      const start = Math.max(0, idx - 45);
      const end   = Math.min(text.length, idx + q.length + 45);
      const pre   = (start > 0 ? '…' : '') + text.slice(start, idx).replace(/\n/g, ' ');
      const hit   = text.slice(idx, idx + q.length);
      const post  = text.slice(idx + q.length, end).replace(/\n/g, ' ') + (end < text.length ? '…' : '');
      const span  = document.createElement('span');
      span.className = 'snippet-item';
      span.appendChild(document.createTextNode(pre));
      const mark = document.createElement('mark');
      mark.className = 'search-mark';
      mark.textContent = hit;
      span.appendChild(mark);
      span.appendChild(document.createTextNode(post));
      result.push(span);
      searchFrom = idx + q.length;
    }
    return result;
  }

  function applyDiarySearch(query) {
    const q = query.trim().toLowerCase();
    const activeTab = diary.activeTab || 'daily';
    const feed = document.getElementById(`feed-${activeTab}`);
    if (!feed) return;
    feed.querySelectorAll('.dcard').forEach(card => {
      // 기존 스니펫 바 제거
      card.querySelectorAll('.search-snippet-bar').forEach(el => el.remove());
      if (!q) {
        card.classList.remove('search-hidden');
        return;
      }
      // 검색 대상 텍스트 수집 (contenteditable 은 innerText, textarea 는 value)
      const sources = [];
      card.querySelectorAll('.dcard-edit, .memo-edit').forEach(el => {
        const t = el.innerText || '';
        if (t.trim()) sources.push(t);
      });
      card.querySelectorAll('textarea').forEach(ta => { if (ta.value) sources.push(ta.value); });
      card.querySelectorAll('input').forEach(inp => { if (inp.type !== 'hidden' && inp.value) sources.push(inp.value); });
      card.querySelectorAll('select').forEach(sel => { if (sel.value) sources.push(sel.value); });
      const dateEl = card.querySelector('.dcard-date');
      if (dateEl) sources.push(dateEl.textContent);

      const haystack = sources.join('\n').toLowerCase();
      if (!haystack.includes(q)) {
        card.classList.add('search-hidden');
        return;
      }
      card.classList.remove('search-hidden');

      // 스니펫 바 생성 (최대 3개 발췌)
      const allSnippets = [];
      for (const src of sources) {
        makeSnippets(src, q).forEach(s => allSnippets.push(s));
        if (allSnippets.length >= 3) break;
      }
      if (allSnippets.length) {
        const bar = document.createElement('div');
        bar.className = 'search-snippet-bar';
        allSnippets.slice(0, 3).forEach(s => bar.appendChild(s));
        card.appendChild(bar);
      }
    });
  }

  document.getElementById('diary-search').addEventListener('input', e => {
    applyDiarySearch(e.target.value);
  });

  // 탭 전환 시 검색어 유지하며 재적용
  document.querySelectorAll('.dtab').forEach(btn => {
    btn.addEventListener('click', () => {
      const sq = document.getElementById('diary-search').value;
      if (sq) setTimeout(() => applyDiarySearch(sq), 50);
    });
  });

  // 볼드+빨강 토글 — 현재 선택 영역에 적용
  const fmtBtn = document.getElementById('diary-fmt-bold-red');
  if (fmtBtn) {
    // mousedown 으로 처리 — click 직전에 contenteditable 의 selection 이 날아가는 걸 방지
    fmtBtn.addEventListener('mousedown', (e) => {
      e.preventDefault();
      applyBoldRedToggle();
    });
  }

  // 강조 해제 — 선택 영역의 모든 강조 span unwrap
  const clearBtn = document.getElementById('diary-fmt-clear');
  if (clearBtn) {
    clearBtn.addEventListener('mousedown', (e) => {
      e.preventDefault();
      clearBoldRedInRange();
    });
  }

  // 🔄 GitHub 에서 가져오기 — 다른 기기에서 ☁️ 커밋&푸시한 내용 즉시 반영
  const pullBtn = document.getElementById('diary-pull-btn');
  if (pullBtn) {
    pullBtn.addEventListener('click', async () => {
      if (!confirm('GitHub 의 최신 다이어리 내용을 이 기기로 가져옵니다.\n\n이 기기에서만 작성하고 아직 ☁️ 커밋&푸시하지 않은 내용은 사라집니다.\n\n진행할까요?')) return;
      const origLabel = pullBtn.textContent;
      pullBtn.disabled = true;
      pullBtn.textContent = '🔄 가져오는 중…';
      try {
        let ghDiary = null, pulledSha = '';
        // 1차: GitHub API (캐시 짧음, 거의 즉시 반영). public repo 라 PAT 없이도 가능.
        try {
          const r1 = await fetch(`https://api.github.com/repos/${GH.OWNER}/${GH.REPO}/contents/diary.json?ref=${GH.BRANCH}&t=${Date.now()}`, {
            cache: 'no-store',
            headers: { Accept: 'application/vnd.github+json' }
          });
          if (r1.ok) {
            const meta = await r1.json();
            pulledSha = meta && meta.sha ? String(meta.sha) : '';
            if (meta && meta.content) {
              const raw = new TextDecoder().decode(Uint8Array.from(atob(String(meta.content).replace(/\n/g,'')), c => c.charCodeAt(0)));
              ghDiary = JSON.parse(raw);
            }
          }
        } catch(_) {}
        // 2차 fallback: raw.githubusercontent.com (max-age=300, 최대 5분 지연 가능)
        if (!ghDiary) {
          const r2 = await fetch(`https://raw.githubusercontent.com/${GH.OWNER}/${GH.REPO}/${GH.BRANCH}/diary.json?t=${Date.now()}`, { cache: 'no-store' });
          if (!r2.ok) throw new Error(`HTTP ${r2.status}`);
          ghDiary = await r2.json();
        }
        if (!ghDiary || typeof ghDiary !== 'object') throw new Error('응답 형식 비정상');
        diary.data = {
          daily:  ghDiary.daily  || {},
          weekly: ghDiary.weekly || {},
          trades: ghDiary.trades || {},
        };
        saveDiaryData(diary.data);
        // 가져온 SHA 저장 — 자동 머지가 다음 새로고침에 또 덮어쓰지 않음
        if (pulledSha) localStorage.setItem(DIARY_GH_SHA_KEY, pulledSha);
        renderAllDiaryFeeds();
        const sq = document.getElementById('diary-search').value;
        if (sq) applyDiarySearch(sq);
        const n = Object.keys(diary.data.daily).length + Object.keys(diary.data.weekly).length + Object.keys(diary.data.trades).length;
        toast(`✅ GitHub 다이어리 가져옴 (${n}개 항목)`, 'ok', 3000);
      } catch (e) {
        toast('❌ 가져오기 실패: ' + e.message, 'err', 4500);
      } finally {
        pullBtn.disabled = false;
        pullBtn.textContent = origLabel;
      }
    });
  }

  document.getElementById('diary-backup-btn').addEventListener('click', () => {
    const out = JSON.stringify({ _backup_date: new Date().toISOString().slice(0,19).replace('T',' '), _note: 'sv_diary_v1', data: diary.data }, null, 2);
    document.getElementById('backup-modal-title').textContent = '📔 Diary 백업';
    document.getElementById('backup-text').value = out;
    document.getElementById('backup-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('backup-text').select(), 80);
  });

  renderAllDiaryFeeds();
  // 렌더 후 검색어 재적용
  requestAnimationFrame(() => {
    const sq = document.getElementById('diary-search').value;
    if (sq) applyDiarySearch(sq);
  });
  // 초기 active 탭 textarea 높이 재계산
  requestAnimationFrame(() => {
    document.querySelectorAll(`#feed-${diary.activeTab} textarea`).forEach(ta => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });
  });

  const _diaryAbort = new AbortController();
  window.addEventListener('pagehide', () => _diaryAbort.abort(), { once: true });
  (async () => {
    try {
      // 정책: GitHub diary.json 의 blob SHA 를 추적해서
      //   - 새 커밋(SHA 변경) 있을 때만 GitHub 우선으로 머지 → 다른 기기 변경 흡수
      //   - SHA 동일 → 머지 스킵, localStorage 그대로 → 미커밋 변경 보존
      // ☁️커밋 시에도 새 SHA 를 저장해서 같은 기기 커밋 직후 새로고침은 머지 안 함.
      const lastSha = localStorage.getItem(DIARY_GH_SHA_KEY) || '';

      // 1차: GitHub Contents API (캐시 짧음, blob SHA 함께 얻음)
      let ghDiary = null, ghSha = '';
      try {
        const r1 = await fetch(
          `https://api.github.com/repos/${GH.OWNER}/${GH.REPO}/contents/diary.json?ref=${GH.BRANCH}&t=${Date.now()}`,
          { signal: _diaryAbort.signal, cache: 'no-store', headers: { Accept: 'application/vnd.github+json' } }
        );
        if (r1.ok) {
          const meta = await r1.json();
          ghSha = meta && meta.sha ? String(meta.sha) : '';
          // SHA 가 마지막 동기화 시점과 같으면 — 새 커밋 없음 → 머지 없이 종료
          if (ghSha && lastSha && ghSha === lastSha) return;
          if (meta && meta.content) {
            const raw = new TextDecoder().decode(Uint8Array.from(atob(String(meta.content).replace(/\n/g,'')), c => c.charCodeAt(0)));
            ghDiary = JSON.parse(raw);
          }
        }
      } catch(e) {
        if (e && e.name === 'AbortError') return;
      }

      // 2차 fallback: raw (SHA 못 얻으니 보수적으로 머지 진행. 단 lastSha 가 없을 때만
      // — lastSha 가 있는데 API 가 실패한 상태에서 raw 옛 응답으로 덮어쓰지 않도록)
      if (!ghDiary) {
        if (lastSha) return; // 마지막 SHA 가 있는데 API 가 실패 → 안전하게 미머지
        const r = await fetch(
          `https://raw.githubusercontent.com/${GH.OWNER}/${GH.REPO}/${GH.BRANCH}/diary.json?t=${Date.now()}`,
          { signal: _diaryAbort.signal, cache: 'no-store' }
        );
        if (!r.ok) return;
        ghDiary = await r.json();
      }
      if (!ghDiary || typeof ghDiary !== 'object') return;
      // GitHub 데이터가 비어있으면 localStorage 보존 (네트워크 오류·빈 응답 방어)
      const ghHasData = Object.keys(ghDiary.daily||{}).length
                      + Object.keys(ghDiary.weekly||{}).length
                      + Object.keys(ghDiary.trades||{}).length;
      if (!ghHasData) return;

      // 새 커밋 발견 → GitHub 우선 머지 (같은 키는 GitHub 값으로, GitHub 에 없는 키만 localStorage 보존)
      const snapshot = loadDiary();
      diary.data = {
        daily:  { ...(snapshot.daily  || {}), ...(ghDiary.daily  || {}) },
        weekly: { ...(snapshot.weekly || {}), ...(ghDiary.weekly || {}) },
        trades: { ...(snapshot.trades || {}), ...(ghDiary.trades || {}) },
      };
      saveDiaryData(diary.data);
      if (ghSha) localStorage.setItem(DIARY_GH_SHA_KEY, ghSha);
      renderAllDiaryFeeds();
      requestAnimationFrame(() => {
        const sq = document.getElementById('diary-search').value;
        if (sq) applyDiarySearch(sq);
      });
    } catch (_) {} // AbortError 포함 무시
  })();
}

initDiary();

/* ───────── GitHub PAT 모달 ───────── */
function openPatModal() {
  const inp = document.getElementById('pat-inp');
  const saved = localStorage.getItem(LS_PAT_KEY) || '';
  inp.value = saved ? '••••••••••••••••' : '';
  inp.dataset.filled = saved ? '1' : '';
  document.getElementById('pat-status').style.display = saved ? 'block' : 'none';
  document.getElementById('pat-modal').style.display = 'flex';
  if (!saved) inp.focus();
}
function closePatModal() { document.getElementById('pat-modal').style.display = 'none'; }

document.getElementById('gh-settings-btn').addEventListener('click', openPatModal);
document.getElementById('pat-close').addEventListener('click', closePatModal);
document.getElementById('pat-modal').addEventListener('click', e => { if (e.target === document.getElementById('pat-modal')) closePatModal(); });

document.getElementById('pat-inp').addEventListener('focus', () => {
  const inp = document.getElementById('pat-inp');
  if (inp.dataset.filled) { inp.value = ''; inp.dataset.filled = ''; }
});

document.getElementById('pat-save').addEventListener('click', () => {
  const val = document.getElementById('pat-inp').value.trim();
  if (!val || val.startsWith('•')) { toast('토큰을 입력하세요', 'err', 2000); return; }
  localStorage.setItem(LS_PAT_KEY, val);
  document.getElementById('pat-status').style.display = 'block';
  document.getElementById('gh-commit-btn').title = '밸류에이션 + 다이어리 GitHub에 커밋';
  toast('토큰 저장됨 ✓', 'ok', 2000);
  setTimeout(closePatModal, 700);
});

document.getElementById('pat-clear').addEventListener('click', () => {
  localStorage.removeItem(LS_PAT_KEY);
  document.getElementById('pat-inp').value = '';
  document.getElementById('pat-status').style.display = 'none';
  toast('토큰 삭제됨', 'ok', 2000);
});

/* ───────── GitHub 커밋 & 푸시 ───────── */
async function ghApiGet(pat, path) {
  const r = await fetch(`https://api.github.com/repos/${GH.OWNER}/${GH.REPO}/contents/${path}?ref=${GH.BRANCH}`, {
    headers: { Authorization: `token ${pat}`, Accept: 'application/vnd.github+json', 'User-Agent': 'sv-browser' }
  });
  if (!r.ok) { if (r.status === 404) return null; throw new Error(`GET ${path}: ${r.status}`); }
  return r.json();
}

async function ghApiPut(pat, path, contentStr, sha, message) {
  // UTF-8 → base64 (한글 포함)
  const bytes = new TextEncoder().encode(contentStr);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  const b64 = btoa(bin);
  const body = { message, content: b64, branch: GH.BRANCH };
  if (sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${GH.OWNER}/${GH.REPO}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: `token ${pat}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json', 'User-Agent': 'sv-browser' },
    body: JSON.stringify(body)
  });
  if (!r.ok) { const e = await r.json().catch(()=>{}); throw new Error(`PUT ${path}: ${r.status} ${e?.message||''}`); }
  return r.json();
}

async function ghCommitAll() {
  const pat = localStorage.getItem(LS_PAT_KEY) || '';
  if (!pat) { openPatModal(); return; }
  if (!confirm('밸류에이션 입력값과 다이어리를 GitHub에 커밋 & 푸시할까요?')) return;

  const btn = document.getElementById('gh-commit-btn');
  btn.disabled = true;
  btn.textContent = '커밋 중...';

  try {
    const today = new Date().toISOString().slice(0, 10);

    // ── 1. stocks.json : GitHub 최신 버전 받아서 유저 입력 필드만 덮어쓰기 ──
    const stocksFile = await ghApiGet(pat, GH.PATH);
    if (!stocksFile) throw new Error('stocks.json을 GitHub에서 찾을 수 없음');
    const stocksRaw = new TextDecoder().decode(Uint8Array.from(atob(stocksFile.content.replace(/\n/g,'')), c => c.charCodeAt(0)));
    const stocksData = JSON.parse(stocksRaw);
    // localStorage 대신 현재 메모리 state에서 직접 읽기 (즐겨찾기 등 미저장 변경 포함)
    const liveInputs = {};
    for (const s of state.stocks) {
      if (!s.ticker) continue;
      const fields = {};
      for (const f of USER_FIELDS) {
        const v = s[f];
        if (v !== null && v !== undefined && v !== '') fields[f] = v;
      }
      if (Object.keys(fields).length) liveInputs[s.ticker] = fields;
    }
    stocksData.stocks = (stocksData.stocks || []).map(s => {
      const ui = liveInputs[s.ticker] || {};
      const out = { ...s };
      for (const f of USER_FIELDS) { if (ui[f] !== undefined) out[f] = ui[f]; }
      return out;
    });
    await ghApiPut(pat, GH.PATH, JSON.stringify(stocksData, null, 2), stocksFile.sha,
      `sync: 밸류에이션 입력값 업데이트 ${today}`);

    // ── 2. diary.json : localStorage 다이어리 전체 커밋 ──
    const diaryFile = await ghApiGet(pat, 'diary.json');
    const diaryPutRes = await ghApiPut(pat, 'diary.json', JSON.stringify(diary.data, null, 2),
      diaryFile ? diaryFile.sha : null,
      `sync: 다이어리 업데이트 ${today}`);
    // 새 blob SHA 저장 → 같은 기기에서 커밋 직후 새로고침해도 머지 스킵 (미커밋 변경 보존)
    const newDiarySha = diaryPutRes && diaryPutRes.content && diaryPutRes.content.sha;
    if (newDiarySha) localStorage.setItem(DIARY_GH_SHA_KEY, String(newDiarySha));

    toast('✅ GitHub 커밋 완료!', 'ok', 3500);
  } catch (e) {
    if (e.message.includes('401') || e.message.includes('403')) {
      toast('❌ 토큰 오류 — ⚙️ 버튼에서 토큰을 확인하세요', 'err', 5000);
    } else {
      toast('❌ 커밋 실패: ' + e.message, 'err', 5000);
    }
  } finally {
    btn.disabled = false;
    btn.textContent = '☁️ 커밋 & 푸시';
  }
}

document.getElementById('gh-commit-btn').addEventListener('click', ghCommitAll);

/* ═══════════════════════════════════
   bfcache / 새로고침 안전장치
   - pagehide: 페이지 freeze 직전에 pending saveTimers를 즉시 flush
   - pageshow(persisted): bfcache에서 복원될 때 diary 재초기화
═══════════════════════════════════ */
window.addEventListener('pagehide', () => {
  // 500ms 디바운스 타이머가 남아있으면 즉시 저장하고 취소
  Object.entries(diary.saveTimers).forEach(([k, tid]) => {
    clearTimeout(tid);
  });
  diary.saveTimers = {};
  // 최신 diary.data를 즉시 localStorage에 플러시 (debounce 대기 중이었을 경우 대비)
  try { saveDiaryData(diary.data); } catch(_) {}
});

window.addEventListener('pageshow', (e) => {
  if (!e.persisted) return;
  // bfcache에서 복원됨 — localStorage에서 최신 상태 재로드 후 렌더
  diary.data = loadDiary();
  renderAllDiaryFeeds();
});

// 텔레그램 잔재 localStorage 한 번 정리 (탭 제거 후 1회 cleanup)
try { localStorage.removeItem('tg_msgs_v1'); } catch(_) {}
