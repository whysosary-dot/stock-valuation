<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>InvestHub — 투자 슈퍼앱</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png" />
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="InvestHub" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#f5f7fa" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f5f7fa; --card:#ffffff; --card2:#f8fafc;
  --border:#e6eaf0; --border2:#d5dbe4;
  --text:#111827; --dim:#6b7280; --faint:#9ca3af;
  --accent:#2563eb; --accent-soft:#e8f0fe;
  --up:#d9313f; --up-soft:#fdeef0; --down:#1467d6; --down-soft:#e9f1fd;
  --gold:#f59e0b; --green:#059669; --green-soft:#ecfdf5;
  --radius:16px; --shadow:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.04);
  --side-w:230px; --tab-h:58px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
[hidden]{display:none!important}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;
  font-size:15px;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;overflow:hidden}
.app{display:flex;height:100dvh}
/* ── 사이드바 ── */
.side{flex:none;width:var(--side-w);background:var(--card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:20px 12px 16px;overflow-y:auto}
.logo{font-size:20px;font-weight:800;letter-spacing:-.5px;padding:0 10px 14px}
.logo span{color:var(--accent)}
.side nav{display:flex;flex-direction:column;gap:2px}
.nav-sec{font-size:10.5px;font-weight:800;color:var(--faint);letter-spacing:.06em;padding:14px 12px 5px}
.nav-btn{display:flex;align-items:center;gap:11px;padding:9px 12px;border:none;background:none;
  border-radius:11px;font-size:14px;font-weight:500;color:var(--dim);cursor:pointer;text-align:left;font-family:inherit}
.nav-btn svg{width:18px;height:18px;flex:none}
.nav-btn.active{background:var(--accent-soft);color:var(--accent);font-weight:700}
.nav-btn:hover:not(.active){background:var(--card2);color:var(--text)}
.side-foot{margin-top:auto;padding:14px 12px 0;font-size:12px;color:var(--faint);line-height:1.7}
/* ── 메인 ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.hdr{flex:none;display:flex;align-items:center;gap:12px;padding:14px 20px 10px;
  padding-top:calc(14px + env(safe-area-inset-top))}
.hdr-title{font-size:21px;font-weight:800;letter-spacing:-.4px;white-space:nowrap}
.hdr-meta{color:var(--faint);font-size:12.5px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{border:1px solid var(--border);background:var(--card);color:var(--dim);width:34px;height:34px;
  border-radius:10px;font-size:16px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center}
.icon-btn:active{transform:scale(.94)}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 20px calc(24px + var(--tab-h) + env(safe-area-inset-bottom))}
.page{display:none;max-width:1180px;margin:0 auto}
.page.active{display:block}
/* ── 하단 탭바 ── */
.tabbar{display:none;position:fixed;left:0;right:0;bottom:0;z-index:60;
  background:rgba(255,255,255,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--border);padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
.tabbar-inner{display:flex;max-width:560px;margin:0 auto}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;
  color:var(--faint);font-size:10.5px;font-weight:600;cursor:pointer;padding:4px 0;font-family:inherit}
.tab-btn svg{width:22px;height:22px}
.tab-btn.active{color:var(--accent)}
/* 서브내비 (모바일 세그먼트) */
.subnav{display:none;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:2px 2px 12px;scrollbar-width:none}
.subnav::-webkit-scrollbar{display:none}
@media(max-width:899px){
  .side{display:none}
  .tabbar{display:block}
  .subnav{display:flex}
  .hdr{padding-left:16px;padding-right:16px}
  #content{padding-left:14px;padding-right:14px}
}
@media(min-width:900px){ #content{padding-bottom:32px} :root{--tab-h:0px} }
/* ── 공통 ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;box-shadow:var(--shadow)}
.card h3{margin:0 0 12px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.card h3 .sub{font-weight:500;color:var(--faint);font-size:12px;margin-left:auto}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:720px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr}.g2{grid-template-columns:1fr}}
.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--dim)}
.kpi{padding:14px 16px}
.kpi .lbl{font-size:12px;color:var(--faint);font-weight:600;margin-bottom:5px}
.kpi .val{font-size:20px;font-weight:800;letter-spacing:-.4px}
.kpi .cap{font-size:12px;color:var(--dim);margin-top:3px}
.hscroll{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 2px 8px;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}
.fav-card{flex:none;width:158px;background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 13px;cursor:pointer;box-shadow:var(--shadow)}
.fav-card .nm{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-card .sec{font-size:10.5px;color:var(--faint);margin:1px 0 6px}
.fav-card .pr{font-size:15px;font-weight:800;letter-spacing:-.3px}
.fav-card .ch{font-size:12px;font-weight:700;margin-top:1px}
.fav-card canvas{width:100%;height:34px;margin-top:6px}
.mv-row{display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid var(--card2);cursor:pointer}
.mv-row:last-child{border-bottom:none}
.mv-row .rk{width:18px;font-size:12px;font-weight:700;color:var(--faint);text-align:center}
.mv-row .nm{flex:1;min-width:0;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mv-row .nm small{display:block;font-weight:400;color:var(--faint);font-size:10.5px}
.mv-row .pc{font-size:13.5px;font-weight:700}
.bar-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:12.5px}
.bar-row .bl{width:110px;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;color:var(--dim)}
.bar-row .track{flex:1;position:relative;height:16px}
.bar-row .track::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--border2)}
.bar-row .fill{position:absolute;top:2px;bottom:2px;border-radius:4px}
.bar-row .bv{width:52px;flex:none;text-align:right;font-weight:700;font-size:12px}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:4px 0 14px}
.chip{border:1px solid var(--border);background:var(--card);color:var(--dim);padding:7px 13px;border-radius:999px;
  font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.sm{padding:5px 10px;font-size:11.5px}
.sel,.inp{border:1px solid var(--border);background:var(--card);color:var(--text);padding:8px 12px;
  border-radius:11px;font-size:13.5px;font-family:inherit;outline:none}
.inp:focus,.sel:focus{border-color:var(--accent)}
.inp{min-width:0}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--card);box-shadow:var(--shadow)}
table.tbl{border-collapse:collapse;width:100%;font-size:13px;min-width:640px}
.tbl th{position:sticky;top:0;background:var(--card2);color:var(--dim);font-size:11.5px;font-weight:700;
  text-align:right;padding:10px 10px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;z-index:2}
.tbl th:first-child,.tbl td:first-child{text-align:left;padding-left:14px}
.tbl th.sorted{color:var(--accent)}
.tbl td{padding:10px 10px;border-bottom:1px solid var(--card2);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.tbl tbody tr{cursor:pointer}
.tbl tbody tr:hover{background:var(--card2)}
.tbl .nm{font-weight:700;font-size:13.5px}
.tbl .nm small{color:var(--faint);font-weight:400;font-size:10.5px;display:block}
.star{cursor:pointer;font-size:15px;color:#d1d5db;margin-right:6px}
.star.on{color:var(--gold)}
/* 히트맵 */
#hm-box{position:relative;width:100%;height:62vh;min-height:380px;border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--border);background:var(--card)}
.hm-tile{position:absolute;overflow:hidden;border:1px solid rgba(255,255,255,.75);border-radius:4px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
  font-weight:700;line-height:1.25;text-align:center;padding:2px}
.hm-tile .t-pct{font-weight:600;opacity:.85}
.hm-sec-label{position:absolute;font-size:10px;font-weight:800;color:var(--dim);padding:1px 6px;
  background:rgba(248,250,252,.9);border-radius:0 0 6px 0;z-index:3;pointer-events:none;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--faint);margin-top:10px;justify-content:center}
.legend i{width:26px;height:12px;border-radius:3px;display:inline-block}
/* 리스트 행 (스크리너·ETF·공시 등) */
.scr-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);
  border:1px solid var(--border);border-radius:14px;margin-bottom:9px;cursor:pointer;box-shadow:var(--shadow)}
.scr-main{flex:1;min-width:0}
.scr-main .nm{font-weight:700;font-size:14.5px}
.scr-main .meta{font-size:11px;color:var(--faint);margin-top:2px}
.scr-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.bdg{font-size:11px;font-weight:700;padding:4px 8px;border-radius:8px;background:var(--card2);color:var(--dim);white-space:nowrap}
.bdg.u{background:var(--up-soft);color:var(--up)}.bdg.d{background:var(--down-soft);color:var(--down)}
.bdg.g{background:var(--green-soft);color:var(--green)}.bdg.o{background:#fffbeb;color:#b45309}
/* 비교 */
.cmp-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.cmp-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 8px 6px 12px;border-radius:999px;
  font-size:12.5px;font-weight:700;color:#fff;cursor:pointer}
.cmp-chip b{font-weight:400;opacity:.8}
.cmp-search{position:relative;flex:1;min-width:180px}
.cmp-drop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1px solid var(--border);
  border-radius:12px;box-shadow:0 8px 24px rgba(16,24,40,.12);z-index:40;max-height:260px;overflow-y:auto}
.cmp-drop div{padding:10px 14px;font-size:13.5px;cursor:pointer;display:flex;justify-content:space-between;gap:8px}
.cmp-drop div:hover{background:var(--card2)}
.cmp-drop small{color:var(--faint)}
/* 캘린더 */
.cal-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cal-head .mon{font-size:18px;font-weight:800;min-width:110px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:10.5px;font-weight:700;color:var(--faint);padding:4px 0}
.cal-cell{min-height:64px;background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:4px 5px;cursor:pointer;font-size:11px;overflow:hidden}
.cal-cell.dim{opacity:.4}
.cal-cell.today{border-color:var(--accent);border-width:2px}
.cal-cell.seld{background:var(--accent-soft)}
.cal-cell .d{font-size:11px;font-weight:700;color:var(--dim)}
.cal-cell .evt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10px;line-height:1.5}
.cal-cell .more{font-size:9.5px;color:var(--faint)}
@media(max-width:720px){.cal-cell{min-height:52px}.cal-cell .evt{display:none}
  .cal-cell .dots{display:flex;gap:2px;flex-wrap:wrap;margin-top:2px}
  .cal-cell .dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}}
@media(min-width:721px){.cal-cell .dots{display:none}}
.evt-row{display:flex;gap:10px;padding:11px 2px;border-bottom:1px solid var(--card2);cursor:pointer;align-items:flex-start}
.evt-row:last-child{border-bottom:none}
.evt-row .ic{font-size:17px;flex:none;width:24px;text-align:center}
.evt-row .bd{flex:1;min-width:0}
.evt-row .tt{font-size:13.5px;font-weight:600;line-height:1.45}
.evt-row .tt.imp{color:var(--up)}
.evt-row .mt{font-size:11px;color:var(--faint);margin-top:2px}
.evt-row .dday{flex:none;font-size:11px;font-weight:800;padding:4px 8px;border-radius:8px;background:var(--accent-soft);color:var(--accent);white-space:nowrap}
.evt-row .dday.past{background:var(--card2);color:var(--faint)}
.evt-memo{font-size:12px;color:var(--dim);margin-top:5px;line-height:1.55;background:var(--card2);border-radius:8px;padding:8px 10px}
/* 브리핑 */
.brf-row{display:flex;align-items:center;gap:12px;padding:13px 15px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;margin-bottom:9px;cursor:pointer;box-shadow:var(--shadow)}
.brf-row .dt{flex:none;text-align:center;width:44px}
.brf-row .dt .dd{font-size:17px;font-weight:800;color:var(--accent)}
.brf-row .dt .mm{font-size:10px;color:var(--faint);font-weight:700}
.brf-row .hl{flex:1;min-width:0;font-size:13.5px;font-weight:600;line-height:1.5}
.brf-row .hl small{display:block;color:var(--faint);font-weight:400;font-size:11px;margin-top:2px}
/* 공시 */
.aw-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;
  margin-bottom:9px;box-shadow:var(--shadow);cursor:pointer}
.aw-card .top{display:flex;align-items:center;gap:8px}
.aw-card .nm{font-weight:700;font-size:14px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aw-card .nm small{color:var(--faint);font-weight:400;font-size:11px;margin-left:5px}
.aw-card .rsn{font-size:12.5px;color:var(--dim);line-height:1.55;margin-top:6px}
.aw-card .ext{display:none;margin-top:9px;border-top:1px solid var(--card2);padding-top:9px}
.aw-card.open .ext{display:block}
.aw-card .ins{font-size:12.5px;line-height:1.6;color:var(--text)}
.aw-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
/* 지표 */
.ind-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.ind-card h4{margin:0 0 2px;font-size:14px;font-weight:700}
.ind-card .src{font-size:10.5px;color:var(--faint);margin-bottom:8px}
.ind-card .chart-box{height:150px;position:relative}
/* 노트 */
.note-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;
  margin-bottom:9px;cursor:pointer;box-shadow:var(--shadow)}
.note-row .top{display:flex;align-items:baseline;gap:8px}
.note-row .nm{font-weight:700;font-size:14.5px}
.note-row .tk{font-size:11px;color:var(--faint)}
.note-row .cnt{margin-left:auto;font-size:11px;font-weight:700;color:var(--accent);white-space:nowrap}
.note-row .last{font-size:12.5px;color:var(--dim);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.note-card .tt{font-weight:700;font-size:14px;line-height:1.5}
.note-card .dt{font-size:11px;color:var(--faint);margin:3px 0 8px}
.note-card ul{margin:0;padding-left:18px;font-size:12.5px;line-height:1.65;color:var(--dim)}
/* 다이어리 */
.diary-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 16px;margin-bottom:11px;box-shadow:var(--shadow)}
.diary-card .dt{font-size:12px;font-weight:800;color:var(--accent);margin-bottom:8px}
.diary-body{font-size:13.5px;line-height:1.7;word-break:break-word}
.diary-body div{margin:0}
.trade-row{display:flex;gap:9px;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--card2);font-size:13px;flex-wrap:wrap}
.trade-row:last-child{border-bottom:none}
.trade-row .memo{width:100%;font-size:12px;color:var(--dim);line-height:1.55}
/* 문서 뷰어 */
.docview{position:fixed;inset:0;z-index:90;background:var(--bg);display:flex;flex-direction:column}
.docview-hd{flex:none;display:flex;align-items:center;gap:10px;padding:8px 12px;
  padding-top:calc(8px + env(safe-area-inset-top));background:var(--card);border-bottom:1px solid var(--border)}
.docview-hd .t{flex:1;min-width:0;font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.docview iframe{flex:1;border:none;width:100%;background:#fff}
/* 모달 */
.modal-ov{position:fixed;inset:0;background:rgba(17,24,39,.45);z-index:100;display:flex;
  align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.modal{background:var(--bg);width:100%;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  border-radius:22px 22px 0 0;padding:10px 18px calc(28px + env(safe-area-inset-bottom))}
@media(min-width:900px){.modal-ov{align-items:center;padding:30px}
  .modal{max-width:680px;border-radius:22px;max-height:86vh;padding-bottom:26px}}
.m-grab{width:40px;height:4px;border-radius:2px;background:var(--border2);margin:4px auto 14px}
.m-head{display:flex;align-items:flex-start;gap:10px}
.m-head .nm{font-size:20px;font-weight:800;letter-spacing:-.4px}
.m-head .sec{font-size:12px;color:var(--faint);margin-top:2px}
.m-head .x{margin-left:auto;flex:none}
.m-price{margin:12px 0 4px;font-size:27px;font-weight:800;letter-spacing:-.6px}
.m-price small{font-size:14px;font-weight:600;color:var(--faint)}
.m-chg{font-size:14px;font-weight:700;margin-bottom:14px}
.m-badges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.m-sec-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.m-sec-card h4{margin:0 0 10px;font-size:13px;font-weight:700;color:var(--dim)}
.rng-tabs{display:flex;gap:6px;margin-bottom:10px}
.val-rows{display:flex;flex-direction:column;gap:8px;font-size:13px}
.val-rows .r{display:flex;justify-content:space-between;align-items:center}
.val-rows .r b{font-variant-numeric:tabular-nums}
.val-track{position:relative;height:10px;border-radius:5px;background:linear-gradient(90deg,#fde5e7,#f3f4f6,#dcfce7);margin:8px 0 2px}
.val-dot{position:absolute;top:-3px;width:16px;height:16px;border-radius:50%;background:var(--accent);
  border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25);transform:translateX(-50%)}
.idea-txt{font-size:13.5px;line-height:1.65;color:var(--text);white-space:pre-wrap}

<script>
/* ═══════════ 전역 ═══════════ */
const OWNER = 'whysosary-dot';

const rendered = {}, charts = {}, CACHE = {};

const esc = s => String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function fmtCap(oku){ if(oku==null||!isFinite(oku)) return '–';
  if(Math.abs(oku)>=10000) return (oku/10000).toFixed(oku>=100000?0:1)+'조';
  return Math.round(oku).toLocaleString()+'억'; }
function fmtPct(v,d=1){ if(v==null||!isFinite(v)) return '–';
  return (v>0?'+':'')+v.toFixed(d)+'%'; }
function pctCls(v){ return v==null?'flat':(v>0.001?'up':(v<-0.001?'down':'flat')); }
function fmtPrice(v,ccy){ if(v==null) return '–';
  const dec = v<10?2:(v<1000&&ccy!=='KRW'?2:0);
  return v.toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
const CCY_SYM = {KRW:'원',USD:'$',JPY:'¥',HKD:'HK$',TWD:'NT$',EUR:'€'};
function normSector(sec){ if(!sec) return '기타'; return sec.startsWith('반도체')?'반도체':sec; }
function isFav(s){ return FAVS[s.ticker] !== undefined ? !!FAVS[s.ticker] : !!s.favorite; }
function toggleFav(s){ FAVS[s.ticker] = !isFav(s); localStorage.setItem(FAV_KEY, JSON.stringify(FAVS));
  rendered.home = false; rendered.valuation = false;
  if(currentPage==='home') renderHome(); if(currentPage==='valuation') renderValuation(); }
function naverUrl(s){
  if(s.naver_path) return `https://m.stock.naver.com/${s.naver_path}/${s.naver_code||s.ticker}/total`;
  if(s.currency==='KRW') return `https://m.stock.naver.com/domestic/stock/${(s.ticker||'').split('.')[0]}/total`;
  return `https://m.stock.naver.com/worldstock/stock/${s.naver_code||s.ticker}/total`; }
function calcRSI(cl,p=14){ if(!cl||cl.length<p+1) return null;
  let g=0,l=0;
  for(let i=1;i<=p;i++){ const d=cl[i]-cl[i-1]; d>0?g+=d:l-=d; }
  g/=p; l/=p;
  for(let i=p+1;i<cl.length;i++){ const d=cl[i]-cl[i-1];
    g=(g*(p-1)+Math.max(d,0))/p; l=(l*(p-1)+Math.max(-d,0))/p; }
  if(l===0) return 100; return 100-100/(1+g/l); }
async function fetchText(url){
  const r = await fetch(url + (url.includes('?')?'&':'?') + 't=' + Math.floor(Date.now()/3e5), {cache:'no-store'});
  if(!r.ok) throw new Error(r.status); return await r.text(); }
async function fetchJSON(url){ return JSON.parse(await fetchText(url)); }
async function cached(key, fn){
  if(CACHE[key]) return CACHE[key];
  CACHE[key] = await fn(); return CACHE[key]; }
/* JS 소스에서 배열 리터럴 추출 (주석 지원) */
function extractArray(txt, marker){
  const i = txt.indexOf(marker); if(i<0) return null;
  const start = txt.indexOf('[', i);
  let d=0, inStr=null, escp=false;
  for(let j=start;j<txt.length;j++){
    const c = txt[j];
    if(inStr){ if(escp)escp=false; else if(c==='\\')escp=true; else if(c===inStr)inStr=null; continue; }
    if(c==='"'||c==="'"||c==='`'){ inStr=c; continue; }
    if(c==='/'&&txt[j+1]==='/'){ j = txt.indexOf('\n', j); if(j<0)break; continue; }
    if(c==='/'&&txt[j+1]==='*'){ j = txt.indexOf('*/', j)+1; if(j<1)break; continue; }
    if(c==='[') d++;
    else if(c===']'){ d--; if(!d){ try{ return new Function('return '+txt.slice(start,j+1))(); }catch(e){ return null; } } }
  }
  return null;
}
const spin = '<div class="mini-spin"><i></i></div>';
function ymd(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
const DOW = ['일','월','화','수','목','금','토'];
function fmtDate(str){ const d = new Date(str+'T00:00:00');
  return `${d.getMonth()+1}.${d.getDate()}(${DOW[d.getDay()]})`; }

/* ═══════════ 종목 데이터 ═══════════ */
function enrich(s){
  const cur = s.price_native ?? (s.price_history_3m?.at(-1)) ?? null;
  const ret = arr => (arr&&arr.length>1&&arr[0]&&cur!=null) ? (cur/arr[0]-1)*100 : null;
  const h3m = s.price_history_3m||[];
  s._cur = cur;
  s._r1d = s.price_change_pct ?? null;
  s._r1w = (h3m.length>=6&&cur!=null&&h3m[h3m.length-6]) ? (cur/h3m[h3m.length-6]-1)*100 : null;
  s._r1m = (h3m.length>=22&&cur!=null&&h3m[h3m.length-22]) ? (cur/h3m[h3m.length-22]-1)*100 : null;
  s._r3m = ret(h3m);
  s._r1y = ret(s.price_history);
  s._r3y = ret(s.price_history_3y);
  const h1y = s.price_history||[];
  s._hi52 = h1y.length ? Math.max(...h1y, cur??-Infinity) : null;
  s._fromHigh = (s._hi52&&cur!=null) ? (cur/s._hi52-1)*100 : null;
  s._rsi = calcRSI(h3m);
  s._upside = (s.target_cap_oku>0&&s.market_cap_oku>0) ? (s.target_cap_oku/s.market_cap_oku-1)*100 : null;
  s._vsSafety = (s.safety_cap_oku>0&&s.market_cap_oku>0) ? (s.market_cap_oku/s.safety_cap_oku-1)*100 : null;
  s._secN = normSector(s.sector);
  return s;
}
async function loadStocks(){

  for(const u of urls){

  throw new Error('load fail');
}

    STOCKS = (d.stocks||[]).filter(x=>x&&x.name).map(enrich);
    Object.keys(rendered).forEach(k=>rendered[k]=false);
    updateMeta(); showPage(currentPage, true);
  }catch(e){
    $('#loading').innerHTML = '<div style="text-align:center;color:var(--dim)">데이터를 불러오지 못했습니다.<br><br><button class="chip" onclick="location.reload()">다시 시도</button></div>';

}

/* ═══════════ 홈 ═══════════ */
function sparkline(cv, arr, color){
  if(!cv||!arr||arr.length<2) return;
  const dpr = window.devicePixelRatio||1;
  const w = cv.clientWidth||132, h = cv.clientHeight||34;
  cv.width = w*dpr; cv.height = h*dpr;
  const ctx = cv.getContext('2d'); ctx.scale(dpr,dpr);
  const mn = Math.min(...arr), mx = Math.max(...arr), sp = (mx-mn)||1;
  ctx.beginPath();
  arr.forEach((v,i)=>{ const x = i/(arr.length-1)*w, y = h-3-((v-mn)/sp)*(h-6);
    i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
  ctx.strokeStyle = color; ctx.lineWidth = 1.6; ctx.stroke();
}
function renderHome(){

let hmMetric = '_r1d', hmGroup = true;
const HM_SCALES = {_r1d:3,_r3m:25,_r1y:50,_upside:100};
function heatColor(v, scale){
  if(v==null) return {bg:'#eef1f5', fg:'#9ca3af'};
  const t = Math.min(Math.abs(v)/scale, 1);
  const a = 0.12 + t*0.8;
  const bg = v>=0 ? `rgba(217,49,63,${a})` : `rgba(20,103,214,${a})`;
  return {bg, fg: t>0.45 ? '#fff' : (v>=0?'#8c1823':'#0c3f85')};
}
function layoutTreemap(items,x,y,w,h){
  const total = items.reduce((a,b)=>a+b.v,0);
  if(total<=0||w<=0||h<=0) return [];
  let sc = items.map(it=>({it, a:it.v/total*w*h})).filter(r=>r.a>0);
  const rects = [];
  let rx=x, ry=y, rw=w, rh=h, row=[];
  const worst = (row,len)=>{ const s=row.reduce((a,b)=>a+b.a,0);
    let mx=0, mn=Infinity; row.forEach(r=>{mx=Math.max(mx,r.a);mn=Math.min(mn,r.a);});
    const s2=s*s, l2=len*len; return Math.max(l2*mx/s2, s2/(l2*mn)); };
  const layoutRow = row=>{ const s=row.reduce((a,b)=>a+b.a,0);
    if(rw>=rh){ const sw=s/rh; let yy=ry;
      row.forEach(r=>{ const hh=r.a/sw; rects.push({it:r.it,x:rx,y:yy,w:sw,h:hh}); yy+=hh; });
      rx+=sw; rw-=sw;
    } else { const sh=s/rw; let xx=rx;
      row.forEach(r=>{ const ww=r.a/sh; rects.push({it:r.it,x:xx,y:ry,w:ww,h:sh}); xx+=ww; });
      ry+=sh; rh-=sh; } };
  let i=0;
  while(i<sc.length){
    const len = Math.min(rw,rh)||1;
    row.push(sc[i]);
    if(row.length>1 && worst(row.slice(0,-1),len) < worst(row,len)){
      row.pop(); layoutRow(row); row=[sc[i]];
    }
    i++;
  }
  if(row.length) layoutRow(row);
  return rects;
}

function drawHeatmap(){

      .sort((a,b)=>b.v-a.v);
    layoutTreemap(gItems, 0, 0, W, H).forEach(gr=>{
      const pad = 2, lab = gr.h>36 ? 15 : 0;
      layoutTreemap(
        gr.it.arr.map(s=>({s, v:s.market_cap_oku})).sort((a,b)=>b.v-a.v),
        gr.x+pad, gr.y+pad+lab, Math.max(0,gr.w-pad*2), Math.max(0,gr.h-pad*2-lab))

        L.textContent = gr.it.k;

    });
  } else {
    layoutTreemap(items.map(s=>({s,v:s.market_cap_oku})).sort((a,b)=>b.v-a.v),0,0,W,H)
      .forEach(r=>mkTile(r.it.s,r));
  }
  const steps = [-1,-.6,-.3,0,.3,.6,1];
  $('#hm-legend').innerHTML = `<span>-${scale}%</span>` +
    steps.map(t=>{ const c=heatColor(t*scale,scale); return `<i style="background:${c.bg}"></i>`; }).join('') +
    `<span>+${scale}%</span>`;
}

    cmpSel = STOCKS.filter(isFav).slice(0,6).map(s=>s.ticker); drawCompare(); });
  $('#cmp-clear').addEventListener('click', ()=>{ cmpSel=[]; drawCompare(); });
  el.querySelectorAll('#cmp-rng [data-r]').forEach(b=>b.addEventListener('click',()=>{
    cmpRange = b.dataset.r;
    el.querySelectorAll('#cmp-rng .chip').forEach(c=>c.classList.toggle('active',c.dataset.r===cmpRange));
    drawCompare();
  }));
  if(!cmpSel.length) cmpSel = STOCKS.filter(isFav).slice(0,4).map(s=>s.ticker);
  drawCompare();
}
function drawCompare(){
  const chipsEl = $('#cmp-chips'); if(!chipsEl) return;
  const sel = cmpSel.map(t=>STOCKS.find(s=>s.ticker===t)).filter(Boolean);
  chipsEl.innerHTML = sel.map((s,i)=>
    `<span class="cmp-chip" style="background:${CMP_COLORS[i%6]}" data-t="${esc(s.ticker)}">${esc(s.name)} <b>✕</b></span>`).join('')
    || '<span style="font-size:12.5px;color:var(--faint)">종목을 검색해 추가하세요</span>';
  chipsEl.querySelectorAll('.cmp-chip').forEach(c=>c.addEventListener('click',()=>{
    cmpSel = cmpSel.filter(t=>t!==c.dataset.t); drawCompare(); }));
  const maxLen = Math.max(0, ...sel.map(s=>(histOf(s,cmpRange)||[]).length));
  const labels = Array.from({length:maxLen}, (_,i)=>i);
  const days = cmpRange==='3m'?92:(cmpRange==='1y'?365:365*3);
  const end = META.updated_at ? new Date(META.updated_at) : new Date();
  const dateLbl = i => { const d = new Date(end.getTime() - (maxLen-1-i)/(maxLen-1||1)*days*864e5);
    return `${d.getFullYear().toString().slice(2)}.${String(d.getMonth()+1).padStart(2,'0')}`; };
  const dsets = sel.map((s,i)=>{
    const h = histOf(s,cmpRange)||[];
    const pad = maxLen - h.length;
    const base = h.find(v=>v!=null);
    return { label:s.name, data:[...Array(pad).fill(null), ...h.map(v=>base?(v/base-1)*100:null)],
      borderColor:CMP_COLORS[i%6], backgroundColor:CMP_COLORS[i%6], borderWidth:2,
      pointRadius:0, pointHitRadius:8, tension:.25, spanGaps:true };
  });
  charts.cmp?.destroy();
  const ctx = $('#cmp-chart'); if(!ctx) return;
  charts.cmp = new Chart(ctx, { type:'line',
    data:{ labels, datasets:dsets },
    options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:true, labels:{boxWidth:14,boxHeight:3,font:{size:11}}},
        tooltip:{ callbacks:{ title:items=>items.length?dateLbl(items[0].dataIndex):'',
          label:c=>` ${c.dataset.label}: ${c.parsed.y==null?'–':fmtPct(c.parsed.y,1)}` } } },
      scales:{ x:{ ticks:{ maxTicksLimit:6, font:{size:10}, color:'#9ca3af',
          callback:(v,i)=>dateLbl(i) }, grid:{display:false} },
        y:{ ticks:{ font:{size:10}, color:'#9ca3af', callback:v=>v+'%' },
          grid:{color:'#f0f2f6'} } } } });
  $('#cmp-table').innerHTML = sel.length ? `
  <div class="tbl-wrap"><table class="tbl"><thead><tr>
    <th>종목</th><th>시총</th><th>1D</th><th>3M</th><th>1Y</th><th>3Y</th><th>RSI</th><th>여력</th>
  </tr></thead><tbody>
    ${sel.map((s,i)=>`<tr data-t="${esc(s.ticker)}">
      <td><span class="nm" style="color:${CMP_COLORS[i%6]}">${esc(s.name)}</span></td>
      <td>${fmtCap(s.market_cap_oku)}</td>
      <td class="${pctCls(s._r1d)}">${fmtPct(s._r1d)}</td>
      <td class="${pctCls(s._r3m)}">${fmtPct(s._r3m,0)}</td>
      <td class="${pctCls(s._r1y)}">${fmtPct(s._r1y,0)}</td>
      <td class="${pctCls(s._r3y)}">${fmtPct(s._r3y,0)}</td>
      <td>${s._rsi!=null?Math.round(s._rsi):'–'}</td>
      <td class="${s._upside==null?'flat':(s._upside>=0?'up':'down')}">${fmtPct(s._upside,0)}</td>
    </tr>`).join('')}
  </tbody></table></div>` : '';
  document.querySelectorAll('#cmp-table tr[data-t]').forEach(r=>r.addEventListener('click',()=>{
    const s = STOCKS.find(x=>x.ticker===r.dataset.t); if(s) openDetail(s); }));
}

/* ═══════════ 캘린더 ═══════════ */
let CAL_EVTS = null, calMonth = null, calCat = '전체', calSelDate = null, calView = 'list';
async function loadCalendarEvents(){
  return cached('cal-events', async ()=>{
    const html = await fetchText(RAW('investment-calendar','index.html'));
    const arr = extractArray(html, 'EVENTS=');
    if(!arr) throw new Error('parse fail');
    return arr.filter(e=>e&&e.date&&e.title);
  });
}
function ddayBadge(date, today){
  const diff = Math.round((new Date(date+'T00:00:00') - new Date(today+'T00:00:00'))/864e5);
  if(diff===0) return '<span class="dday">D-DAY</span>';
  if(diff>0) return `<span class="dday">D-${diff}</span>`;
  return `<span class="dday past">${fmtDate(date)}</span>`;
}
function evtRowHTML(e, today){
  return `<div class="evt-row" data-eid="${e.id}">
    <div class="ic">${e.icon||'📌'}</div>
    <div class="bd">
      <div class="tt ${e.important?'imp':''}">${esc(e.title)}</div>
      <div class="mt">${fmtDate(e.date)} · ${esc(e.company||'')} · ${esc(e.category||'')}</div>
      <div class="evt-memo" hidden>${esc(e.memo||'')}${e.link?` <a href="${esc(e.link)}" target="_blank" rel="noopener" style="color:var(--accent)">링크 ↗</a>`:''}</div>
    </div>
    ${ddayBadge(e.date, today)}
  </div>`;
}
function wireEvtRows(box){
  if(!box) return;
  box.querySelectorAll('.evt-row').forEach(r=>r.addEventListener('click',()=>{
    const memo = r.querySelector('.evt-memo');
    if(memo && memo.textContent.trim()) memo.hidden = !memo.hidden;
  }));
}
async function renderCalendar(){
  const el = $('#page-calendar');
  el.innerHTML = spin;
  try{
    CAL_EVTS = await loadCalendarEvents();
  }catch(e){
    el.innerHTML = '<div class="card empty">캘린더 데이터를 불러오지 못했습니다.</div>'; return;
  }
  if(!calMonth){ const n = new Date(); calMonth = [n.getFullYear(), n.getMonth()]; }
  const cats = ['전체', ...[...new Set(CAL_EVTS.map(e=>e.category).filter(Boolean))]];
  el.innerHTML = `
  <div class="controls" style="margin-bottom:8px">
    <button class="chip ${calView==='list'?'active':''}" data-v="list">목록</button>
    <button class="chip ${calView==='month'?'active':''}" data-v="month">월간</button>
    <span style="flex:1"></span>
    ${cats.map(c=>`<button class="chip sm ${c===calCat?'active':''}" data-c="${esc(c)}">${esc(c)}</button>`).join('')}
  </div>
  <div id="cal-body"></div>`;
  el.querySelectorAll('[data-v]').forEach(b=>b.addEventListener('click',()=>{
    calView = b.dataset.v; renderCalendar(); }));
  el.querySelectorAll('[data-c]').forEach(b=>b.addEventListener('click',()=>{
    calCat = b.dataset.c; renderCalendar(); }));
  drawCalBody();
}
function calFiltered(){
  return CAL_EVTS.filter(e=>calCat==='전체'||e.category===calCat);
}
function drawCalBody(){
  const box = $('#cal-body'); if(!box) return;
  const today = ymd(new Date());
  const evts = calFiltered();
  if(calView==='list'){
    const upcoming = evts.filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
    const past = evts.filter(e=>e.date<today).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20);
    box.innerHTML = `
      <div class="card"><h3>다가오는 일정 <span class="sub">${upcoming.length}건</span></h3>
        <div>${upcoming.slice(0,40).map(e=>evtRowHTML(e,today)).join('')||'<div class="empty">예정 일정 없음</div>'}</div></div>
      <div class="card" style="margin-top:14px"><h3>지난 일정 <span class="sub">최근 20건</span></h3>
        <div>${past.map(e=>evtRowHTML(e,today)).join('')||'<div class="empty">–</div>'}</div></div>`;
    wireEvtRows(box);
  } else {
    const [Y,M] = calMonth;
    const first = new Date(Y,M,1), startDow = first.getDay();
    const dim = new Date(Y,M+1,0).getDate();
    const byDate = {};
    evts.forEach(e=>{ (byDate[e.date]??=[]).push(e); });
    let cells = '';
    for(let i=0;i<startDow;i++) cells += '<div></div>';
    for(let d=1;d<=dim;d++){
      const ds = `${Y}-${String(M+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const list = byDate[ds]||[];
      cells += `<div class="cal-cell ${ds===today?'today':''} ${ds===calSelDate?'seld':''}" data-d="${ds}">
        <div class="d">${d}</div>
        ${list.slice(0,3).map(e=>`<div class="evt">${e.icon||'·'}${esc(e.title.slice(0,10))}</div>`).join('')}
        ${list.length>3?`<div class="more">+${list.length-3}</div>`:''}
        <div class="dots">${list.slice(0,4).map(()=>'<span class="dot"></span>').join('')}</div>
      </div>`;
    }
    box.innerHTML = `
      <div class="cal-head">
        <button class="icon-btn" id="cal-prev">‹</button>
        <div class="mon">${Y}년 ${M+1}월</div>
        <button class="icon-btn" id="cal-next">›</button>
        <button class="chip sm" id="cal-today">오늘</button>
      </div>

async function drawAwake(agg){
  const day = agg.by_date?.[awDate]||{};
  const sc = day.signal_count||{};
  $('#aw-sigs').innerHTML = ['전체','강매수','매수','중립','매도'].map(s=>
    `<button class="chip sm ${s===awSignal?'active':''}" data-sg="${s}">${s}${s!=='전체'&&sc[s]!=null?` ${sc[s]}`:''}</button>`).join('');
  document.querySelectorAll('#aw-sigs [data-sg]').forEach(b=>b.addEventListener('click',()=>{
    awSignal = b.dataset.sg;
    document.querySelectorAll('#aw-sigs .chip').forEach(c=>c.classList.toggle('active',c.dataset.sg===awSignal));
    drawAwake(agg);
  }));
  const ind = Object.entries(day.by_industry||{}).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const mx = Math.max(1,...ind.map(x=>x[1]));
  $('#aw-industry').innerHTML = ind.length?`<div class="card"><h3>업종별 공시 <span class="sub">${awDate}</span></h3>
    ${ind.map(([k,v])=>`<div class="bar-row"><div class="bl">${esc(k)}</div>
      <div class="track"><div class="fill" style="left:0;width:${v/mx*95}%;background:var(--accent);opacity:.75"></div></div>
      <div class="bv">${v}건</div></div>`).join('')}</div>`:'';
  const box = $('#aw-list'); box.innerHTML = spin;
  try{
    const data = await cached('aw-'+awDate, ()=>fetchJSON(RAW('awake-disclosure',`daily_analyses_${awDate}.json`)));
    let items = [];
    Object.entries(data).forEach(([ticker, arr])=>{
      (Array.isArray(arr)?arr:[arr]).forEach(a=>items.push({ticker, ...a}));
    });
    if(awSignal!=='전체') items = items.filter(a=>a.custom_signal===awSignal);
    const sigOrder = {'강매수':0,'매수':1,'매도':2,'중립':3};
    items.sort((a,b)=>(sigOrder[a.custom_signal]??9)-(sigOrder[b.custom_signal]??9));
    box.innerHTML = items.length ? items.map((a,i)=>{
      const name = (a.bm_kr||'').split(':')[0].trim() || a.ticker;
      return `<div class="aw-card" data-i="${i}">
        <div class="top">
          <span class="bdg ${AW_SIG_CLS[a.custom_signal]||''}">${esc(a.custom_signal||'중립')}</span>
          <div class="nm">${esc(name)}<small>${esc(a.ticker)}</small></div>
        </div>
        <div class="rsn">${esc(a.custom_signal_reason||'')}</div>
        <div class="ext">
          <div class="ins">${esc(a.custom_insight||'')}</div>
          ${(a.custom_watch||[]).length?`<div class="aw-tags">${a.custom_watch.map(w=>`<span class="bdg o">${esc(w)}</span>`).join('')}</div>`:''}
        </div>
      </div>`; }).join('') : '<div class="card empty">해당 조건의 공시 분석이 없습니다.</div>';
    box.querySelectorAll('.aw-card').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('open')));
  }catch(e){ box.innerHTML = '<div class="card empty">해당 날짜 분석 파일이 없습니다.</div>'; }
}

  </div>`;
