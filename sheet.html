<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sheets — 리송 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/css/pluginsCss.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/plugins.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/css/luckysheet.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/assets/iconfont/iconfont.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/expendPlugins/chart/chartmix.css" />
<style>
  :root {
    --bg: #f7f8fa; --panel: #ffffff; --panel-2: #eef0f4;
    --border: #e3e7ee; --text: #1f2933; --text-dim: #6b7480;
    --accent: #2563eb; --accent-soft: #eff4ff; --red: #e23a3a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; }
  .app { display: flex; height: 100vh; height: 100dvh; }

  /* ── 사이드바 ── */
  .sidebar {
    width: 348px; flex: none; background: var(--panel);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    transition: margin-left .18s ease;
    /* 롱프레스 드래그 시 iOS 텍스트 선택/콜아웃 방지 (검색 input 은 아래서 해제) */
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
  }
  .sidebar input { -webkit-user-select: text; user-select: text; }
  .app.sb-hidden .sidebar { margin-left: -348px; }
  .sb-toggle {
    border: 1px solid var(--border); background: var(--panel); border-radius: 6px;
    padding: 4px 9px; font-size: 14px; cursor: pointer; color: var(--text-dim); flex: none;
  }
  .sb-toggle:hover { background: var(--accent-soft); color: var(--accent); }
  .sb-head {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .sb-title { font-size: 14px; font-weight: 700; color: var(--text); flex: 1; text-decoration: none; cursor: pointer; }
  .sb-title:hover { color: var(--accent); }
  .sb-btn {
    border: 1px solid var(--border); background: var(--panel); border-radius: 6px;
    padding: 3px 8px; font-size: 13px; cursor: pointer; color: var(--text-dim);
  }
  .sb-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .tree { flex: 1; overflow-y: auto; padding: 8px 6px; }
  .node {
    display: flex; align-items: center; gap: 6px; padding: 5px 8px;
    border-radius: 6px; cursor: pointer; font-size: 13.5px; color: var(--text);
    user-select: none;
  }
  .node:hover { background: var(--panel-2); }
  .node.selected { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .node .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .node .del, .node .ren, .node .mv {
    display: none; border: none; background: none; color: var(--text-dim);
    cursor: pointer; font-size: 12px; padding: 0 3px;
  }
  .node:hover .del, .node:hover .ren, .node:hover .mv { display: inline; }
  .node .del:hover { color: var(--red); }
  .node .ren:hover, .node .mv:hover { color: var(--accent); }
  /* 터치 기기 (아이패드/아이폰): hover 가 없으므로 버튼 상시 노출 + 터치 타깃 확대 */
  @media (hover: none) {
    .node { padding: 9px 8px; font-size: 15px; }
    .node .del, .node .ren, .node .mv { display: inline; font-size: 15px; padding: 2px 7px; }
    .sb-btn { padding: 7px 12px; font-size: 15px; }
    .commit-btn { padding: 8px 16px; font-size: 14px; }
  }
  .node.folder .caret { font-size: 10px; width: 12px; color: var(--text-dim); }
  .empty-tip { padding: 20px 12px; text-align: center; font-size: 12.5px; color: var(--text-dim); line-height: 1.6; }
  /* ── 사이드바 검색 ── */
  .sb-search { padding: 8px 10px 0; }
  .sb-search input {
    width: 100%; box-sizing: border-box; padding: 6px 10px;
    border: 1px solid var(--border); border-radius: 7px; font-size: 13px;
    background: var(--panel-2); color: var(--text); outline: none;
  }
  .sb-search input:focus { border-color: var(--accent); background: var(--panel); }
  .node .sub { font-size: 11px; color: var(--text-dim); margin-left: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: none; max-width: 45%; }
  /* ── 드래그 앤 드랍 ── */
  .node.drop-target { background: var(--accent-soft); outline: 2px dashed var(--accent); outline-offset: -2px; }
  .tree.drop-root { outline: 2px dashed var(--accent); outline-offset: -3px; border-radius: 8px; }
  /* 순서 변경 삽입 위치 (점선) */
  .node.drop-before { box-shadow: 0 -2px 0 0 var(--accent); position: relative; }
  .node.drop-before::before { content:''; position:absolute; top:-2px; left:0; right:0; border-top:2px dashed var(--accent); }
  .node.drop-after { box-shadow: 0 2px 0 0 var(--accent); position: relative; }
  .node.drop-after::after { content:''; position:absolute; bottom:-2px; left:0; right:0; border-bottom:2px dashed var(--accent); }
  .drag-ghost {
    position: fixed; pointer-events: none; z-index: 9999;
    background: var(--panel); border: 1.5px solid var(--accent); border-radius: 8px;
    padding: 5px 12px; font-size: 13.5px; color: var(--text);
    box-shadow: 0 4px 16px rgba(0,0,0,.18); opacity: .92; white-space: nowrap;
  }

  /* ── 메인 ── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    height: 40px; flex: none; display: flex; align-items: center; gap: 10px;
    padding: 0 12px; background: var(--panel); border-bottom: 1px solid var(--border);
  }
  .cur-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .cur-path { font-size: 12px; color: var(--text-dim); }
  .spacer { flex: 1; }
  .status { font-size: 12px; color: var(--text-dim); }
  .status.saved { color: #16a34a; }
  .commit-btn {
    border: 1px solid var(--accent); background: var(--accent); color: #fff;
    border-radius: 7px; padding: 5px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .commit-btn:disabled { opacity: .5; cursor: not-allowed; }
  #lucky { flex: 1; position: relative; touch-action: manipulation;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; } /* iOS 더블탭 줌/롱프레스 콜아웃 방지 */
  .no-sheet {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: var(--text-dim); font-size: 14px; background: var(--bg);
  }
  .toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: #1f2933; color: #fff; padding: 9px 18px; border-radius: 8px;
    font-size: 13.5px; opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 9999;
  }
  .toast.show { opacity: 1; }
  .toast.err { background: var(--red); }

  /* ── 노트 에디터 ── */
  .note-toolbar {
    flex: none; display: flex; gap: 6px; padding: 8px 12px; flex-wrap: wrap;
    background: var(--panel); border-bottom: 1px solid var(--border);
  }
  .note-toolbar button {
    border: 1px solid var(--border); background: var(--panel); border-radius: 7px;
    padding: 6px 12px; font-size: 14px; cursor: pointer; color: var(--text);
  }
  .note-toolbar button:hover { background: var(--accent-soft); border-color: var(--accent); }
  .note-toolbar select {
    border: 1px solid var(--border); background: var(--panel); border-radius: 7px;
    padding: 6px 8px; font-size: 13.5px; cursor: pointer; color: var(--text); outline: none;
  }
  .note-toolbar select:hover { border-color: var(--accent); }
  #note-edit {
    flex: 1; overflow-y: auto; padding: 22px 26px; background: #fff;
    font-size: 15.5px; line-height: 1.75; color: var(--text); outline: none;
    -webkit-user-select: text; user-select: text;
  }
  #note-edit:empty::before { content: attr(data-placeholder); color: #aab2bd; pointer-events: none; }
  #note-title {
    flex: none; border: none; outline: none; background: #fff;
    padding: 18px 26px 10px; font-size: 22px; font-weight: 700; color: var(--text);
    border-bottom: 1px solid var(--border);
    -webkit-user-select: text; user-select: text;
  }
  #note-title::placeholder { color: #c3c9d2; }
  #noteview { position: relative; }
  #note-edit img.img-selected { outline: 3px solid var(--accent); outline-offset: -3px; }
  #note-img-del {
    position: absolute; z-index: 50; width: 30px; height: 30px;
    border: none; border-radius: 50%; background: rgba(15,23,42,.72); color: #fff;
    font-size: 15px; font-weight: 700; cursor: pointer; line-height: 1;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  #note-img-del:hover { background: var(--red); }
  #note-edit img { max-width: 100%; border-radius: 10px; display: block; margin: 12px 0; }
  #note-edit h3 { font-size: 18px; margin: 18px 0 6px; }

  /* ── 리서치 카드 뷰 ── */
  .rc-card {
    max-width: 760px; margin: 0 auto 16px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 14px; padding: 22px 26px;
  }
  .rc-title { font-size: 19px; font-weight: 700; color: var(--text); margin: 0 0 6px; }
  .rc-meta { font-size: 12.5px; color: var(--text-dim); margin-bottom: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
  .rc-tag { background: var(--panel-2); border-radius: 4px; padding: 2px 8px; font-size: 11.5px; }
  .rc-summary { margin: 0 0 14px; padding-left: 20px; }
  .rc-summary li { font-size: 14.5px; line-height: 1.7; color: var(--text); margin-bottom: 4px; }
  .rc-chart-wrap { margin-top: 14px; }
  .rc-chart-title { font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }
  .rc-open-link { font-size: 13px; color: var(--accent); text-decoration: none; }

  /* ── 리서치 선택 모달 ── */
  .rs-modal {
    position: fixed; inset: 0; z-index: 500; background: rgba(15,23,42,.45);
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .rs-box {
    background: var(--panel); border-radius: 14px; width: 100%; max-width: 460px;
    max-height: 80vh; display: flex; flex-direction: column; padding: 16px; gap: 10px;
    box-shadow: 0 20px 60px rgba(15,23,42,.25);
  }
  .rs-head { display: flex; align-items: center; gap: 8px; }
  .rs-head strong { flex: 1; font-size: 15px; }
  #rs-search {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; outline: none; -webkit-user-select: text; user-select: text;
  }
  #rs-search:focus { border-color: var(--accent); }
  .rs-list { flex: 1; overflow-y: auto; min-height: 200px; }
  .rs-item {
    padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px;
    color: var(--text); display: flex; align-items: center; gap: 8px;
  }
  .rs-item:hover { background: var(--accent-soft); }
  .rs-item .cnt { margin-left: auto; font-size: 12px; color: var(--text-dim); }
  .rs-item .dt { margin-left: auto; font-size: 12px; color: var(--text-dim); flex: none; }
  .rs-item.sel { background: var(--accent-soft); box-shadow: inset 0 0 0 1.5px var(--accent); }
  .rs-item .chk { flex: none; width: 18px; color: var(--accent); font-weight: 700; }
  .rs-import-btn {
    width: 100%; padding: 11px; border: none; border-radius: 9px;
    background: var(--accent); color: #fff; font-size: 14.5px; font-weight: 600; cursor: pointer;
  }
  .rs-import-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ── 폴더 미리보기 뷰 ── */
  .folder-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px; max-width: 1200px; margin: 0 auto;
  }
  .fv-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; display: flex; flex-direction: column; gap: 8px;
    transition: box-shadow .12s, border-color .12s;
    position: relative;
  }
  .fv-pin {
    position: absolute; top: 8px; right: 40px; z-index: 5;
    width: 26px; height: 26px; display: none; align-items: center; justify-content: center;
    border: none; border-radius: 50%; background: rgba(15,23,42,.55); color: #fff;
    font-size: 13px; cursor: pointer; line-height: 1;
  }
  .fv-card:hover .fv-pin { display: flex; }
  .fv-pin:hover { background: var(--accent); }
  .fv-pin.on { display: flex; background: var(--accent); }
  /* 터치 기기: 평소엔 숨김 — 카드를 살짝 터치해 파란 테두리(hover 상태)일 때만 반투명 표시.
     단 고정된 카드의 📌 는 상태 표시를 위해 항상 보임 */
  @media (hover: none) {
    .fv-pin { display: none; }
    .fv-card:hover .fv-pin { display: flex; opacity: .85; }
    .fv-pin.on { display: flex; opacity: 1; }
  }
  .fv-del {
    position: absolute; top: 8px; right: 8px; z-index: 5;
    width: 26px; height: 26px; display: none; align-items: center; justify-content: center;
    border: none; border-radius: 50%; background: rgba(15,23,42,.55); color: #fff;
    font-size: 13px; font-weight: 700; cursor: pointer; line-height: 1;
  }
  .fv-card:hover .fv-del { display: flex; }
  .fv-del:hover { background: var(--red); }
  /* 터치 기기: 평소엔 숨김 — 카드 살짝 터치(파란 테두리 hover 상태)일 때만 반투명 표시 */
  @media (hover: none) {
    .fv-del { display: none; }
    .fv-card:hover .fv-del { display: flex; opacity: .85; }
    .fv-del:active { opacity: 1; background: var(--red); }
  }
  .fv-card:hover { border-color: var(--accent); box-shadow: 0 2px 10px rgba(37,99,235,.08); }
  /* 카드 드래그 정렬 */
  .fv-card { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  .fv-card.fv-drop-left  { box-shadow: inset 3px 0 0 0 var(--accent); }
  .fv-card.fv-drop-right { box-shadow: inset -3px 0 0 0 var(--accent); }
  .fv-card.drop-target   { background: var(--accent-soft); box-shadow: inset 0 0 0 2px var(--accent); }
  .fv-card.fv-dragging   { opacity: .45; }
  .fv-head { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; }
  .fv-head .ttl { flex: 1; font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.45; }
  .fv-head:hover .ttl { color: var(--accent); }
  .fv-meta { display: flex; gap: 6px; flex-wrap: wrap; font-size: 11.5px; color: var(--text-dim); }
  .fv-meta .rc-tag { font-size: 11px; }
  .fv-body { font-size: 13.5px; line-height: 1.65; color: var(--text); }
  .fv-body ul { margin: 0; padding-left: 18px; }
  .fv-body li { margin-bottom: 3px; }
  .fv-body.clamp {
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  /* ── 리서치 탭 방식 카드 접기: body 전체(요약+차트) max-height + 하단 페이드 ── */
  .fv-cardbody { position: relative; }
  .fv-card.collapsed .fv-cardbody { max-height: 800px; overflow: hidden; }
  .fv-card.collapsed .fv-cardbody::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 56px;
    background: linear-gradient(to bottom, rgba(255,255,255,0), var(--panel));
    pointer-events: none;
  }
  .fv-toggle {
    margin-top: 6px; width: 100%;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 7px 10px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--panel-2); color: var(--text-dim);
    font-size: 12.5px; cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .fv-toggle:hover { color: var(--text); border-color: var(--accent); }
  .fv-thumb { width: 100%; max-height: 140px; object-fit: cover; border-radius: 8px; }
  .fv-cardbody img { max-width: 100%; border-radius: 8px; display: block; margin: 8px 0; }
  .fv-more {
    align-self: flex-start; border: none; background: none; color: var(--accent);
    font-size: 12.5px; cursor: pointer; padding: 0;
  }
  .fv-sub { font-size: 12px; color: var(--text-dim); }
  .fv-card.folder-card { background: var(--accent-soft); border-color: #bfcffe; }

  /* ── 좁은 화면 (아이폰/아이패드 세로): 상단바 잘림 방지 ── */
  @media (max-width: 700px) {
    .topbar { gap: 6px; padding: 0 8px; }
    .topbar .hint, .topbar .cur-path, .topbar #save-status { display: none; }
    .topbar .spacer { display: none; }
    .cur-name { flex: 1; min-width: 0; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #gedit-link { font-size: 12px !important; padding: 4px 9px !important; white-space: nowrap; flex: none; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sb-head">
      <a class="sb-title" href="https://docs.google.com/spreadsheets/u/0/?pli=1" target="_blank" rel="noopener" title="구글 스프레드시트 홈 새 창으로 열기">📊 Sheets ↗</a>
      <button class="sb-btn" id="new-folder-btn" title="선택한 폴더 아래 새 폴더 (선택 없으면 최상위)">📁+</button>
      <button class="sb-btn" id="new-note-btn" title="새 글 (텍스트+사진 노트)">📝+</button>
      <button class="sb-btn" id="new-research-btn" title="리서치 탭 기업 카드 가져오기">🔬+</button>
      <button class="sb-btn" id="new-index-btn" title="Index 지표 가져오기">📈+</button>
      <button class="sb-btn" id="new-gsheet-btn" title="구글 스프레드시트 연결">📄+</button>
    </div>
    <div class="sb-search">
      <input id="tree-search" type="search" placeholder="🔍 폴더·카드 검색" autocomplete="off" />
    </div>
    <div class="tree" id="tree"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <button class="sb-toggle" id="sb-toggle" title="사이드바 접기/펴기">☰</button>
      <button class="sb-toggle" id="back-to-folder" title="폴더로 돌아가기" style="display:none;">←</button>
      <span class="cur-name" id="cur-name">시트를 선택하세요</span>
      <span class="cur-path" id="cur-path"></span>
      <span class="spacer"></span>
      <a id="gedit-link" href="#" target="_blank" rel="noopener" style="display:none; font-size:13px; font-weight:600; color:var(--accent); text-decoration:none; border:1px solid var(--accent); border-radius:7px; padding:5px 12px;">✏️ 구글시트에서 편집 ↗</a>
      <span class="status" id="save-status"></span>
    </div>
    <div id="lucky"></div>
    <div id="gview" style="display:none; flex:1;"><iframe id="gview-frame" style="width:100%;height:100%;border:none;"></iframe></div>
    <!-- 블로그형 노트 에디터 -->
    <div id="noteview" style="display:none; flex-direction:column; min-height:0; flex:1;">
      <input id="note-title" type="text" placeholder="제목" autocomplete="off" />
      <div class="note-toolbar">
        <select id="note-fontsize" title="글자 크기">
          <option value="">크기</option>
          <option value="12">12</option>
          <option value="13">13</option>
          <option value="15.5">15 (기본)</option>
          <option value="18">18</option>
          <option value="22">22</option>
          <option value="26">26</option>
          <option value="32">32</option>
        </select>
        <button data-cmd="bold" title="굵게"><b>B</b></button>
        <button data-cmd="red" title="빨강"><span style="color:#e23a3a;font-weight:700;">A</span></button>
        <button data-cmd="blue" title="파랑"><span style="color:#2563eb;font-weight:700;">A</span></button>
        <button data-cmd="green" title="초록"><span style="color:#16a34a;font-weight:700;">A</span></button>
        <button data-cmd="black" title="색 원복"><span style="font-weight:700;">A</span></button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/expendPlugins/chart/chartmix.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/js/plugin.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/luckysheet.umd.js"></script>
<script>
/* ═══════════════════════════════════════════
   구성
   - meta  : localStorage sv_sheets_meta_v1  { folders:[{id,name,parent}], sheets:[{id,name,folder,dirty,updated}] }
   - data  : localStorage sv_sheet_data_<id> (luckysheet workbook JSON)
   - sha   : localStorage sv_sheets_gh_sha_v1 (sheets/index.json blob SHA — 마지막 동기화 시점)
   - GitHub: sheets/index.json + sheets/data/<id>.json
   - PAT   : localStorage sv_github_pat (index.html 과 공유 — same origin)
═══════════════════════════════════════════ */
const GH = { OWNER: 'whysosary-dot', REPO: 'invest-private', BRANCH: 'main' }; // 비공개 데이터 리포
const META_KEY  = 'sv_sheets_meta_v1';
const SHA_KEY   = 'sv_sheets_gh_sha_v1';
const PAT_KEY   = 'sv_github_pat';
const DATA_PREF = 'sv_sheet_data_';

const uid = () => Math.random().toString(36).slice(2, 10);

function loadMeta() {
  try { return JSON.parse(localStorage.getItem(META_KEY) || '{"folders":[],"sheets":[]}'); }
  catch { return { folders: [], sheets: [] }; }
}
function saveMeta() { localStorage.setItem(META_KEY, JSON.stringify(meta)); }
function loadSheetData(id) {
  try { return JSON.parse(localStorage.getItem(DATA_PREF + id) || 'null'); }
  catch { return null; }
}
function saveSheetData(id, data) { localStorage.setItem(DATA_PREF + id, JSON.stringify(data)); }

let meta = loadMeta();
let currentId = null;       // 열려있는 시트 문서 id
let luckyCreated = false;
let dirtySaveTimer = null;
let selectedFolderId = null;

/* 접힌 폴더 상태 (localStorage 유지) */
const COLLAPSED_KEY = 'sv_sheets_collapsed_v1';
let collapsed = new Set();
try { collapsed = new Set(JSON.parse(localStorage.getItem(COLLAPSED_KEY) || '[]')); } catch(_) {}
function saveCollapsed() { localStorage.setItem(COLLAPSED_KEY, JSON.stringify([...collapsed])); }

function toast(msg, type = 'ok', ms = 2600) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type === 'err' ? ' err' : '');
  clearTimeout(t._tm);
  t._tm = setTimeout(() => t.classList.remove('show'), ms);
}
function setStatus(txt, saved) {
  const el = document.getElementById('save-status');
  el.textContent = txt;
  el.className = 'status' + (saved ? ' saved' : '');
}

/* ── 트리 렌더 ── */
let treeSearchQuery = '';

function itemIcon(s) {
  if (s.type === 'note')   return '📝';
  if (s.type === 'rcard')  return '🔬';
  if (s.type === 'awake')  return '⭐';
  if (s.type === 'index')  return '📈';
  return '📄'; // 구글시트 포함 — 📄+ 버튼과 동일 아이콘
}

function renderSearchResults(tree, q) {
  const matchedFolders = meta.folders.filter(f => f.name.toLowerCase().includes(q));
  const matchedSheets  = meta.sheets.filter(s => s.name.toLowerCase().includes(q));

  if (!matchedFolders.length && !matchedSheets.length) {
    const tip = document.createElement('div');
    tip.className = 'empty-tip';
    tip.textContent = '검색 결과가 없어요.';
    tree.appendChild(tip);
    return;
  }

  matchedFolders.sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(f => {
    const div = document.createElement('div');
    div.className = 'node folder' + (selectedFolderId === f.id ? ' selected' : '');
    div.innerHTML = `<span>📁</span><span class="nm"></span><span class="sub"></span>`;
    div.querySelector('.nm').textContent = f.name;
    const parentPath = f.parent ? folderPath(f.parent) : '';
    div.querySelector('.sub').textContent = parentPath ? `(${parentPath})` : '(최상위)';
    div.addEventListener('click', () => {
      // 선택 + 검색 종료 + 조상 폴더 모두 펼침 + 미리보기
      selectedFolderId = f.id;
      let cur = f;
      while (cur) { collapsed.delete(cur.id); cur = meta.folders.find(x => x.id === cur.parent); }
      saveCollapsed();
      treeSearchQuery = '';
      document.getElementById('tree-search').value = '';
      openFolderView(f.id, true);
    });
    tree.appendChild(div);
  });

  matchedSheets.sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(s => {
    const div = document.createElement('div');
    div.className = 'node sheet' + (currentId === s.id ? ' selected' : '');
    div.innerHTML = `<span>${itemIcon(s)}</span><span class="nm"></span><span class="sub"></span>`;
    div.querySelector('.nm').textContent = s.name;
    const p = s.folder ? folderPath(s.folder) : '';
    div.querySelector('.sub').textContent = p ? `(${p})` : '(최상위)';
    div.addEventListener('click', () => openSheet(s.id));
    tree.appendChild(div);
  });
}

function renderTree() {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';

  // 검색 모드: 플랫 결과 리스트
  if (treeSearchQuery) {
    renderSearchResults(tree, treeSearchQuery);
    return;
  }
  const foldersByParent = {};
  meta.folders.forEach(f => {
    const p = f.parent || '__root__';
    (foldersByParent[p] = foldersByParent[p] || []).push(f);
  });
  const sheetsByFolder = {};
  meta.sheets.forEach(s => {
    const p = s.folder || '__root__';
    (sheetsByFolder[p] = sheetsByFolder[p] || []).push(s);
  });

  function addFolderNodes(parentKey, depth) {
    (foldersByParent[parentKey] || []).sort(cmpOrd).forEach(f => {
      const div = document.createElement('div');
      div.className = 'node folder' + (selectedFolderId === f.id ? ' selected' : '');
      div.style.paddingLeft = (8 + depth * 16) + 'px';
      const isCollapsed = collapsed.has(f.id);
      div.innerHTML = `<span class="caret">${isCollapsed ? '▸' : '▾'}</span><span>${isCollapsed ? '📁' : '📂'}</span><span class="nm"></span><button class="ren" title="이름 변경">✎</button><button class="del" title="폴더 삭제">✕</button>`;
      div.querySelector('.nm').textContent = f.name;
      div.addEventListener('click', (e) => {
        if (e.target.classList.contains('del') || e.target.classList.contains('ren')) return;
        // 첫 클릭 = 선택 + 미리보기만. 이미 선택된 폴더를 다시 클릭 = 접기/펼치기 토글
        if (selectedFolderId === f.id) {
          if (collapsed.has(f.id)) collapsed.delete(f.id); else collapsed.add(f.id);
          saveCollapsed();
        }
        selectedFolderId = f.id;
        openFolderView(f.id, true); // 내부에서 renderTree 호출
      });
      const renameFolder = () => {
        const nm = prompt('폴더 이름 변경:', f.name);
        if (nm && nm.trim()) { f.name = nm.trim(); saveMeta(); renderTree(); }
      };
      // 더블클릭 이름변경 제거 — 재클릭이 접기/펼치기 토글이라 충돌. 이름변경은 ✎ 버튼으로만
      div.querySelector('.ren').addEventListener('click', renameFolder);
      div.querySelector('.del').addEventListener('click', () => {
        // 하위 폴더/시트 재귀 수집
        const subFolderIds = [];
        (function collect(fid) {
          subFolderIds.push(fid);
          meta.folders.filter(x => x.parent === fid).forEach(c => collect(c.id));
        })(f.id);
        const subSheets = meta.sheets.filter(s => subFolderIds.includes(s.folder));

        if (subSheets.length || subFolderIds.length > 1) {
          const msg = `폴더 "${f.name}" 안에 ` +
            `${subFolderIds.length - 1 ? `하위 폴더 ${subFolderIds.length - 1}개, ` : ''}` +
            `시트 ${subSheets.length}개가 있습니다.\n\n전부 함께 삭제할까요?\n(커밋하면 GitHub 에서도 삭제됩니다)`;
          if (!confirm(msg)) return;
        } else {
          if (!confirm(`폴더 "${f.name}" 를 삭제할까요?`)) return;
        }

        // 하위 시트 삭제 (localStorage 정리 + GitHub 삭제 예약)
        meta._deleted = meta._deleted || [];
        subSheets.forEach(s => {
          localStorage.removeItem(DATA_PREF + s.id);
          if (s.type !== 'gsheet') meta._deleted.push(s.id);
          if (currentId === s.id) { currentId = null; showNoSheet(); }
        });
        meta.sheets = meta.sheets.filter(s => !subFolderIds.includes(s.folder));
        // 폴더 (자기 자신 + 하위) 삭제
        meta.folders = meta.folders.filter(x => !subFolderIds.includes(x.id));
        if (subFolderIds.includes(selectedFolderId)) selectedFolderId = null;
        saveMeta(); renderTree();
      });
      attachDnD(div, 'folder', f.id, f.name);
      tree.appendChild(div);
      if (!isCollapsed) {
        addFolderNodes(f.id, depth + 1);
        addSheetNodes(f.id, depth + 1);
      }
    });
  }
  function addSheetNodes(folderKey, depth) {
    (sheetsByFolder[folderKey] || []).sort((a, b) => ((b.pinned ? 1 : 0) - (a.pinned ? 1 : 0)) || cmpOrd(a, b)).forEach(s => {
      const div = document.createElement('div');
      div.className = 'node sheet' + (currentId === s.id ? ' selected' : '');
      div.style.paddingLeft = (8 + depth * 16 + 12) + 'px';
      div.innerHTML = `<span>${itemIcon(s)}</span><span class="nm"></span>${s.dirty ? '<span title="미커밋 변경" style="color:#d97706;font-size:10px;">●</span>' : ''}<button class="ren" title="이름 변경">✎</button><button class="del" title="시트 삭제">✕</button>`;
      div.querySelector('.nm').textContent = s.name;
      div.addEventListener('click', (e) => {
        if (e.target.classList.contains('del') || e.target.classList.contains('ren')) return;
        openSheet(s.id);
      });
      const renameSheet = () => {
        const nm = prompt('시트 이름 변경:', s.name);
        if (nm && nm.trim()) { s.name = nm.trim(); s.dirty = true; saveMeta(); renderTree(); updateTopbar(); }
      };
      div.addEventListener('dblclick', renameSheet);
      div.querySelector('.ren').addEventListener('click', renameSheet);
      div.querySelector('.del').addEventListener('click', () => {
        if (!confirm(`시트 "${s.name}" 를 삭제할까요?\n(커밋하면 GitHub 에서도 삭제됩니다)`)) return;
        meta.sheets = meta.sheets.filter(x => x.id !== s.id);
        localStorage.removeItem(DATA_PREF + s.id);
        // 삭제 예약 목록에 넣어 커밋 시 GitHub 파일도 제거
        meta._deleted = meta._deleted || [];
        meta._deleted.push(s.id);
        if (currentId === s.id) { currentId = null; showNoSheet(); }
        saveMeta(); renderTree();
      });
      attachDnD(div, 'sheet', s.id, s.name);
      tree.appendChild(div);
    });
  }
  addFolderNodes('__root__', 0);
  addSheetNodes('__root__', 0);

  if (!meta.folders.length && !meta.sheets.length) {
    const tip = document.createElement('div');
    tip.className = 'empty-tip';
    tip.innerHTML = '아직 시트가 없어요.<br>위의 📁+ / 📄+ 버튼으로<br>폴더와 시트를 만들어보세요.';
    tree.appendChild(tip);
  }
}

function folderPath(folderId) {
  const parts = [];
  let cur = meta.folders.find(f => f.id === folderId);
  while (cur) { parts.unshift(cur.name); cur = meta.folders.find(f => f.id === cur.parent); }
  return parts.join(' / ');
}

/* ═══ 드래그 앤 드랍 이동 ═══
   - 데스크톱: HTML5 DnD (노드를 폴더 위에 끌어다 놓기, 빈 영역 = 최상위)
   - 아이패드: 노드를 0.4초 길게 누르면 드래그 시작 → 폴더 위에 놓기 */
let dragItem = null, dragGhost = null, dragPressTimer = null, dragStartPos = null, touchDragging = false;

function collectDescFolders(fid) {
  const out = [fid];
  meta.folders.filter(x => x.parent === fid).forEach(c => out.push(...collectDescFolders(c.id)));
  return out;
}

function moveItem(kind, id, target) { // target: 폴더 id | null(최상위)
  const maxOrd = (arr, key) => arr
    .filter(x => x.id !== id && ((key === 'parent' ? (x.parent || null) : (x.folder || null)) === target))
    .reduce((m, x) => Math.max(m, x.ord ?? 0), 0);
  if (kind === 'sheet') {
    const s = meta.sheets.find(x => x.id === id);
    if (!s || s.folder === target) return;
    s.folder = target; s.dirty = true;
    s.ord = maxOrd(meta.sheets, 'folder') + 10; // 대상 폴더 맨 끝에
  } else {
    if (id === target) return;
    if (target && collectDescFolders(id).includes(target)) {
      toast('자기 하위 폴더로는 이동할 수 없습니다.', 'err', 3000); return;
    }
    const f = meta.folders.find(x => x.id === id);
    if (!f || f.parent === target) return;
    f.parent = target;
    f.ord = maxOrd(meta.folders, 'parent') + 10;
  }
  saveMeta(); renderTree();
  const item = kind === 'sheet' ? meta.sheets.find(x => x.id === id) : meta.folders.find(x => x.id === id);
  toast(`"${item ? item.name : ''}" → ${target ? folderPath(target) : '최상위'}`);
}

function clearDropHighlights() {
  const treeEl = document.getElementById('tree');
  treeEl.querySelectorAll('.drop-target, .drop-before, .drop-after').forEach(el =>
    el.classList.remove('drop-target', 'drop-before', 'drop-after'));
  treeEl.classList.remove('drop-root');
}
function positionGhost(x, y) {
  if (dragGhost) { dragGhost.style.left = (x + 12) + 'px'; dragGhost.style.top = (y - 14) + 'px'; }
}

/* 순서 정렬용 비교자: ord 우선, 없으면 이름순 */
function cmpOrd(a, b) {
  return ((a.ord ?? 1e9) - (b.ord ?? 1e9)) || a.name.localeCompare(b.name, 'ko');
}

/* 해당 폴더에서 '맨 앞' ord 값 (새 항목은 항상 맨 앞으로) */
function frontOrd(folderId) {
  const sibs = meta.sheets.filter(x => (x.folder || null) === (folderId || null));
  const m = sibs.reduce((mm, x) => Math.min(mm, x.ord ?? 1e9), 1e9);
  return (m === 1e9) ? 10 : m - 10;
}

/* 드랍 판정:
   { type:'into',   folderId }                  → 폴더 안으로 이동 (또는 최상위)
   { type:'insert', kind, refId, pos }          → refId 앞/뒤 삽입 (같은 카테고리 순서 변경)
   undefined                                    → 취소 */
function dropInfoAt(x, y) {
  if (!dragItem) return undefined;
  const el = document.elementFromPoint(x, y);
  if (!el) return undefined;
  const node = el.closest('.node');
  if (node) {
    const r = node.getBoundingClientRect();
    const rel = (y - r.top) / Math.max(r.height, 1);
    const isFolder = node.classList.contains('folder');
    if (isFolder && node.dataset.fid) {
      if (dragItem.kind === 'folder') {
        // 폴더 드래그: 위/아래 가장자리 = 순서 삽입, 가운데 = 폴더 안으로
        if (rel < 0.25) return { type: 'insert', kind: 'folder', refId: node.dataset.fid, pos: 'before' };
        if (rel > 0.75) return { type: 'insert', kind: 'folder', refId: node.dataset.fid, pos: 'after' };
        return { type: 'into', folderId: node.dataset.fid };
      }
      // 시트 드래그 → 폴더 안으로
      return { type: 'into', folderId: node.dataset.fid };
    }
    if (!isFolder && node.dataset.sid && dragItem.kind === 'sheet') {
      // 시트 위 = 위/아래 절반으로 앞/뒤 삽입
      return { type: 'insert', kind: 'sheet', refId: node.dataset.sid, pos: rel < 0.5 ? 'before' : 'after' };
    }
  }
  if (el.closest('#tree')) return { type: 'into', folderId: null }; // 빈 영역 = 최상위
  return undefined;
}

function applyDropHighlight(info) {
  clearDropHighlights();
  if (!info) return;
  const treeEl = document.getElementById('tree');
  if (info.type === 'into') {
    if (info.folderId === null) { treeEl.classList.add('drop-root'); return; }
    const el = treeEl.querySelector(`.node.folder[data-fid="${info.folderId}"]`);
    if (el) el.classList.add('drop-target');
  } else if (info.type === 'insert') {
    const sel = info.kind === 'folder'
      ? `.node.folder[data-fid="${info.refId}"]`
      : `.node.sheet[data-sid="${info.refId}"]`;
    const el = treeEl.querySelector(sel);
    if (el) el.classList.add(info.pos === 'before' ? 'drop-before' : 'drop-after');
  }
}

/* 순서 변경: refId 항목 앞/뒤로 삽입 (필요 시 카테고리도 함께 이동) */
function reorderItem(kind, id, refId, pos) {
  const list = kind === 'folder' ? meta.folders : meta.sheets;
  const item = list.find(x => x.id === id);
  const ref  = list.find(x => x.id === refId);
  if (!item || !ref || id === refId) return;
  const parentKey = kind === 'folder' ? (ref.parent || null) : (ref.folder || null);
  if (kind === 'folder') {
    if (parentKey && collectDescFolders(id).includes(parentKey)) {
      toast('자기 하위 폴더로는 이동할 수 없습니다.', 'err', 3000); return;
    }
    item.parent = parentKey;
  } else {
    item.folder = parentKey;
  }
  const sibs = list
    .filter(x => x !== item && ((kind === 'folder' ? (x.parent || null) : (x.folder || null)) === parentKey))
    .sort(cmpOrd);
  let idx = sibs.indexOf(ref);
  if (idx === -1) idx = sibs.length; else if (pos === 'after') idx++;
  sibs.splice(idx, 0, item);
  sibs.forEach((x, i) => { x.ord = (i + 1) * 10; });
  saveMeta(); renderTree();
  toast(`"${item.name}" 순서 변경됨`);
}

function performDrop(info) {
  if (!info || !dragItem) return;
  if (info.type === 'into') moveItem(dragItem.kind, dragItem.id, info.folderId);
  else if (info.type === 'insert') reorderItem(dragItem.kind, dragItem.id, info.refId, info.pos);
}
function endTouchDrag() {
  touchDragging = false; dragItem = null;
  if (dragGhost) { dragGhost.remove(); dragGhost = null; }
  clearDropHighlights();
}

function attachDnD(div, kind, id, name) {
  if (kind === 'folder') div.dataset.fid = id;
  else div.dataset.sid = id;

  // ── 데스크톱 HTML5 DnD (드랍 판정은 트리 레벨 위임 리스너가 처리) ──
  div.draggable = true;
  div.addEventListener('dragstart', (e) => {
    dragItem = { kind, id };
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', id); } catch(_) {}
  });
  div.addEventListener('dragend', () => { dragItem = null; clearDropHighlights(); });

  // ── 터치: 0.4초 롱프레스 → 드래그 ──
  div.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    dragStartPos = { x: t.clientX, y: t.clientY };
    clearTimeout(dragPressTimer);
    dragPressTimer = setTimeout(() => {
      touchDragging = true;
      dragItem = { kind, id };
      dragGhost = document.createElement('div');
      dragGhost.className = 'drag-ghost';
      dragGhost.textContent = (kind === 'folder' ? '📁 ' : '📄 ') + name;
      document.body.appendChild(dragGhost);
      positionGhost(t.clientX, t.clientY);
    }, 400);
  }, { passive: true });

  div.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    if (!touchDragging) {
      // 롱프레스 전에 움직임 → 스크롤 의도, 드래그 취소
      if (dragStartPos && (Math.abs(t.clientX - dragStartPos.x) > 10 || Math.abs(t.clientY - dragStartPos.y) > 10)) {
        clearTimeout(dragPressTimer);
      }
      return;
    }
    e.preventDefault();
    positionGhost(t.clientX, t.clientY);
    applyDropHighlight(dropInfoAt(t.clientX, t.clientY));
  }, { passive: false });

  div.addEventListener('touchend', (e) => {
    clearTimeout(dragPressTimer);
    if (!touchDragging) return;
    const t = e.changedTouches[0];
    performDrop(dropInfoAt(t.clientX, t.clientY));
    endTouchDrag();
    e.preventDefault(); // 드랍 후 클릭 합성 방지
  }, { passive: false });

  div.addEventListener('touchcancel', () => { clearTimeout(dragPressTimer); endTouchDrag(); }, { passive: true });
}

/* 트리 레벨 위임 리스너 (데스크톱 DnD) — 폴더 into / 순서 insert / 빈 영역 root 전부 처리 */
(function() {
  const treeEl = document.getElementById('tree');
  treeEl.addEventListener('dragover', (e) => {
    if (!dragItem) return;
    e.preventDefault();
    applyDropHighlight(dropInfoAt(e.clientX, e.clientY));
  });
  treeEl.addEventListener('drop', (e) => {
    e.preventDefault();
    performDrop(dropInfoAt(e.clientX, e.clientY));
    dragItem = null; clearDropHighlights();
  });
})();

let noteChanged = false;

function persistCurrent() {
  if (!currentId) return;
  const s = meta.sheets.find(x => x.id === currentId);
  // 노트: 변경 있을 때만 저장
  if (s && s.type === 'note') {
    if (!noteChanged) return;
    const ed = document.getElementById('note-edit');
    saveSheetData(currentId, { type: 'note', html: ed.innerHTML });
    s.dirty = true; s.updated = Date.now();
    // 최신 편집 글을 같은 폴더 카드들 맨 앞으로
    s.ord = frontOrd(s.folder);
    saveMeta();
    noteChanged = false;
    setStatus('저장됨 ✓ (로컬)', true);
    return;
  }
  if (!luckyCreated) return;
  try {
    const all = luckysheet.getAllSheets();
    saveSheetData(currentId, all);
    if (s) { s.dirty = true; s.updated = Date.now(); }
    saveMeta();
    setStatus('저장됨 ✓ (로컬)', true);
  } catch(e) { console.warn('persist fail', e); }
}

function openSheet(id) {
  if (currentId === id) return;
  persistCurrent();
  currentId = id;
  const s = meta.sheets.find(x => x.id === id);
  if (!s) return;
  // 뒤로가기(스와이프) 제스처로 폴더 뷰에 돌아올 수 있게 히스토리 엔트리 추가
  try { history.pushState({ svOpen: id }, ''); } catch(_) {}
  // 상단바 ← 버튼 활성화
  setTimeout(() => { document.getElementById('back-to-folder').style.display = ''; }, 0);

  // ── 구글시트 타입: /preview 임베드 (읽기 전용) + 새 창 편집 링크 ──
  if (s.type === 'gsheet') {
    hideAllViews();
    const gview = document.getElementById('gview');
    const frame = document.getElementById('gview-frame');
    const previewUrl = `https://docs.google.com/spreadsheets/d/${s.gid}/preview` + (s.ggid ? `?gid=${s.ggid}` : '');
    const editUrl    = `https://docs.google.com/spreadsheets/d/${s.gid}/edit`    + (s.ggid ? `#gid=${s.ggid}` : '');
    if (frame.src !== previewUrl) frame.src = previewUrl;
    gview.style.display = 'flex';
    const editLink = document.getElementById('gedit-link');
    editLink.href = editUrl;
    editLink.textContent = '✏️ 구글시트에서 편집 ↗';
    editLink.style.display = 'inline-block';
    renderTree(); updateTopbar();
    setStatus('읽기 전용 미리보기 — 편집은 ✏️ 버튼', false);
    if (window.innerWidth < 900) document.querySelector('.app').classList.add('sb-hidden');
    return;
  }

  // ── 블로그형 노트 ──
  if (s.type === 'note') {
    hideAllViews();
    const data = loadSheetData(id);
    const ed = document.getElementById('note-edit');
    ed.innerHTML = (data && data.html) || '';
    document.getElementById('note-title').value = (s.name === '제목 없음') ? '' : s.name;
    noteChanged = false;
    document.getElementById('noteview').style.display = 'flex';
    renderTree(); updateTopbar();
    setStatus('', false);
    if (window.innerWidth < 900) document.querySelector('.app').classList.add('sb-hidden');
    return;
  }

  // ── 카드 뷰 (리서치 / Awake / Index) ──
  if (s.type === 'rcard' || s.type === 'awake' || s.type === 'index') {
    hideAllViews();
    document.getElementById('rcardview').style.display = 'block';
    if (s.type === 'rcard')      renderResearchCard(s);
    else if (s.type === 'awake') renderAwakeCard(s);
    else                         renderIndexCard(s);
    renderTree(); updateTopbar();
    setStatus('', false);
    if (window.innerWidth < 900) document.querySelector('.app').classList.add('sb-hidden');
    return;
  }

  // ── 자체 시트 (Luckysheet) ──
  hideAllViews();
  const data = loadSheetData(id) || defaultWorkbook();
  document.getElementById('lucky').style.display = 'block';
  luckysheet.create({
    container: 'lucky',
    lang: 'en',
    data: data,
    plugins: ['chart'],
    showinfobar: false,
    enableAddRow: true,
    enableAddBackTop: true,
    hook: {
      updated: function() {
        clearTimeout(dirtySaveTimer);
        setStatus('입력 중…', false);
        dirtySaveTimer = setTimeout(persistCurrent, 800);
      }
    }
  });
  luckyCreated = true;
  renderTree(); updateTopbar();
  setStatus('', false);
  // 좁은 화면에선 시트 열 때 사이드바 자동 접기 (시트 영역 확보)
  if (window.innerWidth < 900) {
    document.querySelector('.app').classList.add('sb-hidden');
    setTimeout(() => { try { luckysheet.resize(); } catch(_) {} }, 220);
  }
}

/* ── PDF 삽입: PDF.js 로 각 페이지를 이미지로 변환 ── */
let _pdfjsReady = null;
function ensurePdfJs() {
  if (_pdfjsReady) return _pdfjsReady;
  _pdfjsReady = new Promise((resolve, reject) => {
    const sc = document.createElement('script');
    sc.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    sc.onload = () => {
      try {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        resolve(window.pdfjsLib);
      } catch(e) { reject(e); }
    };
    sc.onerror = () => reject(new Error('PDF.js 로드 실패'));
    document.head.appendChild(sc);
  });
  return _pdfjsReady;
}

document.getElementById('note-pdf-input').addEventListener('change', async (e) => {
  const file = (e.target.files || [])[0];
  e.target.value = '';
  if (!file) return;
  setStatus('PDF 변환 중…', false);
  try {
    const pdfjs = await ensurePdfJs();
    const buf = await file.arrayBuffer();
    const pdf = await pdfjs.getDocument({ data: buf }).promise;
    const total = pdf.numPages;
    if (total > 15 && !confirm(`PDF 가 ${total}페이지입니다.\n전부 이미지로 변환하면 용량이 커질 수 있어요.\n계속할까요?`)) {
      setStatus('', false); return;
    }
    const ed = document.getElementById('note-edit');
    ed.focus();
    for (let p = 1; p <= total; p++) {
      setStatus(`PDF 변환 중… ${p}/${total}`, false);
      const page = await pdf.getPage(p);
      const vp1 = page.getViewport({ scale: 1 });
      const scale = Math.min(2, 1100 / vp1.width); // 목표 폭 ~1100px
      const vp = page.getViewport({ scale });
      const cv = document.createElement('canvas');
      cv.width = Math.round(vp.width);
      cv.height = Math.round(vp.height);
      await page.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
      const dataUrl = cv.toDataURL('image/jpeg', 0.8);
      document.execCommand('insertHTML', false, `<img src="${dataUrl}"><br>`);
    }
    noteChanged = true;
    clearTimeout(noteSaveTimer);
    noteSaveTimer = setTimeout(persistCurrent, 400);
    setStatus(`PDF ${total}페이지 삽입됨 ✓`, true);
    toast(`📎 PDF ${total}페이지 삽입`);
  } catch(err) {
    console.warn('pdf insert fail', err);
    setStatus('', false);
    toast('❌ PDF 변환 실패: ' + err.message, 'err', 4500);
  }
});

function resizeImage(file, maxW, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(cv.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('이미지 로드 실패')); };
    img.src = url;
  });
}

function renderRsCards(companyId, q) {
  const list = document.getElementById('rs-list');
  list.innerHTML = '';
  const c = (_rsData.companies || []).find(x => x.id === companyId);
  if (!c) return;
  const cards = (c.cards || [])
    .filter(cd => !q || (cd.title || '').toLowerCase().includes(q))
    .slice().reverse(); // 최신 카드 먼저
  if (!cards.length) { list.innerHTML = '<div class="empty-tip">카드가 없어요</div>'; updateRsFoot(); return; }
  cards.forEach(cd => {
    const div = document.createElement('div');
    div.className = 'rs-item' + (_rsSelected.has(cd.id) ? ' sel' : '');
    div.innerHTML = `<span class="chk">${_rsSelected.has(cd.id) ? '✓' : ''}</span><span>🔬</span><span class="nm"></span><span class="dt"></span>`;
    div.querySelector('.nm').textContent = cd.title || cd.id;
    div.querySelector('.dt').textContent = cd.date || '';

      // 탭 = 선택 토글 (여러 개 선택 후 하단 버튼으로 일괄 가져오기)
      if (_rsSelected.has(cd.id)) _rsSelected.delete(cd.id);
      else _rsSelected.add(cd.id);
      div.classList.toggle('sel', _rsSelected.has(cd.id));
      div.querySelector('.chk').textContent = _rsSelected.has(cd.id) ? '✓' : '';

      const type = def.type === 'donut' ? 'doughnut' : def.type === 'line' ? 'line' : 'bar';
      const cfg = {
        type,
        data: {
          labels: def.labels,
          datasets: [{
            data: def.data,
            backgroundColor: def.colors || ['#378ADD','#85B7EB','#534AB7','#E2A93A','#3AB795','#E23A3A','#8898AA','#D67DC3'],
            borderWidth: type === 'line' ? 2 : 0,
            borderColor: '#378ADD',

          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          indexAxis: def.type === 'bar-h' ? 'y' : 'x',

function linkifyEsc(text) {
  const esc = (text || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

}

const INDEX_HTML_URL = 'https://raw.githubusercontent.com/whysosary-dot/invest-index/main/index.html';
let _idxData = null; // INDICATORS 배열

async function loadIndexData() {
  if (_idxData) return _idxData;
  const r = await fetch(INDEX_HTML_URL + '?t=' + Date.now(), { cache: 'no-store' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const src = await r.text();
  const startMark = 'const INDICATORS = [';
  const si = src.indexOf(startMark);
  if (si < 0) throw new Error('INDICATORS 배열을 찾을 수 없음');
  const arrStart = si + startMark.length - 1; // '[' 위치
  const ei = src.indexOf('\n];', arrStart);
  if (ei < 0) throw new Error('배열 끝을 찾을 수 없음');
  const arrText = src.slice(arrStart, ei + 2); // "...]" 포함
  _idxData = new Function('return ' + arrText)();
  if (!Array.isArray(_idxData)) throw new Error('파싱 결과가 배열이 아님');
  return _idxData;
}

/* ═══ 폴더 미리보기 뷰 ═══
   폴더 클릭 → 하위 폴더/항목을 카드 그리드로. 카드 제목 클릭 = 전체 화면.
   더보기/접기 로 카드 안에서 내용 확장 가능. */
function stripHtmlToText(html) {
  const div = document.createElement('div');
  div.innerHTML = html || '';
  return (div.innerText || '').trim();
}
function firstImgSrc(html) {
  const div = document.createElement('div');
  div.innerHTML = html || '';
  const img = div.querySelector('img');
  return img ? img.src : null;
}

let _fvCharts = []; // 폴더뷰 Chart.js 인스턴스 정리용
let currentFolderViewId = null; // 현재 열려있는 폴더 뷰 (null=최상위 전체)

function openFolderView(folderId, pushHist) {
  // 실제 탐색 이동일 때만 히스토리 엔트리 추가 → 뒤로가기(스와이프)가 상위 폴더로 한 단계씩
  if (pushHist && (folderId || null) !== currentFolderViewId) {
    try { history.pushState({ svFolder: folderId || null }, ''); } catch(_) {}
  }
  persistCurrent();
  currentId = null;
  currentFolderViewId = folderId || null;
  hideAllViews();
  // 최상위가 아니면 ← (상위 폴더로) 표시
  document.getElementById('back-to-folder').style.display = currentFolderViewId ? '' : 'none';
  _fvCharts.forEach(ch => { try { ch.destroy(); } catch(_) {} });
  _fvCharts = [];
  const fv = document.getElementById('folderview');
  fv.style.display = 'block';

  const f = meta.folders.find(x => x.id === folderId);
  document.getElementById('cur-name').textContent = f ? `📂 ${f.name}` : '📂 전체';
  document.getElementById('cur-path').textContent = f && f.parent ? `(${folderPath(f.parent)})` : '';

  fv.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'folder-grid';

  const subFolders = meta.folders.filter(x => (x.parent || null) === folderId).sort(cmpOrd);
  const sheets = meta.sheets.filter(s => (s.folder || null) === folderId)
    .sort((a, b) => ((b.pinned ? 1 : 0) - (a.pinned ? 1 : 0)) || cmpOrd(a, b)); // 📌 고정 카드 항상 앞

  if (!subFolders.length && !sheets.length) {
    fv.innerHTML = '<div class="empty-tip" style="padding:60px 20px;">이 폴더는 비어있어요.<br>사이드바 버튼으로 항목을 추가해보세요.</div>';
    renderTree();
    return;
  }

  subFolders.forEach(sf => {
    const card = document.createElement('div');
    card.className = 'fv-card folder-card';
    const head = document.createElement('div'); head.className = 'fv-head';
    const cnt = meta.folders.filter(x => x.parent === sf.id).length
              + meta.sheets.filter(s => s.folder === sf.id).length;
    head.innerHTML = `<span>📂</span><span class="ttl"></span>`;
    head.querySelector('.ttl').textContent = sf.name;
    head.addEventListener('click', () => {
      selectedFolderId = sf.id;
      collapsed.delete(sf.id); saveCollapsed();
      renderTree();
      openFolderView(sf.id, true);
    });
    card.appendChild(head);
    const sub = document.createElement('div'); sub.className = 'fv-sub';
    sub.textContent = `${cnt}개 항목`;
    card.appendChild(sub);
    card.dataset.fid = sf.id;
    attachCardDnD(card, 'folder', sf.id, sf.name);
    grid.appendChild(card);
  });

  sheets.forEach(s => grid.appendChild(buildItemCard(s)));
  fv.appendChild(grid);
  renderTree();
}

function buildItemCard(s) {
  const card = document.createElement('div');
  card.className = 'fv-card';
  card.style.cursor = 'pointer';
  card.dataset.sid = s.id;
  attachCardDnD(card, 'sheet', s.id, s.name);
  // 카드 어디를 눌러도 전체 화면으로 (더보기/삭제/링크 제외)
  card.addEventListener('click', (e) => {
    if (e.target.closest('.fv-toggle, .fv-del, a')) return;
    openSheet(s.id);
  });

  const head = document.createElement('div'); head.className = 'fv-head';
  head.innerHTML = `<span>${s.pinned ? '📌' : itemIcon(s)}</span><span class="ttl"></span>`;
  head.querySelector('.ttl').textContent = s.name;
  head.addEventListener('click', () => openSheet(s.id));
  card.appendChild(head);

  // 고정 핀 버튼 — 고정된 카드는 최신글이 와도 안 밀리고 맨 앞 유지
  const pinBtn = document.createElement('button');
  pinBtn.className = 'fv-pin' + (s.pinned ? ' on' : '');
  pinBtn.title = s.pinned ? '고정 해제' : '맨 앞에 고정';
  pinBtn.textContent = '📌';
  pinBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    s.pinned = !s.pinned;
    s.dirty = true; s.updated = Date.now();
    saveMeta();
    openFolderView(currentFolderViewId); // 재정렬 반영
    toast(s.pinned ? `📌 "${s.name}" 고정됨` : `"${s.name}" 고정 해제`);
  });
  card.appendChild(pinBtn);

  // 삭제 버튼 (hover 시 표시, 터치 기기는 반투명 상시)
  const delBtn = document.createElement('button');
  delBtn.className = 'fv-del';
  delBtn.title = '삭제';
  delBtn.textContent = '✕';
  delBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!confirm(`"${s.name}" 을(를) 삭제할까요?\n(커밋하면 GitHub 에서도 삭제됩니다)`)) return;
    const folderId = s.folder || null;
    meta.sheets = meta.sheets.filter(x => x.id !== s.id);
    localStorage.removeItem(DATA_PREF + s.id);
    if (!['gsheet', 'rcard', 'awake', 'index'].includes(s.type)) {
      meta._deleted = meta._deleted || [];
      meta._deleted.push(s.id);
    }
    if (currentId === s.id) currentId = null;
    saveMeta();
    openFolderView(folderId); // 현재 폴더 뷰 갱신 (내부에서 renderTree)
    toast(`"${s.name}" 삭제됨`);
  });
  card.appendChild(delBtn);

  const addMoreToggle = (body, extraEl) => {
    const btn = document.createElement('button');
    btn.className = 'fv-more';
    btn.textContent = '더보기 ▾';
    btn.addEventListener('click', () => {
      const clamped = body.classList.toggle('clamp');
      btn.textContent = clamped ? '더보기 ▾' : '접기 ▴';
      if (extraEl) {
        extraEl.style.display = clamped ? 'none' : '';
        // display:none 상태에서 생성된 차트는 크기 0 — 펼칠 때 리사이즈
        if (!clamped) requestAnimationFrame(() => _fvCharts.forEach(ch => { try { ch.resize(); } catch(_) {} }));
      }
    });
    card.appendChild(btn);
  };

  if (s.type === 'rcard') {
    // 리서치 탭과 동일: body(메타+요약+차트) 를 260px 로 자르고 하단 페이드,
    // 넘칠 때만 '⌄ 더보기' 버튼 추가
    const bodyWrap = document.createElement('div');
    bodyWrap.className = 'fv-cardbody';
    bodyWrap.innerHTML = '<div class="fv-sub">불러오는 중…</div>';
    card.appendChild(bodyWrap);
    loadResearchData().then(data => {
      const c = (data.companies || []).find(x => x.id === s.rid);
      const cd = c && (c.cards || []).find(x => x.id === s.cid);
      if (!cd) { bodyWrap.innerHTML = '<div class="fv-sub">카드를 찾을 수 없어요</div>'; return; }
      bodyWrap.innerHTML = '';

      const metaDiv = document.createElement('div'); metaDiv.className = 'fv-meta';
      if (cd.date) { const d = document.createElement('span'); d.textContent = `📅 ${cd.date}`; metaDiv.appendChild(d); }
      (cd.tags || []).slice(0, 4).forEach(t => {
        const tg = document.createElement('span'); tg.className = 'rc-tag'; tg.textContent = t; metaDiv.appendChild(tg);
      });
      bodyWrap.appendChild(metaDiv);

      // 이미지 (비공개 리포 → 인증 blob)
      (cd.images || []).forEach(rel => {
        const img = document.createElement('img');
        img.loading = 'lazy';
        bodyWrap.appendChild(img);
        privResearchImg(rel).then(u => { if (u) img.src = u; else img.remove(); });
      });

      // 리서치 탭과 동일 순서: 차트 먼저 → 요약 텍스트
      const chartDefs = cd.charts || (cd.chart ? [cd.chart] : []);
      chartDefs.forEach(def => {
        if (!def || !def.labels || !def.data) return;
        if (def.title) {
          const t = document.createElement('div'); t.className = 'rc-chart-title';
          t.style.marginTop = '8px';
          t.textContent = def.title + (def.unit ? ` (${def.unit})` : '');
          bodyWrap.appendChild(t);
        }
        const cvBox = document.createElement('div');
        cvBox.style.cssText = 'position:relative; height:160px;';
        const cv = document.createElement('canvas');
        cvBox.appendChild(cv); bodyWrap.appendChild(cvBox);
        const type = def.type === 'donut' ? 'doughnut' : def.type === 'line' ? 'line' : 'bar';
        try {
          _fvCharts.push(new Chart(cv, {
            type,
            data: {
              labels: def.labels,
              datasets: [{
                data: def.data,
                backgroundColor: def.colors || ['#378ADD','#85B7EB','#534AB7','#E2A93A','#3AB795','#E23A3A','#8898AA','#D67DC3'],
                borderWidth: type === 'line' ? 2 : 0,
                borderColor: '#378ADD', fill: false,
              }]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              indexAxis: def.type === 'bar-h' ? 'y' : 'x',
              plugins: { legend: { display: type === 'doughnut', labels: { boxWidth: 10, font: { size: 10 } } } },
            }
          }));
        } catch(e) { console.warn('fv chart fail', e); }
      });

      // 요약 텍스트 (차트 아래)
      const body = document.createElement('div'); body.className = 'fv-body';
      const ul = document.createElement('ul');
      (cd.summary || []).forEach(line => { const li = document.createElement('li'); li.textContent = line; ul.appendChild(li); });
      body.appendChild(ul);
      bodyWrap.appendChild(body);

      // 리서치 탭과 동일: 본문 800px 초과일 때만 접기 (이미지 로드 후 재측정 포함)
      let rToggleAdded = false;
      const tryCollapseR = () => {
        if (rToggleAdded) return;
        if (bodyWrap.scrollHeight > 800) {
          rToggleAdded = true;
          card.classList.add('collapsed');
          const btn = document.createElement('button');
          btn.className = 'fv-toggle';
          btn.innerHTML = '<span>⌄</span> 더보기';
          btn.addEventListener('click', () => {
            const collapsed = card.classList.toggle('collapsed');
            btn.innerHTML = collapsed ? '<span>⌄</span> 더보기' : '<span>⌃</span> 접기';
            if (!collapsed) requestAnimationFrame(() => _fvCharts.forEach(ch => { try { ch.resize(); } catch(_) {} }));
            else card.scrollIntoView({ block: 'nearest' });
          });
          bodyWrap.insertAdjacentElement('afterend', btn);
        }
      };
      requestAnimationFrame(tryCollapseR);
      bodyWrap.querySelectorAll('img').forEach(img => {
        if (img.complete) return;
        img.addEventListener('load', tryCollapseR, { once: true });
      });
      setTimeout(tryCollapseR, 600);
    }).catch(() => { bodyWrap.innerHTML = '<div class="fv-sub">불러오기 실패</div>'; });
  }
  else if (s.type === 'note') {
    // 리서치 카드와 동일한 그라데이션 접기 — 본문(사진 포함) 그대로 렌더
    const data = loadSheetData(s.id);
    const html = (data && data.html) || '';
    const bodyWrap = document.createElement('div');
    bodyWrap.className = 'fv-cardbody';
    const body = document.createElement('div');
    body.className = 'fv-body';
    if (html.trim()) body.innerHTML = html;
    else body.textContent = '(내용 없음)';
    bodyWrap.appendChild(body);
    card.appendChild(bodyWrap);
    // 접힘 판정 — 이미지 로드 후 높이가 늘어나므로 각 이미지 load 시점마다 재측정
    let noteToggleAdded = false;
    const tryCollapse = () => {
      if (noteToggleAdded) return;
      if (bodyWrap.scrollHeight > 800) {
        noteToggleAdded = true;
        card.classList.add('collapsed');
        const btn = document.createElement('button');
        btn.className = 'fv-toggle';
        btn.innerHTML = '<span>⌄</span> 더보기';
        btn.addEventListener('click', () => {
          const collapsed = card.classList.toggle('collapsed');
          btn.innerHTML = collapsed ? '<span>⌄</span> 더보기' : '<span>⌃</span> 접기';
          if (collapsed) card.scrollIntoView({ block: 'nearest' });
        });
        bodyWrap.insertAdjacentElement('afterend', btn);
      }
    };
    requestAnimationFrame(tryCollapse);
    body.querySelectorAll('img').forEach(img => {
      if (img.complete) return;
      img.addEventListener('load', tryCollapse, { once: true });
    });
    // 안전망: 이미지 decode 지연 대비 한 번 더
    setTimeout(tryCollapse, 600);
  }
  else if (s.type === 'gsheet') {
    // 미니 미리보기 iframe (클릭 통과 — 카드 클릭으로 전체 보기)
    const frameWrap = document.createElement('div');
    frameWrap.style.cssText = 'position:relative; height:200px; border:1px solid var(--border); border-radius:8px; overflow:hidden; cursor:pointer;';
    const frame = document.createElement('iframe');
    frame.src = `https://docs.google.com/spreadsheets/d/${s.gid}/preview` + (s.ggid ? `?gid=${s.ggid}` : '');
    frame.loading = 'lazy';
    frame.style.cssText = 'width:133%; height:133%; border:none; pointer-events:none; transform:scale(0.75); transform-origin:0 0;';
    frameWrap.appendChild(frame);
    // 투명 오버레이 — 탭하면 전체 보기
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute; inset:0;';
    overlay.addEventListener('click', () => openSheet(s.id));
    frameWrap.appendChild(overlay);
    card.appendChild(frameWrap);
    const sub = document.createElement('div'); sub.className = 'fv-sub';
    sub.textContent = '📄 구글 스프레드시트 — 누르면 전체 보기';
    card.appendChild(sub);
  }
  else if (s.type === 'index') {
    const sub = document.createElement('div'); sub.className = 'fv-sub';
    sub.textContent = '📈 불러오는 중…';
    card.appendChild(sub);
    const chartBox = document.createElement('div');
    card.appendChild(chartBox);
    loadIndexData().then(inds => {
      const ind = inds.find(x => x.id === s.iid);
      if (!ind) { sub.textContent = '📈 지표를 찾을 수 없어요'; return; }
      sub.textContent = `📈 ${ind.category || '지표'}${ind.unit ? ' · ' + ind.unit : ''}`;
      const rows = (ind.data || []).filter(d => d && d.value !== null && d.value !== undefined);
      if (!rows.length) return;
      // 미니 라인 차트
      const cvBox = document.createElement('div');
      cvBox.style.cssText = 'position:relative; height:160px;';
      const cv = document.createElement('canvas');
      cvBox.appendChild(cv); chartBox.appendChild(cvBox);
      try {
        _fvCharts.push(new Chart(cv, {
          type: 'line',
          data: {
            labels: rows.map(d => d.label),
            datasets: [{
              data: rows.map(d => d.value),
              borderColor: ind.color || '#3056f0',
              borderWidth: 2,
              pointRadius: rows.length > 40 ? 0 : 2,
              pointHitRadius: 8, tension: .25,
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { maxTicksLimit: 6, font: { size: 9.5 }, color: '#9aa3b8' }, grid: { display: false } },
              y: { ticks: { font: { size: 9.5 }, color: '#9aa3b8', maxTicksLimit: 5 }, grid: { color: '#f0f2f7' } },
            },
          }
        }));
      } catch(e) { console.warn('fv index chart fail', e); }
      // 최근값 + 전기比
      const last = rows[rows.length - 1];
      const prev = rows.length > 1 ? rows[rows.length - 2] : null;
      const sum = document.createElement('div');
      sum.style.cssText = 'font-size:13px; color:var(--text); margin-top:6px;';
      let txt = `${last.label}: <b>${Number(last.value).toLocaleString('ko-KR')}${ind.unit ? ' ' + ind.unit : ''}</b>`;
      if (prev && prev.value) {
        const pct = (last.value - prev.value) / Math.abs(prev.value) * 100;
        txt += ` <span style="color:${pct >= 0 ? '#16a34a' : 'var(--red)'};">(${pct >= 0 ? '+' : ''}${pct.toFixed(1)}%)</span>`;
      }
      sum.innerHTML = txt;
      chartBox.appendChild(sum);
    }).catch(() => { sub.textContent = '📈 불러오기 실패'; });
  }
  else if (s.type === 'awake') {
    const sub = document.createElement('div'); sub.className = 'fv-sub';
    sub.textContent = `⭐ Awake 공시 · ${s.adate || ''}`;
    card.appendChild(sub);
  }
  else {
    const sub = document.createElement('div'); sub.className = 'fv-sub';
    sub.textContent = '📄 자체 시트';
    card.appendChild(sub);
  }
  return card;
}

/* ── GitHub API ── */
async function ghGet(path, pat) {
  const headers = { Accept: 'application/vnd.github+json' };
  if (pat) headers.Authorization = 'token ' + pat;
  const r = await fetch(`https://api.github.com/repos/${GH.OWNER}/${GH.REPO}/contents/${path}?ref=${GH.BRANCH}&t=${Date.now()}`, { cache: 'no-store', headers });
  if (r.status === 404) return null;
  if (!r.ok) throw new Error(`GET ${path}: ${r.status}`);
  return r.json();
}
function b64encodeUtf8(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
function b64decodeUtf8(b64) {
  return new TextDecoder().decode(Uint8Array.from(atob(b64.replace(/\n/g,'')), c => c.charCodeAt(0)));
}
async function ghPut(path, contentStr, sha, message, pat) {
  const body = { message, content: b64encodeUtf8(contentStr), branch: GH.BRANCH };
  if (sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${GH.OWNER}/${GH.REPO}/contents/${path}`, {
    method: 'PUT', cache: 'no-store',
    headers: { Authorization: 'token ' + pat, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(`PUT ${path}: ${r.status} ${e.message||''}`); }
  return r.json();
}
async function ghDelete(path, sha, message, pat) {
  const r = await fetch(`https://api.github.com/repos/${GH.OWNER}/${GH.REPO}/contents/${path}`, {
    method: 'DELETE', cache: 'no-store',
    headers: { Authorization: 'token ' + pat, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, sha, branch: GH.BRANCH })
  });
  if (!r.ok && r.status !== 404) { const e = await r.json().catch(()=>({})); throw new Error(`DEL ${path}: ${r.status} ${e.message||''}`); }
  return r.ok ? r.json() : null;
}

/* 커밋&푸시는 대시보드(index.html)의 ☁️ 버튼이 일괄 처리한다.
   (ghCommitAll 3단계 — 밸류에이션 + 다이어리 + 시트. same-origin localStorage 공유) */

/* ── 초기 동기화 (SHA 추적, diary 와 동일 정책) ── */
(async function initialSync() {
  try {
    const lastSha = localStorage.getItem(SHA_KEY) || '';
    const pat = (localStorage.getItem(PAT_KEY) || '').trim();
    if (!pat) {
      // 비공개 리포 — 토큰 없으면 동기화 스킵 + 안내
      renderTree();
      const tree = document.getElementById('tree');
      if (!meta.folders.length && !meta.sheets.length) {
        tree.innerHTML = '<div class="empty-tip">🔑 대시보드 ⚙️ 버튼에서<br>GitHub 토큰을 저장하면<br>내용이 표시됩니다.</div>';
      }
      return;
    }
    const idxFile = await ghGet('sv/sheets/index.json', pat);
    if (!idxFile) { renderTree(); return; }              // GitHub 에 아직 없음 → 로컬만
    const ghSha = String(idxFile.sha || '');
    if (ghSha && lastSha === ghSha) {
      // 새 커밋 없음 → 머지는 스킵 (로컬 보존).
      // 단, 인덱스에 있는데 이 기기에 데이터가 없는 항목은 받아온다
      // (과거 동기화가 1MB 초과 파일을 스킵했던 버그의 잔여 복구용)
      await fetchMissingSheetData(pat);
      renderTree();
      return;
    }

    const ghIndex = JSON.parse(b64decodeUtf8(idxFile.content));
    // GitHub 우선 머지: 같은 id 는 GitHub, 로컬 전용(미커밋) 시트는 보존
    const localOnly = meta.sheets.filter(ls => !(ghIndex.sheets || []).some(gs => gs.id === ls.id));
    const ghSheets = (ghIndex.sheets || []).map(s => ({ ...s, dirty: false }));
    meta = {
      folders: ghIndex.folders || [],
      sheets: [...ghSheets, ...localOnly],
      _deleted: meta._deleted || [],
    };
    // 로컬 전용 시트의 폴더가 사라졌으면 루트로
    meta.sheets.forEach(s => { if (s.folder && !meta.folders.some(f => f.id === s.folder)) s.folder = null; });
    saveMeta();

    // GitHub 시트 데이터 다운로드 (dirty 아닌 것만 덮어씀)
    // ⚠️ Contents API 의 JSON 응답은 1MB 초과 파일의 content 를 비워서 반환한다
    //    (PDF 페이지가 든 노트 등). raw 미디어타입은 대용량도 원본 그대로 반환.
    for (const s of ghSheets) {
      try {
        const r = await fetch(`https://api.github.com/repos/${GH.OWNER}/${GH.REPO}/contents/sv/sheets/data/${s.id}.json?ref=${GH.BRANCH}&t=${Date.now()}`, {
          cache: 'no-store',
          headers: { Authorization: 'token ' + pat, Accept: 'application/vnd.github.raw' }
        });
        if (r.ok) saveSheetData(s.id, await r.json());
      } catch(_) {}
    }
    localStorage.setItem(SHA_KEY, ghSha);
    renderTree();
    // 동기화는 조용히 (토스트 없음)
  } catch (e) {
    console.warn('sheet sync fail', e);
    renderTree();
  }
})();

/* ═══ 아이패드 터치 레이어 (통합) ═══
   규칙:
   1. 탭 (짧게, 안 움직임)
      - 선택된 셀 위 → 시간 무관 즉시 편집 모드 + 키보드
      - 행/열 헤더 위 → 전체 행/열 선택
      - 그 외 → Luckysheet 기본 (셀 선택)
   2. 드래그 (움직임 시작)
      - 어디서 시작하든 기본은 스크롤
      - 200ms(선택 위)/300ms(그 외) 이상 누르고 있다가 드래그 → 범위 선택
   → 스크롤 제스처(바로 슥 미는 것)는 선택 영역 위에서도 항상 스크롤 됨 */
(function() {
  const luckyEl = document.getElementById('lucky');
  let pressTimer = null, selMode = false, startTouch = null;
  let startTime = 0, movedFar = false, startedOnSel = false;

  function fireMouse(type, x, y) {
    const target = document.elementFromPoint(x, y) || luckyEl;
    target.dispatchEvent(new MouseEvent(type, {
      bubbles: true, cancelable: true, view: window,
      clientX: x, clientY: y, button: 0,
      buttons: type === 'mouseup' ? 0 : 1,
    }));
  }
  function cancelPress() { clearTimeout(pressTimer); pressTimer = null; }

  // 현재 선택 박스(셀/범위) 위인지 — 여백 8px 확장해서 손가락 오차 허용
  function touchOnSelection(x, y) {
    const els = document.querySelectorAll('#luckysheet-cell-selected, .luckysheet-cell-selected');
    for (const el of els) {
      if (!el.offsetParent) continue;
      const r = el.getBoundingClientRect();
      if (r.width < 2 || r.height < 2) continue;
      if (x >= r.left - 8 && x <= r.right + 8 && y >= r.top - 8 && y <= r.bottom + 8) return true;
    }
    return false;
  }

  // 선택이 단일 셀인지 (범위면 탭 시 편집 대신 그 셀 선택이 자연스러움)
  function isSingleCellSelection() {
    try {
      const rs = luckysheet.getRange();
      if (!rs || !rs.length) return false;
      const g = rs[rs.length - 1];
      return g.row[0] === g.row[1] && g.column[0] === g.column[1];
    } catch(_) { return false; }
  }

  function enterEdit() {
    try {
      luckysheet.enterEditMode();
      const ed = document.getElementById('luckysheet-rich-text-editor');
      if (ed) {
        ed.focus();
        const sel = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(ed);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
      }
    } catch(err) { console.warn('[sheet] enterEditMode fail', err); }
  }

  luckyEl.addEventListener('touchstart', (e) => {
    if (!luckyCreated || e.touches.length !== 1) { cancelPress(); return; }
    const t = e.touches[0];
    startTouch = { x: t.clientX, y: t.clientY };
    startTime = Date.now();
    movedFar = false;
    selMode = false;
    startedOnSel = touchOnSelection(t.clientX, t.clientY);
    cancelPress();
    // preventDefault 하지 않음 → 스크롤 제스처는 자연스럽게 통과
    // 잠깐 누르고 있으면 선택 모드 (선택 위에선 더 짧게)
    pressTimer = setTimeout(() => {
      selMode = true;
      fireMouse('mousedown', startTouch.x, startTouch.y);
    }, startedOnSel ? 200 : 300);
  }, { passive: true });

  luckyEl.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    if (!selMode) {
      // 10px 이상 움직이면 스크롤 의도 — 선택 모드 진입 취소, 기본 스크롤에 맡김
      if (startTouch && (Math.abs(t.clientX - startTouch.x) > 10 || Math.abs(t.clientY - startTouch.y) > 10)) {
        movedFar = true;
        cancelPress();
      }
      return;
    }
    e.preventDefault(); // 선택 확장 중엔 스크롤 차단
    fireMouse('mousemove', t.clientX, t.clientY);
  }, { passive: false });

  luckyEl.addEventListener('touchend', (e) => {
    cancelPress();
    const t = e.changedTouches[0];
    if (selMode) {
      fireMouse('mouseup', t.clientX, t.clientY);
      selMode = false;
      return;
    }
    if (!t || movedFar) return; // 스크롤이었음 — 아무것도 안 함

    // ── 탭 처리 ──
    const el = document.elementFromPoint(t.clientX, t.clientY);
    // 1) 행/열 헤더 탭 → 전체 행/열 선택
    if (el && el.closest('#luckysheet-rows-h, #luckysheet-cols-h-c, .luckysheet-cols-h-c, .luckysheet-rows-h')) {
      fireMouse('mousedown', t.clientX, t.clientY);
      fireMouse('mouseup', t.clientX, t.clientY);
      return;
    }
    // 2) 선택된 단일 셀 위 탭 → 시간 무관 즉시 편집 모드 + 키보드
    if (startedOnSel && touchOnSelection(t.clientX, t.clientY) && isSingleCellSelection()) {
      enterEdit();
      return;
    }
    // 3) 범위 선택 안쪽 탭 → 그 셀을 단일 선택으로 (구글시트와 동일)
    if (startedOnSel) {
      fireMouse('mousedown', t.clientX, t.clientY);
      fireMouse('mouseup', t.clientX, t.clientY);
    }
    // 4) 그 외 탭은 Luckysheet 기본 처리 (셀 선택)
  }, { passive: true });

  luckyEl.addEventListener('touchcancel', () => { cancelPress(); selMode = false; }, { passive: true });
})();

/* ── 뒤로가기: 열린 시트 → 그 폴더 뷰로 ──
   아이패드 Safari 는 iframe 내부 히스토리를 스와이프 제스처에서 무시하는 경우가 있어
   상단바 ← 버튼을 주 수단으로, popstate 는 보조로 둔다. */
function goBackToFolder() {
  if (currentId) {
    // 항목 열림 → 소속 폴더 뷰로
    const s = meta.sheets.find(x => x.id === currentId);
    const fid = s ? (s.folder || null) : null;
    selectedFolderId = fid;
    openFolderView(fid);
    return;
  }
  if (currentFolderViewId) {
    // 폴더 뷰 → 상위 폴더 뷰로 (최상위 도달 시 전체 보기)
    const f = meta.folders.find(x => x.id === currentFolderViewId);
    const parent = f ? (f.parent || null) : null;
    selectedFolderId = parent;
    openFolderView(parent);
  }
}
document.getElementById('back-to-folder').addEventListener('click', goBackToFolder);
window.addEventListener('popstate', goBackToFolder);

/* 인덱스엔 있는데 로컬 데이터가 없는 시트(note/자체시트) 를 raw 로 받아옴 */
async function fetchMissingSheetData(pat) {
  const targets = (meta.sheets || []).filter(s =>
    !['gsheet', 'rcard', 'awake', 'index'].includes(s.type) &&
    !localStorage.getItem(DATA_PREF + s.id));
  for (const s of targets) {
    try {
      const r = await fetch(`https://api.github.com/repos/${GH.OWNER}/${GH.REPO}/contents/sv/sheets/data/${s.id}.json?ref=${GH.BRANCH}&t=${Date.now()}`, {
        cache: 'no-store',
        headers: { Authorization: 'token ' + pat, Accept: 'application/vnd.github.raw' }
      });
      if (r.ok) {
        saveSheetData(s.id, await r.json());
        console.log('[sheets] 누락 데이터 복구:', s.name);
      }
    } catch(_) {}
  }
}

/* ═══ 폴더 뷰 카드 드래그 정렬 ═══
   - 데스크톱: 카드를 그대로 드래그
   - 아이패드: 0.4초 꾹 누른 뒤 드래그
   - 다른 카드의 왼쪽/오른쪽 절반에 놓으면 그 앞/뒤로 (파란 세로선 표시)
   - 시트 카드를 폴더 카드 위에 놓으면 그 폴더 안으로 이동 */
let _fvDrag = null, _fvGhost = null, _fvPressTimer = null, _fvStartPos = null, _fvTouchDragging = false;

function fvClearHl() {
  document.querySelectorAll('#folderview .drop-target, #folderview .fv-drop-left, #folderview .fv-drop-right')
    .forEach(el => el.classList.remove('drop-target', 'fv-drop-left', 'fv-drop-right'));
}
function fvDropInfo(x, y) {
  if (!_fvDrag) return null;
  const el = document.elementFromPoint(x, y);
  const card = el && el.closest('.fv-card');
  if (!card) return null;
  if (card.dataset.fid) { // 폴더 카드
    if (_fvDrag.kind === 'sheet') return { type: 'into', fid: card.dataset.fid, el: card };
    if (_fvDrag.kind === 'folder' && card.dataset.fid !== _fvDrag.id) {
      const r = card.getBoundingClientRect();
      return { type: 'insert', kind: 'folder', ref: card.dataset.fid, pos: (x < r.left + r.width / 2) ? 'before' : 'after', el: card };
    }
    return null;
  }
  if (card.dataset.sid && _fvDrag.kind === 'sheet' && card.dataset.sid !== _fvDrag.id) {
    const r = card.getBoundingClientRect();
    return { type: 'insert', kind: 'sheet', ref: card.dataset.sid, pos: (x < r.left + r.width / 2) ? 'before' : 'after', el: card };
  }
  return null;
}
function fvApplyHl(info) {
  fvClearHl();
  if (!info) return;
  if (info.type === 'into') info.el.classList.add('drop-target');
  else info.el.classList.add(info.pos === 'before' ? 'fv-drop-left' : 'fv-drop-right');
}
function fvPerform(info) {
  if (!info || !_fvDrag) return;
  const fid = currentFolderViewId;
  if (info.type === 'into') moveItem('sheet', _fvDrag.id, info.fid);
  else reorderItem(info.kind, _fvDrag.id, info.ref, info.pos);
  openFolderView(fid); // 폴더 뷰 갱신
}
function fvEndTouchDrag() {
  _fvTouchDragging = false; _fvDrag = null;
  if (_fvGhost) { _fvGhost.remove(); _fvGhost = null; }
  document.querySelectorAll('.fv-card.fv-dragging').forEach(el => el.classList.remove('fv-dragging'));
  fvClearHl();
}

function attachCardDnD(card, kind, id, name) {
  // ── 데스크톱 HTML5 DnD ──
  card.draggable = true;
  card.addEventListener('dragstart', (e) => {
    _fvDrag = { kind, id };
    card.classList.add('fv-dragging');
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', id); } catch(_) {}
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('fv-dragging');
    _fvDrag = null; fvClearHl();
  });

  // ── 터치: 0.4초 롱프레스 → 드래그 ──
  card.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    _fvStartPos = { x: t.clientX, y: t.clientY };
    clearTimeout(_fvPressTimer);
    _fvPressTimer = setTimeout(() => {
      _fvTouchDragging = true;
      _fvDrag = { kind, id };
      card.classList.add('fv-dragging');
      _fvGhost = document.createElement('div');
      _fvGhost.className = 'drag-ghost';
      _fvGhost.textContent = (kind === 'folder' ? '📂 ' : '📄 ') + name;
      document.body.appendChild(_fvGhost);
      _fvGhost.style.left = (t.clientX + 12) + 'px';
      _fvGhost.style.top = (t.clientY - 14) + 'px';
    }, 400);
  }, { passive: true });

  card.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    if (!_fvTouchDragging) {
      if (_fvStartPos && (Math.abs(t.clientX - _fvStartPos.x) > 10 || Math.abs(t.clientY - _fvStartPos.y) > 10)) {
        clearTimeout(_fvPressTimer); // 스크롤 의도
      }
      return;
    }
    e.preventDefault();
    if (_fvGhost) { _fvGhost.style.left = (t.clientX + 12) + 'px'; _fvGhost.style.top = (t.clientY - 14) + 'px'; }
    fvApplyHl(fvDropInfo(t.clientX, t.clientY));
  }, { passive: false });

  card.addEventListener('touchend', (e) => {
    clearTimeout(_fvPressTimer);
    if (!_fvTouchDragging) return;
    const t = e.changedTouches[0];
    fvPerform(fvDropInfo(t.clientX, t.clientY));
    fvEndTouchDrag();
    e.preventDefault(); // 드랍 후 클릭 합성 방지
  }, { passive: false });

  card.addEventListener('touchcancel', () => { clearTimeout(_fvPressTimer); fvEndTouchDrag(); }, { passive: true });
}

/* 폴더뷰 레벨 위임 (데스크톱 dragover/drop) */
(function() {
  const fv = document.getElementById('folderview');
  fv.addEventListener('dragover', (e) => {
    if (!_fvDrag) return;
    e.preventDefault();
    fvApplyHl(fvDropInfo(e.clientX, e.clientY));
  });
  fv.addEventListener('drop', (e) => {
    e.preventDefault();
    fvPerform(fvDropInfo(e.clientX, e.clientY));
    _fvDrag = null; fvClearHl();
  });
})();

/* ── 폴더 뷰 빈 영역 클릭 → 사이드바 접기 (카드 영역 확대) ── */
document.getElementById('folderview').addEventListener('click', (e) => {
  if (e.target.closest('.fv-card')) return; // 카드 클릭은 제외
  document.querySelector('.app').classList.add('sb-hidden');
});

/* ── 언로드 시 저장 ── */
window.addEventListener('pagehide', persistCurrent);
window.addEventListener('resize', () => { try { luckysheet.resize(); } catch(_) {} });

/* ── 대시보드(부모 창)가 커밋하면 meta 를 다시 읽어 ● 표시 갱신
   (same-origin: 부모의 localStorage 쓰기가 iframe 에 storage 이벤트로 전달됨) ── */
window.addEventListener('storage', (e) => {
  if (e.key === META_KEY) {
    meta = loadMeta();
    renderTree();
    setStatus('커밋됨 ✓', true);
  }
});

renderTree();
showNoSheet();
</script>
